name: 'GOAT Flow Scan'
description: 'Score AI workflow quality and comment results on PRs'
inputs:
  min-score:
    description: 'Minimum passing score (0-100). PR fails if any agent scores below this.'
    required: false
    default: '0'
  path:
    description: 'Path to scan (defaults to repo root)'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }}/../../.. && npm ci
    - name: Build scanner
      shell: bash
      run: cd ${{ github.action_path }}/../../.. && npx tsc
    - name: Create config.local.yaml if missing
      shell: bash
      run: |
        CONFIG_LOCAL="${{ inputs.path }}/.goat-flow/config.local.yaml"
        if [ ! -f "$CONFIG_LOCAL" ]; then
          mkdir -p "$(dirname "$CONFIG_LOCAL")"
          echo "# Local overrides - this file is gitignored." > "$CONFIG_LOCAL"
        fi
    - name: Run scan
      id: scan
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.path }}
        MIN_SCORE: ${{ inputs.min-score }}
      run: |
        set -euo pipefail
        cd "${{ github.action_path }}/../../.."
        STDERR_FILE=$(mktemp)
        trap 'rm -f "$STDERR_FILE"' EXIT

        # Capture JSON on stdout only; stderr (deprecations, etc.) must not corrupt json.load
        if ! output=$(node dist/cli/cli.js scan "$SCAN_PATH" 2>"$STDERR_FILE"); then
          echo "::error::goat-flow scan failed"
          cat "$STDERR_FILE" >&2 || true
          exit 1
        fi
        if [[ -s "$STDERR_FILE" ]]; then
          echo "::warning::Scan wrote to stderr (warnings only; JSON parsed from stdout)" >&2
          cat "$STDERR_FILE" >&2
        fi

        # MIN_SCORE from env - never interpolate inputs into inline Python (injection-safe)
        summary=$(printf '%s\n' "$output" | python3 -c "
        import json, sys, os, re
        ms = os.environ.get('MIN_SCORE', '0').strip()
        if not re.fullmatch(r'[0-9]{1,3}', ms) or int(ms) > 100:
            raise SystemExit('MIN_SCORE must be an integer 0-100')
        min_score = int(ms)
        data = json.load(sys.stdin)
        lines = []
        for a in data['agents']:
            s = a['score']
            emoji = ':white_check_mark:' if s['percentage'] >= min_score else ':x:'
            lines.append(f'| {emoji} {a[\"agentName\"]} | {s[\"grade\"]} | {s[\"percentage\"]}% | {s[\"earned\"]}/{s[\"available\"]} |')
            fails = [c for c in a['checks'] if c['status'] == 'fail']
            for f in fails:
                lines.append(f'|  | | :x: {f[\"id\"]} | {f[\"name\"]} |')
        print('\n'.join(lines))
        ")

        all_pass=$(printf '%s\n' "$output" | python3 -c "
        import json, sys, os, re
        ms = os.environ.get('MIN_SCORE', '0').strip()
        if not re.fullmatch(r'[0-9]{1,3}', ms) or int(ms) > 100:
            raise SystemExit('MIN_SCORE must be an integer 0-100')
        min_score = int(ms)
        data = json.load(sys.stdin)
        all_pass = all(a['score']['percentage'] >= min_score for a in data['agents'])
        print('true' if all_pass else 'false')
        ")

        echo "summary<<EOF" >> "$GITHUB_OUTPUT"
        echo "$summary" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "all_pass=$all_pass" >> "$GITHUB_OUTPUT"
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      env:
        SCAN_SUMMARY: ${{ steps.scan.outputs.summary }}
      with:
        script: |
          const summary = process.env.SCAN_SUMMARY ?? '';
          const body = [
            '## GOAT Flow Scan Results',
            '',
            '| Agent | Grade | Score | Details |',
            '|-------|-------|-------|---------|',
            summary,
            '',
            '<sub>Scanned by [GOAT Flow](https://github.com/blundergoat/goat-flow)</sub>'
          ].join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });
    - name: Enforce min-score gate
      if: steps.scan.outputs.all_pass == 'false'
      shell: bash
      env:
        MIN_SCORE: ${{ inputs.min-score }}
      run: |
        echo "::error::One or more agents scored below the minimum threshold (${MIN_SCORE}%)"
        exit 1
