name: GOAT Flow Scan
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Create gitignored workspace dirs
        run: |
          mkdir -p .goat-flow/footguns .goat-flow/lessons .goat-flow/tasks .goat-flow/logs/sessions
          if [ ! -f .goat-flow/tasks/handoff-template.md ]; then
            printf '## Date\n\n## Status\n\n## Current State\n\n## Key Decisions Made\n\n## Known Risks\n\n## Next Step\n' > .goat-flow/tasks/handoff-template.md
          fi
      - uses: ./.github/actions/goat-flow-scan
        with:
          min-score: '100'
