name: GOAT Flow Scan
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Create gitignored workspace dirs
        run: |
          mkdir -p .goat-flow/footguns .goat-flow/lessons .goat-flow/tasks .goat-flow/logs/sessions
          if [ ! -f .goat-flow/tasks/handoff-template.md ]; then
            printf '%s\n' \
              '# Agent Session Handoff Template' \
              '' \
              '## Date' \
              '' \
              '## Status' \
              '' \
              '## Current State' \
              '' \
              '## Key Decisions Made' \
              '' \
              '## Errors & Corrections' \
              '' \
              '## Learnings' \
              '' \
              '## Known Risks' \
              '' \
              '## Next Step' \
              '' \
              '## Context Files' > .goat-flow/tasks/handoff-template.md
          fi
      - uses: ./.github/actions/goat-flow-scan
        with:
          min-score: '100'
