name: Context Validation

on:
  pull_request:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - ".claude/**"
      - ".gemini/**"
      - "docs/**"
      - "setup/**"
      - "workflow/**"
      - "scripts/**"
      - ".agents/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check CLAUDE.md / GEMINI.md line count
        run: |
          for f in CLAUDE.md GEMINI.md; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              echo "$f: $LINES lines"
              if [ "$LINES" -gt 150 ]; then
                echo "::error::$f exceeds 150 lines ($LINES). Anti-pattern AP1."
                exit 1
              elif [ "$LINES" -gt 120 ]; then
                echo "::warning::$f exceeds 120-line app target ($LINES lines)"
              fi
            fi
          done

      - name: Check router table references exist
        run: |
          # Check all instruction file router tables
          for INST in CLAUDE.md AGENTS.md GEMINI.md; do
            if [ ! -f "$INST" ]; then continue; fi
            echo "Checking $INST router table..."
            grep -oP '`[^`]+`' "$INST" | tr -d '`' | while read -r ref; do
              echo "$ref" | grep -q '\*' && continue
              echo "$ref" | grep -q '{' && continue
              if [ ! -e "$ref" ]; then
                echo "::warning::$INST router references missing path: $ref"
              fi
            done
          done
          echo "Router table check complete"

      - name: Check skills exist
        run: |
          EXPECTED_SKILLS="goat goat-debug goat-review goat-plan goat-sbao goat-security goat-test"
          # Check Claude Code skills
          if [ -d ".claude/skills" ]; then
            for skill in $EXPECTED_SKILLS; do
              if [ ! -f ".claude/skills/$skill/SKILL.md" ]; then
                echo "::error::Missing Claude skill: .claude/skills/$skill/SKILL.md"
                exit 1
              fi
            done
            echo "All 7 Claude skills present"
          fi
          # Check shared skills (Codex + Gemini)
          if [ -d ".agents/skills" ]; then
            for skill in $EXPECTED_SKILLS; do
              if [ ! -f ".agents/skills/$skill/SKILL.md" ]; then
                echo "::error::Missing shared skill: .agents/skills/$skill/SKILL.md"
                exit 1
              fi
            done
            echo "All 7 shared skills present"
          fi

      - name: Check local CLAUDE.md file sizes
        run: |
          find . -name 'CLAUDE.md' -not -path './CLAUDE.md' -not -path './.git/*' | while read -r f; do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 20 ]; then
              echo "::warning::Local instruction file $f exceeds 20 lines ($LINES)."
            fi
          done

      - name: Check for unreviewed AI-generated entries
        run: |
          if grep -r 'AI-GENERATED: UNVERIFIED' .goat-flow/footguns/ .goat-flow/lessons/ 2>/dev/null; then
            echo "::error::Unreviewed AI-generated entries found in learning loop files"
            exit 1
          fi
          echo "No unreviewed AI-generated entries"

      - name: Validate settings.json
        run: |
          for f in .claude/settings.json .gemini/settings.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" 2>&1 || {
                echo "::error::$f is not valid JSON. Anti-pattern AP5."
                exit 1
              }
              echo "$f is valid JSON"
            fi
          done

      - name: Create gitignored workspace dirs
        run: |
          mkdir -p .goat-flow/footguns .goat-flow/lessons .goat-flow/tasks .goat-flow/logs/sessions

      - name: Validate Codex workflow
        run: |
          if [ -f AGENTS.md ] && [ -f scripts/validate-goat-flow-setup.sh ]; then
            bash scripts/validate-goat-flow-setup.sh
          fi

      - name: Check markdown links
        run: bash scripts/check-markdown-links.sh
