# Codex CLI config template - copy to .codex/config.toml
#
# Key differences from Claude Code:
# - This file enables the hooks engine with the current Codex feature flag
# - Filesystem allow/deny policy uses Codex permission profiles, not Claude's
#   settings.json permissions.allow/permissions.deny syntax
# - Hook registrations live in .codex/hooks.json for goat-flow installs
# - The shipped codex-hooks.json template registers the PreToolUse deny hook
# - Command deny policy still lives in the Bash-matched PreToolUse hook because
#   Codex permission profiles describe filesystem/network access, not shell
#   command pattern denies like git push or sudo
default_permissions = "goat-flow"

[features]
hooks = true

[permissions.goat-flow.filesystem]
glob_scan_max_depth = 3
# Codex 0.131 accepts exact paths and trailing "/**" subtrees here.
# Filename globs such as "*.key" are covered by .codex/hooks/deny-dangerous.sh.
":workspace_roots" = { "." = "write", ".env.example" = "read", ".env" = "none", ".env.local" = "none", ".env.development" = "none", ".env.production" = "none", ".env.test" = "none", ".env.staging" = "none", ".envrc" = "none", "secrets/**" = "none", "credentials" = "none", ".ssh/**" = "none", ".aws/**" = "none", ".docker/config.json" = "none", ".gnupg/**" = "none", ".npmrc" = "none", ".pypirc" = "none", ".kube/config" = "none" }
