# Codex CLI config template - copy to .codex/config.toml
#
# Key differences from Claude Code:
# - No PreToolUse equivalent for non-shell tools (file writes can't be pre-blocked)
# - Shell command blocking uses Starlark execpolicy rules (.codex/rules/*.star)
# - Hook events: SessionStart, Stop, AfterToolUse, AfterAgent, UserPromptSubmit
#
# For command blocking (rm -rf, git push main, etc.), create Starlark rules:
#   .codex/rules/deny-dangerous.star
# Each rule returns: allow, prompt, or forbidden.
# See Codex docs for the Starlark rule API.

# --- Stop Hook ----------------------------------------------------------------
# Fires after every agent turn. Runs lint/type checks on changed files.
# MUST exit 0 (non-zero causes infinite loops).
[hooks.stop]
command = "bash .codex/hooks/stop-lint.sh"

# --- SessionStart Hook --------------------------------------------------------
# Fires once when a session opens. Use for environment verification,
# loading context, or checking prerequisites.
[hooks.session_start]
command = "bash .codex/hooks/session-start.sh"

# --- Notes --------------------------------------------------------------------
# Codex does not support:
# - Read-deny patterns (no equivalent to Claude's Read(**/.env*) deny)
# - Pre-blocking Write/Edit tools (only shell commands via execpolicy)
#
# To block dangerous shell commands, create .codex/rules/deny-dangerous.star:
