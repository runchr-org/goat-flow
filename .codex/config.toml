# Codex CLI configuration for goat-flow
# Hooks: configured in .codex/hooks.json (not here)
# Filesystem deny: Codex permission profile below
# Command deny: deny-dangerous.sh via PreToolUse in .codex/hooks.json

default_permissions = "goat-flow"

[features]
codex_hooks = true

[permissions.goat-flow.filesystem]
glob_scan_max_depth = 3

[permissions.goat-flow.filesystem.":project_roots"]
"." = "write"
".env.example" = "read"
"**/.env.example" = "read"
".env" = "none"
"**/.env" = "none"
".env.*" = "none"
"**/.env.*" = "none"
".envrc" = "none"
"**/.envrc" = "none"
"secrets/**" = "none"
"**/secrets/**" = "none"
"*.pem" = "none"
"**/*.pem" = "none"
"*.key" = "none"
"**/*.key" = "none"
"*.pfx" = "none"
"**/*.pfx" = "none"
"credentials*" = "none"
"**/credentials*" = "none"
".ssh/**" = "none"
"**/.ssh/**" = "none"
".aws/**" = "none"
"**/.aws/**" = "none"
".docker/config.json" = "none"
"**/.docker/config.json" = "none"
".gnupg/**" = "none"
"**/.gnupg/**" = "none"
".npmrc" = "none"
"**/.npmrc" = "none"
".pypirc" = "none"
"**/.pypirc" = "none"
".kube/config" = "none"
"**/.kube/config" = "none"
