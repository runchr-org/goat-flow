# Codex CLI configuration for goat-flow
# Hooks: configured in .codex/hooks.json (not here)
# Filesystem deny: Codex permission profile below
# Command deny: guardrail hooks via PreToolUse in .codex/hooks.json

default_permissions = "goat-flow"

[features]
hooks = true

[permissions.goat-flow]
description = "goat-flow workspace editing with secret-path read denies."
extends = ":workspace"

[permissions.goat-flow.filesystem]
glob_scan_max_depth = 3

[permissions.goat-flow.filesystem.":workspace_roots"]
# Codex deny rules win over same-profile read rules. Unlike Claude settings,
# Codex cannot re-allow recursive sample env reads behind a broad filename
# deny, so .env.example is intentionally denied here to keep .env* variants
# protected consistently across agents.
"**/.env*" = "deny"
"**/secrets/**" = "deny"
"**/.ssh/**" = "deny"
"**/.aws/**" = "deny"
"**/.docker/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/**" = "deny"
"**/credentials*" = "deny"
"**/.npmrc" = "deny"
"**/.pypirc" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
