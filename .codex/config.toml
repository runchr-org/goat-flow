# Codex CLI configuration for goat-flow
# Hooks: configured in .codex/hooks.json (not here)
# Filesystem deny: Codex permission profile below
# Command deny: deny-dangerous.sh via PreToolUse in .codex/hooks.json

default_permissions = "goat-flow"

[features]
hooks = true

[permissions.goat-flow.filesystem]
glob_scan_max_depth = 3
# Codex 0.131 accepts exact paths and trailing "/**" subtrees here.
# Filename globs such as "*.key" are covered by .codex/hooks/deny-dangerous.sh.
":workspace_roots" = { "." = "write", ".env.example" = "read", ".env" = "none", ".env.local" = "none", ".env.development" = "none", ".env.production" = "none", ".env.test" = "none", ".env.staging" = "none", ".envrc" = "none", "secrets/**" = "none", "credentials" = "none", ".ssh/**" = "none", ".aws/**" = "none", ".docker/config.json" = "none", ".gnupg/**" = "none", ".npmrc" = "none", ".pypirc" = "none", ".kube/config" = "none" }
