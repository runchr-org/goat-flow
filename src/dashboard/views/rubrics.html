    <!-- ═══ Rubrics View ═══ -->
    <div x-show="activeView === 'rubrics'" x-cloak style="height: calc(100vh - 3.5rem); overflow-y: auto;">
      <div style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px;">

        <span class="gf-text-primary" style="font-size: 20px; font-weight: 500; display: block; margin-bottom: 16px;">Rubric Checks &amp; Anti-Patterns</span>

        <!-- Tier filter -->
        <div style="display: flex; gap: 6px; margin-bottom: 12px;">
          <template x-for="tier in [
            { id: 'all', label: 'All' },
            { id: 'foundation', label: 'Foundation' },
            { id: 'standard', label: 'Standard' },
            { id: 'full', label: 'Full' }
          ]" :key="tier.id">
            <button @click="rubricFilter = tier.id"
              style="font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; border: none; font-weight: 500;"
              :class="rubricFilter === tier.id ? 'gf-btn-primary' : 'gf-btn-scan'"
              x-text="tier.label"></button>
          </template>
        </div>

        <!-- Search -->
        <div style="margin-bottom: 16px;">
          <input type="text" x-model="rubricSearch"
            class="gf-input" style="width: 100%; font-size: 12px; padding: 6px 10px; border-radius: 6px; outline: none;"
            placeholder="Search checks...">
        </div>

        <!-- Checks table -->
        <div class="gf-card" style="border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
          <div class="gf-card-header" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;">
            <span class="gf-text-primary" style="font-size: 14px; font-weight: 500;">Checks</span>
            <span class="gf-text-muted" style="font-size: 11px;" x-text="filteredRubricChecks.length + ' checks'"></span>
          </div>
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <template x-for="col in ['ID', 'Name', 'Tier', 'Points', 'Description']">
                  <th class="gf-th" :style="col === 'Points' ? 'text-align: right;' : ''" x-text="col"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="check in filteredRubricChecks" :key="check.id">
                <tr class="gf-tr">
                  <td class="gf-td">
                    <span style="font-size: 11px; font-family: 'JetBrains Mono', 'Fira Code', monospace;" x-text="check.id"></span>
                  </td>
                  <td class="gf-td">
                    <span class="gf-text-primary" style="font-size: 13px; font-weight: 500;" x-text="check.name"></span>
                  </td>
                  <td class="gf-td">
                    <span style="padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600;"
                      :class="{
                        'gf-badge-pass': check.tier === 'foundation',
                        'gf-badge-warn': check.tier === 'standard',
                        'gf-badge-ap': check.tier === 'full',
                      }"
                      x-text="check.tier"></span>
                  </td>
                  <td class="gf-td" style="text-align: right;">
                    <span class="gf-text-secondary" style="font-size: 12px;" x-text="check.maxPoints"></span>
                  </td>
                  <td class="gf-td">
                    <span class="gf-text-muted" style="font-size: 11px;" x-text="check.recommendation"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="filteredRubricChecks.length === 0" style="padding: 24px; text-align: center;">
            <p class="gf-text-muted" style="font-size: 12px;">No checks match your filter.</p>
          </div>
        </div>

        <!-- Anti-patterns table -->
        <div class="gf-card" style="border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
          <div class="gf-card-header" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;">
            <span class="gf-text-primary" style="font-size: 14px; font-weight: 500;">Anti-Patterns</span>
            <span class="gf-text-muted" style="font-size: 11px;" x-text="filteredAntiPatterns.length + ' patterns'"></span>
          </div>
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <template x-for="col in ['ID', 'Name', 'Deduction', 'Remediation']">
                  <th class="gf-th" :style="col === 'Deduction' ? 'text-align: right;' : ''" x-text="col"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="ap in filteredAntiPatterns" :key="ap.id">
                <tr class="gf-tr">
                  <td class="gf-td">
                    <span style="font-size: 11px; font-family: 'JetBrains Mono', 'Fira Code', monospace;" x-text="ap.id"></span>
                  </td>
                  <td class="gf-td">
                    <span class="gf-text-primary" style="font-size: 13px; font-weight: 500;" x-text="ap.name"></span>
                  </td>
                  <td class="gf-td" style="text-align: right;">
                    <span class="gf-badge-ap" style="padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600;" x-text="ap.deduction"></span>
                  </td>
                  <td class="gf-td">
                    <span class="gf-text-muted" style="font-size: 11px;" x-text="ap.recommendation"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="filteredAntiPatterns.length === 0" style="padding: 24px; text-align: center;">
            <p class="gf-text-muted" style="font-size: 12px;">No anti-patterns match your search.</p>
          </div>
        </div>

        <!-- Footer -->
        <div class="gf-footer" style="text-align: center; font-size: 11px; padding: 16px 0 8px;">
          Built by <a href="https://www.blundergoat.com" target="_blank" class="gf-footer-link">BlunderGOAT</a> · <span x-text="report ? `v${report.rubricVersion}` : ''"></span>
        </div>
      </div>
    </div>
