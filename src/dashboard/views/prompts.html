<!-- ═══ Prompts View ═══ -->
<div
  x-show="activeView === 'prompts'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <div style="max-width: 1100px; margin: 0 auto; padding: 20px 24px 24px">
    <div style="margin-bottom: 14px">
      <h2 class="gf-text-primary" style="font-size: 18px; font-weight: 600; margin-bottom: 4px">
        Prompts
      </h2>
      <p class="gf-text-muted" style="font-size: 14px; max-width: 760px">
        Ready-made prompts for goat-flow skills. Pick one, optionally add context,
        and launch it in the Runner selected above.
      </p>
    </div>

    <div style="position: relative; margin-bottom: 10px">
      <svg
        style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim)"
        width="14"
        height="14"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
      </svg>
      <input
        x-model="presetSearch"
        x-ref="presetSearchInput"
        class="gf-input"
        style="
          width: 100%;
          box-sizing: border-box;
          padding: 9px 14px 9px 38px;
          border-radius: 6px;
          font-size: 14px;
        "
        placeholder="Search name, description, or prompt text..."
      />
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 14px">
      <button
        class="gf-btn gf-btn-sm"
        :style="presetFilter === 'favorites' ? { background: 'var(--accent-bg)', borderColor: 'var(--accent-border)', color: 'var(--accent)' } : {}"
        @click="presetFilter = 'favorites'"
      >
        ★ Favourites <span x-text="presetFavorites.length"></span>
      </button>
      <template x-for="cat in presetCats" :key="'mock-cat-' + cat.id">
        <button
          x-show="cat.id !== 'favorites'"
          class="gf-btn gf-btn-sm"
          @click="presetFilter = cat.id"
          :style="presetFilter === cat.id
            ? { background: { all: 'rgba(74,222,128,0.15)', debug: 'rgba(96,165,250,0.15)', review: 'rgba(45,212,191,0.15)', plan: 'rgba(251,191,36,0.15)', critique: 'rgba(167,139,250,0.15)', qa: 'rgba(74,222,128,0.15)', security: 'rgba(248,113,113,0.15)' }[cat.id] || 'rgba(148,163,184,0.08)',
                color: { all: '#4ade80', debug: '#60a5fa', review: '#2dd4bf', plan: '#fbbf24', critique: '#a78bfa', qa: '#4ade80', security: '#f87171' }[cat.id] || 'var(--text-primary)',
                borderColor: { all: 'rgba(74,222,128,0.3)', debug: 'rgba(96,165,250,0.3)', review: 'rgba(45,212,191,0.3)', plan: 'rgba(251,191,36,0.3)', critique: 'rgba(167,139,250,0.3)', qa: 'rgba(74,222,128,0.3)', security: 'rgba(248,113,113,0.3)' }[cat.id] || 'var(--border-default)' }
            : {}"
          x-text="cat.id === 'all' ? `All ${presets.length}` : `${cat.label} ${(presets.filter(p => p.cat === cat.id).length)}`"
        ></button>
      </template>
    </div>

    <div style="display: grid; grid-template-columns: minmax(0, 290px) minmax(0, 1fr); gap: 12px">
      <!-- Left prompt list -->
      <div style="display: flex; flex-direction: column; gap: 6px; max-height: 680px; overflow-y: auto; padding-right: 4px">
        <template x-for="p in filteredPresets" :key="'mock-preset-' + p.id">
          <div
            @click="selectedPreset = p"
            class="gf-card"
            :style="{
              ...(selectedPreset?.id === p.id ? { borderColor: 'var(--accent-border)', background: 'rgba(74,222,128,0.04)' } : {}),
              borderLeftWidth: '3px',
              borderLeftColor: { debug: '#60a5fa', review: '#2dd4bf', plan: '#fbbf24', critique: '#a78bfa', qa: '#4ade80', security: '#f87171' }[p.cat] || 'var(--border-subtle)'
            }"
            style="
              text-align: left;
              padding: 10px 12px;
              display: flex;
              gap: 10px;
              align-items: flex-start;
              cursor: pointer;
            "
          >
            <button
              @click.stop="toggleFavorite(p.id)"
              style="background: transparent; border: none; color: var(--text-dim); padding: 0; margin-top: 2px; cursor: pointer"
              :style="isFavorite(p.id) ? { color: 'var(--amber-400)' } : {}"
              :title="isFavorite(p.id) ? 'Remove from favourites' : 'Add to favourites'"
              x-text="isFavorite(p.id) ? '★' : '☆'"
            ></button>
            <div style="min-width: 0; flex: 1">
              <div style="font-size: 13px; font-weight: 500" class="gf-text-primary" x-text="p.name"></div>
              <p
                class="gf-text-muted"
                style="
                  font-size: 12px;
                  margin: 2px 0 6px;
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                "
                x-text="p.desc"
              ></p>
              <div style="display: flex; align-items: center; gap: 6px">
                <span
                  class="gf-text-secondary"
                  style="font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; background: rgba(148,163,184,0.08); border-radius: 3px"
                  x-text="p.prompt.startsWith('/') ? p.prompt.split(' ')[0] : 'direct'"
                ></span>
                <span class="gf-text-muted" style="font-size: 10px" x-text="p.cat"></span>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Right preview -->
      <div class="gf-card" style="padding: 18px 20px; min-width: 0">
        <template x-if="selectedPreset">
          <div>
            <div style="display: flex; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle)">
              <button
                x-data="{ copied: false }"
                @click="copyPreset(selectedPreset.prompt); copied = true; setTimeout(() => copied = false, 1200)"
                class="gf-btn gf-btn-md"
              >
                <span x-text="copied ? 'Copied' : 'Copy'"></span>
              </button>
              <div style="flex: 1"></div>
              <button
                @click="launchPreset(selectedPreset.prompt, activeRunner)"
                :disabled="launching || serverSessions.length >= 10"
                class="gf-btn gf-btn-md gf-btn-primary"
              >
                Launch with <span x-text="activeRunner"></span>
              </button>
            </div>

            <div style="display: flex; justify-content: space-between; gap: 12px; margin-top: 16px">
              <div style="min-width: 0; flex: 1">
                <h3 class="gf-text-primary" style="font-size: 16px; font-weight: 600; margin-bottom: 8px" x-text="selectedPreset.name"></h3>
                <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap">
                  <span
                    style="
                      font-family: var(--font-mono);
                      font-size: 10px;
                      padding: 1px 6px;
                      border-radius: 3px;
                      background: var(--accent-bg);
                      color: var(--accent);
                      border: 1px solid var(--accent-border);
                    "
                    x-text="selectedPreset.prompt.startsWith('/') ? selectedPreset.prompt.split(' ')[0] : 'direct'"
                  ></span>
                  <span
                    class="gf-text-muted"
                    style="font-size: 11px; padding: 2px 10px; border-radius: 999px; background: rgba(148,163,184,0.08)"
                    x-text="selectedPreset.cat"
                  ></span>
                </div>
              </div>
              <button
                @click="toggleFavorite(selectedPreset.id)"
                style="background: transparent; border: none; color: var(--amber-400); cursor: pointer"
                :title="isFavorite(selectedPreset.id) ? 'Remove from favourites' : 'Add to favourites'"
              >
                <span x-text="isFavorite(selectedPreset.id) ? '★' : '☆'" style="font-size: 18px"></span>
              </button>
            </div>

            <p class="gf-text-muted" style="font-size: 14px; margin-top: 14px; line-height: 1.6" x-text="selectedPreset.desc"></p>

            <div style="margin-top: 16px">
              <div class="section-label" style="margin-bottom: 8px">Prompt</div>
              <pre
                class="gf-prompt-body"
                style="max-height: 260px; overflow-y: auto"
                x-text="adaptPrompt(selectedPreset.prompt)"
              ></pre>
            </div>

            <div style="margin-top: 14px" x-data="{ extraContext: '' }">
              <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px">
                <div class="section-label">
                  Extra context
                  <span style="text-transform: none; letter-spacing: 0; color: var(--text-dim); font-weight: 400">(optional)</span>
                </div>
                <span style="font-size: 11px; color: var(--text-dim)">Appended before launch</span>
              </div>
              <textarea
                x-model="extraContext"
                class="gf-input"
                style="width: 100%; min-height: 92px; padding: 10px 12px; resize: vertical; font-family: var(--font-mono); font-size: 12.5px"
                placeholder="e.g. Focus on dispatcher routes and ignore integration tests for now..."
              ></textarea>
            </div>
          </div>
        </template>

        <template x-if="!selectedPreset">
          <div style="height: 100%; min-height: 420px; display: flex; align-items: center; justify-content: center">
            <p class="gf-text-muted">Select a prompt to preview it.</p>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
