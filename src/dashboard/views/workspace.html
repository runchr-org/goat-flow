<!-- ═══ Workspace View ═══ -->
<div
  x-show="activeView === 'workspace'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow: hidden"
  x-data="{
	    localSessionRows() {
	      return this.sessions.filter((s) => !s.ended).map((s) => ({
	        id: s.id,
	        status: 'active',
	        createdAt: new Date(s.startTime).toISOString(),
	        projectPath: s.projectPath,
	        cwd: s.cwd,
	        targetPath: s.targetPath,
	        runner: s.runner,
	        lastInputAt: s.lastInputTime,
	        awaitingInput: s.awaitingInput === true,
	        age: Math.max(0, Math.floor((Date.now() - s.startTime) / 1000)),
	        idleDuration: Math.max(0, Math.floor((Date.now() - s.lastInputTime) / 1000)),
	        projectName: this.displayNameFor(s.projectPath)
	      }));
	    },
	    allSessions() {
	      const rows = [...this.localSessionRows(), ...this.currentProjectSessions, ...this.otherProjectSessions].filter(s => s.status === 'active');
	      const seen = new Set();
	      return rows.filter((s) => {
	        if (seen.has(s.id)) return false;
	        seen.add(s.id);
	        return true;
	      });
	    },
	    recentSessions() {
	      const inactive = this.serverSessions.filter(s => s.status !== 'active');
	      const rows = [...this.recentTerminalSessions, ...inactive];
	      const seen = new Set();
	      return rows.filter((s) => {
	        if (seen.has(s.id)) return false;
	        seen.add(s.id);
	        return true;
	      }).slice(0, 4);
	    },
	    sessionIsWaiting(s) {
	      return s.awaitingInput === true || (typeof s.idleDuration === 'number' && this.idleTimeoutMinutes > 0 && s.idleDuration >= Math.floor(this.idleTimeoutMinutes * 0.85) * 60);
	    },
	    sessionTone(s) { return this.sessionIsWaiting(s) ? 'waiting' : (s.status === 'active' ? 'running' : 'recent'); },
	    sessionGlyph(s) { return this.sessionIsWaiting(s) ? '!' : (s.status === 'active' ? '●' : '○'); },
	    sessionStatusLabel(s) { return this.sessionIsWaiting(s) ? 'Waiting' : (s.status === 'active' ? 'Running' : 'Recent'); },
	    waitingSessions() {
	      return this.allSessions().filter(s => this.sessionIsWaiting(s));
	    },
	    meterRunning() { return this.allSessions().filter(s => s.status === 'active').length; },
	    meterRecent() { return this.recentSessions().length; },
	    meterWaiting() { return this.waitingSessions().length; },
	    ageLabel(s) {
	      const m = Math.floor((s.age || 0) / 60);
	      const h = Math.floor(m / 60);
	      return h > 0 ? h + 'h ' + (m % 60) + 'm' : m + 'm';
	    },
	    sessionMeta(s) {
	      return [s.projectName || projectName, s.runner, this.ageLabel(s)].filter(Boolean).join(' · ');
	    },
	    openSession(s) {
	      if (this.confirmEndSessionId === s.id) return;
	      if (this.isSessionBoundLocally(s.id)) this.activeSessionId = s.id;
	      else this.openServerSession(s);
	    }
	  }"
>
  <div
    style="
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 16px 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
    "
  >
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 14px;
      "
    >
      <div style="max-width: 720px">
        <h2
          class="gf-text-primary"
          style="font-size: 18px; font-weight: 600; margin-bottom: 4px"
        >
          Workspace
        </h2>
        <p class="gf-text-muted" style="font-size: 14px">
          Terminal sessions running across projects. Pick a session on the left
          to inspect output and continue work.
        </p>
      </div>
      <div
        class="gf-card"
        style="
          padding: 6px 12px;
          display: flex;
          align-items: center;
          gap: 8px;
          flex-wrap: wrap;
        "
      >
        <span
          class="gf-text-muted"
          style="font-size: 12px"
          x-text="`${serverSessions.length} of ${serverMaxSessions}`"
        ></span>
        <span class="gf-text-muted">·</span>
        <span
          class="gf-status-dot gf-status-running"
          aria-label="Running sessions"
          >●</span
        >
        <span
          class="gf-text-muted"
          style="font-size: 12px"
          x-text="`${meterRunning()} running`"
        ></span>
        <span class="gf-text-muted">·</span>
        <span
          class="gf-status-dot gf-status-waiting"
          aria-label="Waiting sessions"
          >!</span
        >
        <span
          class="gf-text-muted"
          style="font-size: 12px"
          x-text="`${meterWaiting()} waiting`"
        ></span>
        <span class="gf-text-muted">·</span>
        <span
          class="gf-text-muted"
          style="font-size: 12px"
          x-text="`${meterRecent()} recent`"
        ></span>
      </div>
    </div>

    <div
      :style="{ gridTemplateColumns: sessionsCollapsed ? '52px minmax(0, 1fr)' : 'minmax(0, 15rem) minmax(0, 1fr)' }"
      style="
        display: grid;
        gap: 12px;
        flex: 1;
        min-height: 0;
        transition: grid-template-columns 200ms ease;
      "
    >
      <!-- Left rail -->
      <div
        :style="{ padding: sessionsCollapsed ? '8px 6px' : '0 12px 0 0' }"
        style="
          display: flex;
          flex-direction: column;
          min-height: 0;
          min-width: 0;
          height: 100%;
          box-sizing: border-box;
          overflow: hidden;
          border-right: 1px solid var(--border-subtle);
          background: var(--surface-base);
          transition:
            padding 200ms ease,
            background 150ms ease;
        "
      >
        <div
          id="workspace-session-sidebar-content"
          x-show="!sessionsCollapsed"
          x-transition.opacity.duration.150ms
          style="display: flex; flex-direction: column; min-height: 0; flex: 1"
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              min-height: 0;
              flex: 1 1 auto;
              overflow-y: auto;
              gap: 24px;
              padding-right: 4px;
            "
          >
            <section>
              <div class="section-label" style="margin-bottom: 8px">
                ACTIVE
                <span class="gf-section-count"
                  >· <span x-text="allSessions().length"></span
                ></span>
              </div>
              <div
                class="scrollbar"
                style="display: flex; flex-direction: column; gap: 8px"
              >
                <template x-for="s in allSessions()" :key="'ws-s-' + s.id">
                  <div
                    @click="openSession(s)"
                    class="gf-card"
                    :style="{
                    padding: '12px',
                    cursor: 'pointer',
                    borderColor: s.id === activeSessionId ? 'var(--accent-border)' : (sessionIsWaiting(s) ? 'var(--amber-border)' : 'var(--border-default)'),
                    background: s.id === activeSessionId ? 'var(--accent-bg)' : (sessionIsWaiting(s) ? 'var(--amber-bg)' : undefined)
                  }"
                  >
                    <div
                      style="
                        display: flex;
                        gap: 10px;
                        align-items: flex-start;
                        min-width: 0;
                      "
                    >
                      <span
                        class="gf-status-dot"
                        :class="'gf-status-' + sessionTone(s)"
                        :aria-label="sessionStatusLabel(s)"
                        x-text="sessionGlyph(s)"
                        style="margin-top: 2px"
                      ></span>
                      <div
                        style="
                          min-width: 0;
                          flex: 1;
                          display: flex;
                          flex-direction: column;
                          gap: 4px;
                        "
                      >
                        <div
                          class="gf-text-primary"
                          style="
                            min-width: 0;
                            overflow: hidden;
                            text-overflow: ellipsis;
                            white-space: nowrap;
                            font-size: 13px;
                            font-weight: 600;
                          "
                          :title="sessionTitleFor(s)"
                          x-text="sessionTitleFor(s)"
                        ></div>
                        <p
                          class="gf-text-muted"
                          style="
                            overflow: hidden;
                            text-overflow: ellipsis;
                            white-space: nowrap;
                            font-size: 12px;
                            margin: 0;
                          "
                          :title="sessionMeta(s)"
                          x-text="sessionMeta(s)"
                        ></p>
                        <p
                          x-show="s.cwd && s.cwd !== s.projectPath"
                          class="gf-text-muted"
                          style="
                            overflow: hidden;
                            text-overflow: ellipsis;
                            white-space: nowrap;
                            font-size: 11px;
                            margin: 0;
                          "
                        >
                          cwd
                          <span
                            class="mono"
                            x-text="displayNameFor(s.cwd)"
                          ></span>
                        </p>
                        <div
                          style="
                            display: flex;
                            justify-content: flex-end;
                            gap: 6px;
                            padding-top: 6px;
                          "
                        >
                          <button
                            x-show="isSessionBoundLocally(s.id)"
                            @click.stop="exportSession(s.id)"
                            class="gf-btn gf-btn-sm gf-btn-text"
                            style="font-size: 11px"
                          >
                            Export
                          </button>
                          <button
                            @click.stop="confirmEndSessionId = (confirmEndSessionId === s.id ? null : s.id)"
                            class="gf-btn gf-btn-sm gf-btn-text"
                            style="font-size: 11px; color: var(--red-400)"
                          >
                            End
                          </button>
                        </div>
                      </div>
                    </div>
                    <div
                      x-show="confirmEndSessionId === s.id"
                      style="
                        margin-top: 7px;
                        display: flex;
                        justify-content: flex-end;
                        gap: 6px;
                      "
                    >
                      <button
                        @click.stop="endServerSession(s.id); confirmEndSessionId = null"
                        class="gf-btn gf-btn-sm gf-btn-danger"
                      >
                        Yes
                      </button>
                      <button
                        @click.stop="confirmEndSessionId = null"
                        class="gf-btn gf-btn-sm"
                      >
                        No
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </section>

            <section x-show="recentSessions().length > 0">
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 8px;
                "
              >
                <div class="section-label">
                  RECENT
                  <span class="gf-section-count"
                    >· <span x-text="recentSessions().length"></span
                  ></span>
                </div>
                <button
                  @click="endAllSessions()"
                  class="gf-btn gf-btn-sm gf-btn-text"
                >
                  Clear history
                </button>
              </div>
              <div
                class="scrollbar"
                style="display: flex; flex-direction: column; gap: 8px"
              >
                <template x-for="s in recentSessions()" :key="'ws-r-' + s.id">
                  <div
                    class="gf-card"
                    style="padding: 10px 12px; opacity: 0.84"
                  >
                    <div
                      class="gf-text-primary"
                      style="
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                        font-size: 13px;
                        font-weight: 500;
                      "
                      :title="sessionTitleFor(s)"
                      x-text="sessionTitleFor(s)"
                    ></div>
                    <p
                      class="gf-text-muted"
                      style="font-size: 12px; margin: 2px 0 0"
                      x-text="sessionMeta(s)"
                    ></p>
                  </div>
                </template>
              </div>
            </section>
          </div>

          <div style="margin-top: 12px; padding-top: 12px">
            <button
              @click="activeView = 'prompts'; $nextTick(() => { $refs.presetSearchInput && $refs.presetSearchInput.focus(); })"
              class="gf-btn gf-btn-md gf-btn-primary"
              style="width: 100%; justify-content: center; padding: 10px"
            >
              + Launch from prompts
            </button>
          </div>
        </div>

        <div
          x-show="sessionsCollapsed"
          x-transition.opacity.duration.150ms
          style="
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex: 1;
            min-height: 0;
            padding-top: 8px;
          "
        >
          <span
            x-show="allSessions().length > 0"
            class="gf-text-muted mono"
            style="
              min-width: 26px;
              height: 24px;
              display: inline-flex;
              align-items: center;
              justify-content: center;
              border-radius: 999px;
              border: 1px solid var(--border-subtle);
              background: var(--neutral-bg);
              font-size: 12px;
              font-weight: 600;
            "
            :title="`${allSessions().length} sessions`"
            x-text="allSessions().length"
          ></span>
        </div>

        <div
          style="
            border-top: 1px solid var(--border-subtle);
            padding-top: 8px;
            flex-shrink: 0;
          "
        >
          <button
            @click="sessionsCollapsed = !sessionsCollapsed"
            class="gf-btn gf-btn-md gf-btn-secondary"
            type="button"
            :aria-expanded="(!sessionsCollapsed).toString()"
            aria-controls="workspace-session-sidebar-content"
            :title="sessionsCollapsed ? 'Open sidebar' : 'Close sidebar'"
            :style="{ width: '100%', justifyContent: sessionsCollapsed ? 'center' : 'flex-start', padding: sessionsCollapsed ? '8px 0' : '8px 10px' }"
          >
            <span
              aria-hidden="true"
              style="
                display: inline-flex;
                width: 18px;
                height: 18px;
                flex-shrink: 0;
              "
            >
              <svg
                x-show="!sessionsCollapsed"
                role="img"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="100%"
                height="100%"
                viewBox="0 0 20 20"
              >
                <path
                  fill="currentColor"
                  fill-rule="evenodd"
                  d="M9.749 5.244c.309.3.333.773.071 1.1l-.071.079L6.07 10l3.679 3.577c.309.3.333.774.071 1.1l-.071.079a.876.876 0 0 1-1.131.07l-.081-.07-4.286-4.167a.816.816 0 0 1-.071-1.1l.071-.078 4.286-4.167a.875.875 0 0 1 1.212 0zm6 0c.309.3.333.773.071 1.1l-.071.079L12.07 10l3.679 3.577c.309.3.333.774.071 1.1l-.071.079a.876.876 0 0 1-1.131.07l-.081-.07-4.286-4.167a.816.816 0 0 1-.071-1.1l.071-.078 4.286-4.167a.875.875 0 0 1 1.212 0z"
                ></path>
              </svg>
              <svg
                x-show="sessionsCollapsed"
                role="img"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="100%"
                height="100%"
                viewBox="0 0 20 20"
              >
                <path
                  fill="currentColor"
                  fill-rule="evenodd"
                  d="M11.382 5.175l.081.07L15.75 9.41c.309.3.333.773.071 1.1l-.071.078-4.286 4.167a.875.875 0 0 1-1.212 0 .816.816 0 0 1-.071-1.1l.071-.079L13.93 10l-3.679-3.577a.816.816 0 0 1-.071-1.1l.071-.079a.876.876 0 0 1 1.131-.07zm-6 0l.081.07L9.75 9.41c.309.3.333.773.071 1.1l-.071.078-4.286 4.167a.875.875 0 0 1-1.212 0 .816.816 0 0 1-.071-1.1l.071-.079L7.93 10 4.251 6.423a.816.816 0 0 1-.071-1.1l.071-.079a.876.876 0 0 1 1.131-.07z"
                ></path>
              </svg>
            </span>
            <span
              x-show="!sessionsCollapsed"
              x-text="sessionsCollapsed ? 'Open sidebar' : 'Close sidebar'"
            ></span>
            <span
              x-show="sessionsCollapsed"
              class="sr-only"
              x-text="sessionsCollapsed ? 'Open sidebar' : 'Close sidebar'"
            ></span>
          </button>
        </div>
      </div>

      <!-- Right terminal panel -->
      <div
        class="gf-card"
        style="
          display: flex;
          flex-direction: column;
          overflow: hidden;
          min-height: 0;
        "
      >
        <template x-if="!terminalAvailable">
          <div class="flex-1 flex items-center justify-center">
            <div class="text-center space-y-3 max-w-md px-4">
              <div class="text-4xl">&#9000;</div>
              <h2 class="text-xl font-semibold gf-text-secondary">
                Terminal not available
              </h2>
              <p class="text-sm gf-text-muted">
                node-pty failed to compile. Install C++ build tools, then
                rebuild:
              </p>
              <div class="gf-card" style="padding: 10px 12px; text-align: left">
                <template x-if="platformHint === 'linux'">
                  <code class="block text-xs font-mono gf-text-secondary"
                    >sudo apt install build-essential python3 && npm rebuild
                    node-pty</code
                  >
                </template>
                <template x-if="platformHint === 'darwin'">
                  <code class="block text-xs font-mono gf-text-secondary"
                    >xcode-select --install && npm rebuild node-pty</code
                  >
                </template>
                <template x-if="platformHint === 'win32'">
                  <code class="block text-xs font-mono gf-text-secondary"
                    >npm rebuild node-pty</code
                  >
                </template>
                <template x-if="!platformHint">
                  <code class="block text-xs font-mono gf-text-secondary"
                    >npm rebuild node-pty</code
                  >
                </template>
                <code class="block text-xs font-mono gf-text-secondary mt-1"
                  >pnpm: pnpm approve-builds</code
                >
              </div>
              <p class="text-xs gf-text-muted" style="margin-top: 8px">
                The CLI auditor, setup, and all other dashboard tabs work
                without node-pty. This only affects the embedded terminal.
              </p>
              <p class="text-xs gf-text-muted">
                Not using the embedded terminal? Install with
                <code class="font-mono">--omit=optional</code> to skip the
                native build entirely.
              </p>
            </div>
          </div>
        </template>

        <template x-if="terminalAvailable && !terminalSessionId">
          <div class="flex-1 flex items-center justify-center">
            <div class="text-center space-y-3">
              <p class="gf-text-muted">No active terminal session</p>
              <button
                @click="launchInTerminal('', activeRunner, { promptLabel: 'Manual session' })"
                :disabled="launching || serverSessions.length >= serverMaxSessions"
                :title="serverSessions.length >= serverMaxSessions ? 'Session limit reached. End one to launch another.' : 'Open terminal'"
                class="gf-btn gf-btn-md gf-btn-primary"
              >
                <span
                  x-text="launching ? 'Launching terminal...' : 'Open terminal'"
                ></span>
              </button>
            </div>
          </div>
        </template>

        <template x-if="terminalAvailable && sessions.length > 0">
          <div class="flex flex-col flex-1 overflow-hidden">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-subtle);
                flex-shrink: 0;
              "
            >
              <div style="display: flex; gap: 10px; min-width: 0">
                <span
                  class="gf-status-dot"
                  :class="terminalConnected ? 'gf-status-running' : 'gf-status-recent'"
                  :aria-label="terminalConnected ? 'Running' : 'Disconnected'"
                  x-text="terminalConnected ? '●' : '○'"
                  style="margin-top: 4px"
                ></span>
                <div style="min-width: 0">
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      min-width: 0;
                    "
                  >
                    <h3
                      class="gf-text-primary"
                      style="
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                        font-size: 14px;
                        font-weight: 600;
                      "
                      :title="lastRunPrompt || 'Runner session'"
                      x-text="lastRunPrompt || 'Runner session'"
                    ></h3>
                    <span
                      x-show="terminalAwaitingInput"
                      style="
                        font-family: var(--font-mono);
                        font-size: 10px;
                        padding: 1px 7px;
                        border-radius: 999px;
                        border: 1px solid var(--amber-border);
                        color: var(--amber-400);
                        background: var(--amber-bg);
                        white-space: nowrap;
                      "
                      >Awaiting input</span
                    >
                  </div>
                  <p
                    class="gf-text-muted"
                    style="font-size: 12px; margin: 3px 0 0"
                  >
                    <span
                      class="mono"
                      x-text="lastRunAgent || activeRunner"
                    ></span>
                    <span style="color: var(--text-disabled); margin: 0 6px"
                      >·</span
                    >
                    <span class="mono" x-text="terminalAge || '0m'"></span>
                  </p>
                </div>
              </div>
              <div style="display: flex; gap: 6px; flex-shrink: 0">
                <button
                  @click="exitTerminal()"
                  class="gf-btn gf-btn-sm gf-btn-danger-solid"
                >
                  End session
                </button>
              </div>
            </div>

            <div class="flex-1 relative">
              <template x-for="session in sessions" :key="session.id">
                <div
                  :id="`gf-terminal-${session.id}`"
                  class="terminal-container"
                  x-show="session.id === activeSessionId"
                  style="position: absolute; inset: 0"
                ></div>
              </template>
              <div x-show="terminalEnded" class="terminal-overlay">
                <div class="text-center space-y-3">
                  <p
                    class="text-white text-lg font-semibold"
                    x-text="_projectSessions[projectPath] ? 'Session detached' : 'Session ended'"
                  ></p>
                  <div class="flex gap-2 justify-center">
                    <button
                      x-show="_projectSessions[projectPath]"
                      @click="reconnectTerminal()"
                      class="gf-btn gf-btn-md gf-btn-primary"
                    >
                      Reconnect
                    </button>
                    <button
                      @click="exitTerminal()"
                      class="gf-btn gf-btn-md gf-btn-secondary"
                    >
                      New Session
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
