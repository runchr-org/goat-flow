    <!-- ═══ Workspace View (split-pane: prompts left, terminal right) ═══ -->
    <div x-show="activeView === 'workspace'" x-cloak class="flex" style="height: calc(100vh - 5rem)">

      <!-- Mobile sub-tab toggle -->
      <div class="md:hidden flex border-b border-gray-200 dark:border-gray-700 absolute top-0 left-0 right-0 z-10 bg-white dark:bg-gray-900">
        <button @click="workspacePanel = 'prompts'" :class="workspacePanel === 'prompts' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500'"
          class="flex-1 py-2 text-xs font-medium border-b-2 transition-colors">Prompts</button>
        <button @click="workspacePanel = 'terminal'" :class="workspacePanel === 'terminal' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500'"
          class="flex-1 py-2 text-xs font-medium border-b-2 transition-colors relative">Terminal
          <span x-show="terminalSessionId && !terminalEnded" class="absolute top-1 right-4 w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        </button>
      </div>

      <!-- Left Panel: Prompts -->
      <div :class="workspacePanel === 'prompts' ? '' : 'hidden md:flex'"
        class="w-full md:w-72 lg:w-80 shrink-0 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex flex-col overflow-hidden md:pt-0 pt-10">

        <!-- Search + Category filters (sticky) -->
        <div class="px-3 py-2 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-0 z-10 space-y-1.5">
          <div class="relative">
            <input type="text" x-model="presetSearch" placeholder="Search prompts..."
              x-ref="presetSearchInput"
              class="w-full px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:ring-1 focus:ring-blue-500 pr-12">
            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs text-gray-300 dark:text-gray-600 pointer-events-none">/</span>
            <button x-show="presetSearch" @click="presetSearch = ''" class="absolute right-1.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xs">&times;</button>
          </div>
        </div>
        <div class="px-3 py-1.5 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-1 bg-white dark:bg-gray-800 sticky top-8 z-10">
          <template x-for="cat in presetCats" :key="cat.id">
            <button @click="presetFilter = cat.id"
              :class="presetFilter === cat.id ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'"
              class="px-2 py-0.5 text-xs font-medium rounded-full transition-colors" x-text="cat.label + (cat.id !== 'all' && cat.id !== 'favorites' ? ' (' + presets.filter(p => p.cat === cat.id).length + ')' : '')"></button>
          </template>
        </div>

        <!-- Prompt list (scrollable) -->
        <div class="flex-1 overflow-y-auto pb-16">
          <template x-for="preset in filteredPresets" :key="preset.id">
            <div class="border-b border-gray-100 dark:border-gray-700 border-l-2 px-3 py-2.5 hover:bg-gray-50 dark:hover:bg-gray-750 flex items-start gap-2"
              :class="{
                'border-l-blue-400': preset.cat === 'debug & explore',
                'border-l-purple-400': preset.cat === 'review',
                'border-l-amber-400': preset.cat === 'plan',
                'border-l-green-400': preset.cat === 'test',
                'border-l-red-400': preset.cat === 'security',
                'border-l-gray-400': preset.cat === 'utility'
              }">
              <button @click.stop="toggleFavorite(preset.id)" class="shrink-0 text-sm transition-colors"
                :class="isFavorite(preset.id) ? 'text-yellow-400' : 'text-gray-300 dark:text-gray-600 hover:text-yellow-300'"
                x-text="isFavorite(preset.id) ? '★' : '☆'"
                :title="isFavorite(preset.id) ? 'Remove from favorites' : 'Add to favorites'"></button>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" x-text="preset.name"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-2" x-text="preset.desc"></p>
                <span class="text-xs px-1.5 py-0.5 rounded-full mt-1 inline-block"
                  :class="{
                    'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400': preset.cat === 'debug & explore',
                    'bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400': preset.cat === 'review',
                    'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400': preset.cat === 'plan',
                    'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400': preset.cat === 'test',
                    'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400': preset.cat === 'security',
                    'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400': preset.cat === 'utility'
                  }" x-text="preset.cat"></span>
              </div>
              <button x-data="{ copied: false }" @click="copyPreset(preset.prompt); copied = true; setTimeout(() => copied = false, 1000)"
                class="shrink-0 p-1.5 transition-colors" :class="copied ? 'text-green-500' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'" title="Copy prompt to clipboard">
                <svg x-show="!copied" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                <svg x-show="copied" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
              </button>
              <button x-show="terminalAvailable && (!terminalSessionId || terminalEnded)"
                @click="launchPreset(preset.prompt, activeRunner); workspacePanel = 'terminal'"
                class="shrink-0 p-1.5 rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors"
                title="Launch in terminal">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
              </button>
              <button x-show="terminalSessionId && !terminalEnded"
                @click="sendToTerminal(preset.prompt); workspacePanel = 'terminal'"
                class="shrink-0 p-1.5 rounded-md bg-green-600 text-white hover:bg-green-700 transition-colors"
                title="Send to terminal">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95l15.556-6.374a.75.75 0 000-1.374L3.105 2.289z"/></svg>
              </button>
            </div>
          </template>
          <p x-show="filteredPresets.length === 0 && presetFilter === 'favorites'" class="text-xs text-gray-400 p-3 text-center">No favorites yet. Click &#9733; on any prompt to pin it here.</p>
          <p x-show="filteredPresets.length === 0 && presetFilter !== 'favorites'" class="text-xs text-gray-400 p-3 text-center">No presets in this category.</p>
        </div>
      </div>

      <!-- Right Panel: Terminal -->
      <div :class="workspacePanel === 'terminal' ? '' : 'hidden md:flex'"
        class="flex-1 flex flex-col overflow-hidden bg-gray-50 dark:bg-gray-900 md:pt-0 pt-10">

        <!-- node-pty missing -->
        <div x-show="!terminalAvailable" class="flex-1 flex items-center justify-center">
          <div class="text-center space-y-4 max-w-md">
            <div class="text-4xl">&#9000;</div>
            <h2 class="text-xl font-semibold text-gray-600 dark:text-gray-300">Terminal not available</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400">Requires <strong>node-pty</strong>. Common with pnpm.</p>
            <div class="bg-gray-100 dark:bg-gray-800 rounded-lg p-3 text-left space-y-2">
              <code class="block text-xs font-mono text-gray-700 dark:text-gray-300">npm install node-pty</code>
              <code class="block text-xs font-mono text-gray-700 dark:text-gray-300">pnpm approve-builds</code>
            </div>
          </div>
        </div>

        <!-- No session placeholder -->
        <div x-show="terminalAvailable && !terminalSessionId" class="flex-1 flex items-center justify-center">
          <div class="text-center space-y-3">
            <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <p class="text-sm text-gray-400 dark:text-gray-500">No active terminal session</p>
            <p class="text-xs text-gray-400 dark:text-gray-500">Click <strong>Launch</strong> on a prompt to start one.</p>
          </div>
        </div>

        <!-- Active session -->
        <template x-if="terminalAvailable && terminalSessionId">
          <div class="flex flex-col flex-1 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shrink-0">
              <div class="flex items-center gap-3">
                <h2 class="text-sm font-bold">Terminal</h2>
                <span class="flex items-center gap-1.5 text-xs">
                  <span class="w-2 h-2 rounded-full" :class="terminalConnected ? 'bg-green-500' : 'bg-red-500'"></span>
                  <span x-text="terminalConnected ? 'Connected' : 'Disconnected'" class="text-gray-400"></span>
                </span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400">Ctrl+Shift+D</span>
                <button @click="exitTerminal()" class="px-2 py-1 text-xs font-medium rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                  End Session
                </button>
              </div>
            </div>
            <div class="flex-1 relative">
              <div x-ref="terminalContainer" class="terminal-container"></div>
              <div x-show="terminalEnded" class="terminal-overlay">
                <div class="text-center space-y-3">
                  <p class="text-white text-lg font-semibold">Session ended</p>
                  <button @click="exitTerminal()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                    New Session
                  </button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
