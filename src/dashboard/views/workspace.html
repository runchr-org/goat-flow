<!-- ═══ Workspace View ═══ -->
<div
  x-show="activeView === 'workspace'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow: hidden"
  x-data="{
    allSessions() { return [...currentProjectSessions, ...otherProjectSessions]; },
    recentSessions() { return allSessions().filter(s => s.status !== 'active').slice(0, 4); },
    waitingSessions() {
      return allSessions().filter(s => typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60);
    },
    meterRunning() { return allSessions().filter(s => s.status === 'active').length; },
    meterRecent() { return recentSessions().length; },
    meterWaiting() { return waitingSessions().length; },
    ageLabel(s) {
      const m = Math.floor((s.age || 0) / 60);
      const h = Math.floor(m / 60);
      return h > 0 ? h + 'h ' + (m % 60) + 'm' : m + 'm';
    },
    openSession(s) {
      if (confirmEndSessionId === s.id) return;
      if (isSessionBoundLocally(s.id)) activeSessionId = s.id;
      else openServerSession(s);
    }
  }"
>
  <div
    style="
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 16px 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
    "
  >
    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 14px">
      <div style="max-width: 720px">
        <h2 class="gf-text-primary" style="font-size: 18px; font-weight: 600; margin-bottom: 4px">Workspace</h2>
        <p class="gf-text-muted" style="font-size: 14px">
          Terminal sessions running across projects. Pick a session on the left
          to inspect output and continue work.
        </p>
      </div>
      <div class="gf-card" style="padding: 6px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
        <span class="gf-text-muted" style="font-size: 12px" x-text="`${serverSessions.length} of ${serverMaxSessions}`"></span>
        <span class="gf-text-muted">·</span>
        <span style="width: 8px; height: 8px; border-radius: 999px; background: #4ade80"></span>
        <span class="gf-text-muted" style="font-size: 12px" x-text="`${meterRunning()} running`"></span>
        <span class="gf-text-muted">·</span>
        <span style="width: 8px; height: 8px; border-radius: 999px; background: #fbbf24"></span>
        <span class="gf-text-muted" style="font-size: 12px" x-text="`${meterWaiting()} waiting`"></span>
        <span class="gf-text-muted">·</span>
        <span class="gf-text-muted" style="font-size: 12px" x-text="`${meterRecent()} recent`"></span>
      </div>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
        gap: 12px;
        flex: 1;
        min-height: 0;
      "
    >
      <!-- Left rail -->
      <div style="display: flex; flex-direction: column; gap: 12px; min-height: 0">
        <div style="display: flex; flex-direction: column; min-height: 0; flex: 1">
          <div class="section-label" style="margin-bottom: 8px">Active <span x-text="allSessions().length"></span></div>
          <div class="scrollbar" style="display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding-right: 4px; flex: 1">
            <template x-for="s in allSessions()" :key="'ws-s-' + s.id">
              <div
                @click="openSession(s)"
                class="gf-card"
                :style="{
                  padding: '10px 12px',
                  cursor: 'pointer',
                  borderColor: s.id === activeSessionId ? 'var(--accent-border)' : ((typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60) ? 'rgba(245,158,11,0.35)' : undefined),
                  background: s.id === activeSessionId ? 'rgba(74,222,128,0.04)' : ((typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60) ? 'rgba(245,158,11,0.04)' : undefined)
                }"
              >
                <div style="display: flex; gap: 10px; align-items: flex-start">
                  <span
                    style="width: 8px; height: 8px; border-radius: 999px; margin-top: 5px; flex-shrink: 0"
                    :style="{ background: (typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60) ? '#fbbf24' : (s.status === 'active' ? '#4ade80' : '#9ca3af') }"
                  ></span>
                  <div style="min-width: 0; flex: 1">
                    <div class="gf-text-primary" style="font-size: 13px; font-weight: 500" x-text="sessions.find(x => x.id === s.id)?.promptLabel || 'Terminal session'"></div>
                    <p class="gf-text-muted" style="font-size: 12px; margin: 2px 0 0">
                      <span x-text="s.projectName || projectName"></span>
                      <span style="color: var(--text-dim)"> · </span>
                      <span class="mono" x-text="s.runner"></span>
                    </p>
                    <p
                      style="font-size: 12px; margin: 4px 0 0"
                      :style="{ color: (typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60) ? '#fbbf24' : 'var(--text-muted)' }"
                    >
                      <span x-text="(typeof s.idleDuration === 'number' && s.idleDuration >= 45 * 60) ? 'Waiting' : 'Running'"></span>
                      <span class="mono" style="color: var(--text-dim); margin-left: 5px" x-text="ageLabel(s)"></span>
                    </p>
                  </div>
                  <button
                    @click.stop="confirmEndSessionId = (confirmEndSessionId === s.id ? null : s.id)"
                    class="gf-btn gf-btn-sm"
                    style="font-size: 11px"
                  >
                    End
                  </button>
                </div>
                <div
                  x-show="confirmEndSessionId === s.id"
                  style="margin-top: 7px; display: flex; justify-content: flex-end; gap: 6px"
                >
                  <button @click.stop="endServerSession(s.id); confirmEndSessionId = null" class="gf-btn gf-btn-sm gf-btn-danger">Yes</button>
                  <button @click.stop="confirmEndSessionId = null" class="gf-btn gf-btn-sm">No</button>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; min-height: 0; max-height: 180px">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px">
            <div class="section-label">Recent <span x-text="recentSessions().length"></span></div>
            <button @click="endAllSessions()" class="gf-btn gf-btn-sm">Clear</button>
          </div>
          <div class="scrollbar" style="display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding-right: 4px">
            <template x-for="s in recentSessions()" :key="'ws-r-' + s.id">
              <div class="gf-card" style="padding: 8px 10px; opacity: 0.8">
                <div class="gf-text-primary" style="font-size: 13px; font-weight: 500" x-text="sessions.find(x => x.id === s.id)?.promptLabel || 'Terminal session'"></div>
                <p class="gf-text-muted" style="font-size: 12px; margin: 2px 0 0">
                  <span x-text="s.projectName || projectName"></span>
                  <span style="color: var(--text-dim)"> · </span>
                  <span class="mono" x-text="s.runner"></span>
                </p>
              </div>
            </template>
          </div>
        </div>

        <button
          @click="activeView = 'prompts'; $nextTick(() => { $refs.presetSearchInput && $refs.presetSearchInput.focus(); })"
          class="gf-btn gf-btn-md"
          style="justify-content: center; padding: 10px"
        >
          + Launch from prompts
        </button>
      </div>

      <!-- Right terminal panel -->
      <div class="gf-card" style="display: flex; flex-direction: column; overflow: hidden; min-height: 0">
        <template x-if="!terminalAvailable">
          <div class="flex-1 flex items-center justify-center">
            <div class="text-center space-y-3 max-w-md px-4">
              <div class="text-4xl">&#9000;</div>
              <h2 class="text-xl font-semibold gf-text-secondary">Terminal not available</h2>
              <p class="text-sm gf-text-muted">Requires node-pty. Common with pnpm.</p>
              <div class="gf-card" style="padding: 10px 12px; text-align: left">
                <code class="block text-xs font-mono gf-text-secondary">npm install node-pty</code>
                <code class="block text-xs font-mono gf-text-secondary">pnpm approve-builds</code>
              </div>
            </div>
          </div>
        </template>

        <template x-if="terminalAvailable && !terminalSessionId">
          <div class="flex-1 flex items-center justify-center">
            <p class="gf-text-muted">No active terminal session</p>
          </div>
        </template>

        <template x-if="terminalAvailable && sessions.length > 0">
          <div class="flex flex-col flex-1 overflow-hidden">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0">
              <div style="display: flex; gap: 10px; min-width: 0">
                <span style="width: 8px; height: 8px; border-radius: 999px; margin-top: 6px; background: #4ade80"></span>
                <div style="min-width: 0">
                  <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
                    <h3 class="gf-text-primary" style="font-size: 14px; font-weight: 600" x-text="lastRunPrompt || 'Terminal'"></h3>
                    <span
                      x-show="lastRunPrompt"
                      style="font-family: var(--font-mono); font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--accent-border); color: var(--accent); background: var(--accent-bg)"
                    >active</span>
                  </div>
                  <p class="gf-text-muted" style="font-size: 12px; margin: 3px 0 0">
                    <span style="color: #4ade80" x-text="terminalConnected ? 'Running' : 'Disconnected'"></span>
                    <span style="color: var(--text-dim); margin: 0 6px">·</span>
                    <span class="mono" x-text="lastRunAgent || activeRunner"></span>
                    <span style="color: var(--text-dim); margin: 0 6px">·</span>
                    <span class="mono" x-text="terminalAge"></span>
                  </p>
                </div>
              </div>
              <div style="display: flex; gap: 6px; flex-shrink: 0">
                <button @click="sendToTerminal('clear', { adapt: false })" class="gf-btn gf-btn-sm">Clear</button>
                <button @click="detachTerminal(projectPath)" class="gf-btn gf-btn-sm">Detach</button>
                <button @click="exitTerminal()" class="gf-btn gf-btn-sm gf-btn-danger">Stop</button>
              </div>
            </div>

            <div class="flex-1 relative">
              <template x-for="session in sessions" :key="session.id">
                <div
                  :id="`gf-terminal-${session.id}`"
                  class="terminal-container"
                  x-show="session.id === activeSessionId"
                  style="position: absolute; inset: 0"
                ></div>
              </template>
              <div x-show="terminalEnded" class="terminal-overlay">
                <div class="text-center space-y-3">
                  <p class="text-white text-lg font-semibold" x-text="_projectSessions[projectPath] ? 'Session detached' : 'Session ended'"></p>
                  <div class="flex gap-2 justify-center">
                    <button
                      x-show="_projectSessions[projectPath]"
                      @click="reconnectTerminal()"
                      class="px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors"
                    >
                      Reconnect
                    </button>
                    <button
                      @click="exitTerminal()"
                      class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors"
                    >
                      New Session
                    </button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </template>
      </div>
    </div>
  </div>
</div>
