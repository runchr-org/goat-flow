<!-- ═══ Home View ═══ -->
<div
  x-show="activeView === 'home'"
  x-cloak
  style="height: calc(100vh - 5rem); overflow-y: auto"
>
  <div style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px">
    <!-- Recommended actions -->
    <div
      x-show="report"
      x-cloak
      x-data="{
        hasSetupFail() { return report?.scopes?.setup?.status === 'fail'; },
        hasHarnessFail() { return (report?.agentScores || []).some(a => a.agent?.status === 'fail'); },
        hasQualityGaps() {
          const agents = report?.agentScores || [];
          if (agents.length === 0) return false;
          return agents.some(a => a.concerns && Object.values(a.concerns).some(c => c.status === 'fail'));
        },
        integrityFailTotal() {
          let n = 0;
          for (const a of (report?.agentScores || [])) {
            if (!a.concerns) continue;
            for (const ck of Object.keys(a.concerns)) n += (a.concerns[ck].integrityFail || 0);
          }
          return n;
        },
        advisoryFailTotal() {
          let n = 0;
          for (const a of (report?.agentScores || [])) {
            if (!a.concerns) continue;
            for (const ck of Object.keys(a.concerns)) n += (a.concerns[ck].advisoryFail || 0);
          }
          return n;
        },
        priority() {
          if (this.hasSetupFail()) return 'setup';
          if (this.hasHarnessFail()) return 'harness';
          if (this.hasQualityGaps()) return 'completeness';
          return 'healthy';
        },
        heading() {
          if (this.priority() === 'completeness') {
            const i = this.integrityFailTotal();
            const a = this.advisoryFailTotal();
            return `Workflow quality: ${i} integrity issue${i !== 1 ? 's' : ''}, ${a} advisory improvement${a !== 1 ? 's' : ''}`;
          }
          const h = { setup: 'Setup needs attention', harness: 'Agent harness needs fixing', healthy: 'Recommended actions' };
          return h[this.priority()] || 'Recommended actions';
        },
        subtext() {
          const s = {
            setup: 'Setup checks are failing - fix these before running quality prompts.',
            harness: 'Agent harness checks are failing - resolve these to unblock concern checks.',
            completeness: 'Integrity issues are install drift (must fix). Advisory items are best practice - fix or add the check id to harness.acknowledge in .goat-flow/config.yaml.',
            healthy: 'All checks passing - these are your highest-leverage next actions.'
          };
          return s[this.priority()] || '';
        },
        setupFixPrompt() {
          const failures = report?.scopes?.setup?.failures || [];
          if (failures.length === 0) return '/goat fix setup issues';
          let num = 1;
          const lines = failures.map(f => `${num++}. **${f.check}** - ${f.message}\n   Fix: ${f.howToFix || 'See setup step for this check.'}`).join('\n');
          return `Fix these ${failures.length} setup failures:\n\n` + lines + '\n\nTarget: all setup checks passing.';
        },
        harnessFixPrompt() {
          const sections = [];
          for (const a of (report?.agentScores || [])) {
            if (a.agent?.status !== 'fail') continue;
            const label = a.id === 'claude' ? 'Claude Code' : a.id === 'codex' ? 'Codex' : 'Gemini CLI';
            let num = 1;
            const fails = (a.agent.failures || []).map(f => `${num++}. **${f.check}** - ${f.message}\n   Fix: ${f.howToFix || 'See harness documentation for this check.'}`).join('\n');
            sections.push(`**${label}:**\n${fails}`);
          }
          const totalChecks = (report?.agentScores || []).reduce((n, a) => Math.max(n, a.agent?.checks?.length || 0), 0);
          return `Fix these agent setup check failures:\n\n` + sections.join('\n\n') + `\n\nTarget: all ${totalChecks} agent setup checks passing for each agent.`;
        },
        qualityFixPrompt() {
          const sections = [];
          for (const a of (report?.agentScores || [])) {
            if (!a.harness) continue;
            const label = a.id === 'claude' ? 'Claude Code' : a.id === 'codex' ? 'Codex' : 'Gemini CLI';
            const integrity = [];
            const advisory = [];
            for (const check of (a.harness.checks || [])) {
              if (check.status !== 'fail' || check.acknowledged) continue;
              if (check.type === 'integrity') integrity.push(check);
              else if (check.type === 'advisory') advisory.push(check);
            }
            if (integrity.length === 0 && advisory.length === 0) continue;
            const lines = [`**${label}:**`];
            let n = 1;
            if (integrity.length > 0) {
              lines.push(`*Integrity (drift from install — must fix):*`);
              for (const c of integrity) {
                lines.push(`${n++}. **${c.name}** — ${c.failure?.message || ''}`);
                if (c.failure?.howToFix) lines.push(`   Fix: ${c.failure.howToFix}`);
                lines.push(`   Verify: \`npx goat-flow audit . --harness\` shows \`${c.id}\` passing`);
              }
            }
            if (advisory.length > 0) {
              lines.push(`*Advisory (best practice — fix or acknowledge):*`);
              for (const c of advisory) {
                lines.push(`${n++}. **${c.name}** — ${c.failure?.message || ''}`);
                if (c.failure?.howToFix) lines.push(`   Fix: ${c.failure.howToFix}`);
                lines.push(`   Or silence: add \`${c.id}\` to \`harness.acknowledge\` in \`.goat-flow/config.yaml\``);
                lines.push(`   Verify: \`npx goat-flow audit . --harness\` shows \`${c.id}\` passing or acknowledged`);
              }
            }
            sections.push(lines.join('\n'));
          }
          if (sections.length === 0) return '/goat audit harness';
          return `Fix these harness check failures:\n\n` + sections.join('\n\n') + '\n\nTarget: all integrity checks passing, all advisory checks passing or acknowledged.';
        }
      }"
      style="margin-bottom: 20px"

          constraints:   { label: 'Constraints',   subtitle: 'Do deterministic rules catch failures before the LLM runs?' },
          verification:  { label: 'Verification',  subtitle: 'Can the agent verify its own work honestly?' },
          recovery:      { label: 'Recovery',      subtitle: 'Can the agent resume after crash or compaction?' },
          feedback_loop: { label: 'Feedback Loop', subtitle: 'Is the harness getting smarter from failures?' }
        },
        concernKeys: ['context', 'constraints', 'verification', 'recovery', 'feedback_loop'],
        statusColor(s) { return s === 'pass' ? 'var(--green-400)' : 'var(--red-400)' },
        scoreColor(score) { return score >= 80 ? 'var(--green-400)' : score >= 70 ? 'var(--yellow-400, #facc15)' : score >= 60 ? 'var(--orange-400, #fb923c)' : 'var(--red-400)' },
        scoreBg(score) { return score >= 80 ? 'var(--green-900, #14532d)' : score >= 70 ? 'var(--yellow-900, #713f12)' : score >= 60 ? 'var(--orange-900, #7c2d12)' : 'var(--red-900, #7f1d1d)' },
        agentScore(agent) { if (!agent.harness) return null; const t = agent.harness.checks.length; return t ? Math.round(agent.harness.checks.filter(c => c.status === 'pass').length / t * 100) : null; },
        concernBadge(c) {
          const parts = [];
          const iTotal = (c.integrityPass || 0) + (c.integrityFail || 0);
          if (iTotal > 0) parts.push(`I ${c.integrityPass || 0}/${iTotal}`);
          const aTotal = (c.advisoryPass || 0) + (c.advisoryFail || 0) + (c.advisoryAcknowledged || 0);
          if (aTotal > 0) {
            const ackPart = c.advisoryAcknowledged > 0 ? ` (${c.advisoryAcknowledged} ack)` : '';
            parts.push(`A ${(c.advisoryPass || 0) + (c.advisoryAcknowledged || 0)}/${aTotal}${ackPart}`);
          }
          if (c.metrics > 0) parts.push(`m ${c.metrics}`);
          return parts.join(' · ');
        },
        toGrade(s) { if (s >= 90) return 'A'; if (s >= 80) return 'B'; if (s >= 70) return 'C'; if (s >= 60) return 'D'; return 'F'; },
        checkDescriptions: {
          'agent-instruction': 'The agent has a project-specific instruction file',
          'agent-skills': 'All 7 goat-flow skills are installed with matching versions',
          'agent-settings': 'Agent settings file parses correctly',
          'agent-deny-dangerous': 'Deny hook blocks destructive commands before they run'
        }
      }"
    >
      <div
        class="gf-text-primary"
        style="font-size: 20px; font-weight: 600; margin-bottom: 10px"
      >
        AI Harness
      </div>

      <!-- Agent cards (entire card is clickable, mini-bars are purely visual) -->
      <div
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <template
          x-for="agent in (report?.agentScores || [])"
          :key="'harness-' + agent.id"
        >
          <button
            @click="auditDetailAgent = (auditDetailAgent === agent.id ? null : agent.id); auditDetailScope = null"
            class="gf-card"
            style="
              padding: 16px 18px;
              cursor: pointer;
              transition: border-color 0.15s;
              text-align: left;
            "
            :style="{ borderColor: auditDetailAgent === agent.id ? 'var(--green-400)' : '' }"
          >
            <!-- Name + status -->
            <div
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 2px;
              "
            >
              <span
                class="gf-text-primary"
                style="font-size: 15px; font-weight: 600"
                x-text="agent.name"
              ></span>
              <div
                x-show="agentScore(agent) !== null"
                style="display: flex; align-items: baseline; gap: 4px"
              >
                <span
                  style="font-size: 20px; font-weight: 700"
                  :style="{ color: scoreColor(agentScore(agent)) }"
                  x-text="toGrade(agentScore(agent))"
                ></span>
                <span
                  style="font-size: 12px; font-weight: 600"
                  :style="{ color: scoreColor(agentScore(agent)) }"
                  x-text="agentScore(agent) + '%'"
                ></span>
              </div>
            </div>
            <!-- Check summary -->
            <div
              class="gf-text-muted"
              style="font-size: 11px; margin-bottom: 10px"
              x-text="agent.concerns
                ? (() => { const recs = concernKeys.reduce((n, k) => n + (agent.concerns[k]?.recommendations?.length || 0), 0); return recs === 0 ? 'All checks passing' : recs + ' recommendation' + (recs !== 1 ? 's' : ''); })()
                : `${agent.agent.checks.filter(c => c.status === 'pass').length}/${agent.agent.checks.length} checks`"
            ></div>
            <!-- Concern pass/fail indicators -->
            <template x-if="agent.concerns">
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-status-' + ck"
                >
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      padding: 2px 0;
                    "
                  >
                    <span
                      class="gf-text-muted"
                      style="
                        font-size: 10px;
                        width: 62px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      x-text="concernMeta[ck].label"
                    ></span>
                    <span
                      class="gf-text-secondary"
                      style="
                        flex: 1;
                        font-size: 10px;
                        font-variant-numeric: tabular-nums;
                        letter-spacing: 0.2px;
                      "
                      x-text="concernBadge(agent.concerns[ck])"
                    ></span>
                    <span
                      style="
                        font-size: 10px;
                        font-weight: 700;
                        width: 40px;
                        flex-shrink: 0;
                        text-align: right;
                        letter-spacing: 0.3px;
                      "
                      :style="{ color: statusColor(agent.concerns[ck].status) }"
                      x-text="agent.concerns[ck].status === 'pass' ? 'PASS' : 'FAIL'"
                    ></span>
                  </div>
                </template>
              </div>
            </template>
          </button>
        </template>
      </div>

      <!-- Agent detail panel (shows ALL 5 concerns when card clicked) -->
      <template
        x-for="agent in (report?.agentScores || [])"
        :key="'home-detail-' + agent.id"
      >
        <template x-if="auditDetailAgent === agent.id">
          <div
            style="
              margin-top: 16px;
              border-top: 0.5px solid var(--border-subtle);
              padding-top: 16px;
            "
          >
            <!-- Agent header -->
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
              "
            >
              <div
                class="gf-text-primary"
                style="font-size: 18px; font-weight: 500"
                x-text="agent.name"
              ></div>
              <template x-if="lastAuditTime">
                <span
                  class="gf-text-muted"
                  style="font-size: 12px"
                  x-text="'Last audited ' + formatTimeAgo(lastAuditTime)"
                ></span>
              </template>
            </div>

            <!-- Agent setup checks -->
            <div
              class="gf-card"
              style="
                border-radius: 8px;
                padding: 16px 20px;
                margin-bottom: 16px;
              "
            >
              <h3
                class="gf-text-muted"
                style="
                  font-size: 11px;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  margin-bottom: 12px;
                "
              >
                Agent Setup
                <span
                  class="gf-text-secondary"
                  style="margin-left: 4px"
                  x-text="`(${agent.agent.checks.filter(c => c.status === 'pass').length}/${agent.agent.checks.length} installed)`"
                ></span>
              </h3>
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="(check, idx) in agent.agent.checks"
                  :key="agent.id + '-home-check-' + idx"
                >
                  <div
                    :style="{
                      paddingBottom: check.failure ? '12px' : '4px',
                      borderBottom: check.failure ? '0.5px solid var(--border-subtle)' : 'none',
                      marginBottom: check.failure ? '4px' : '0'
                    }"
                  >
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        font-size: 13px;
                      "
                    >
                      <span
                        style="
                          flex-shrink: 0;
                          font-weight: 600;
                          width: 14px;
                          text-align: center;
                        "
                        :style="{ color: check.status === 'pass' ? 'var(--green-400)' : 'var(--red-400)' }"
                        x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                      ></span>
                      <div>
                        <span
                          class="gf-text-primary"
                          style="font-weight: 500"
                          x-text="check.name"
                        ></span>
                        <template x-if="checkDescriptions[check.id]">
                          <span
                            class="gf-text-muted"
                            style="font-size: 12px; margin-left: 6px"
                            x-text="'- ' + checkDescriptions[check.id]"
                          ></span>
                        </template>
                      </div>
                    </div>
                    <template x-if="check.failure">
                      <div style="margin-left: 22px">
                        <p
                          class="gf-text-muted"
                          style="font-size: 12px; margin-top: 2px"
                          x-text="check.failure.message"
                        ></p>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

            <!-- All 5 concern sections stacked -->
            <template x-if="agent.concerns">
              <div>
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-home-det-' + ck"
                >
                  <div
                    class="gf-card"
                    style="
                      border-radius: 8px;
                      padding: 16px 20px;
                      margin-bottom: 10px;
                    "
                  >
                    <div style="margin-bottom: 12px">
                      <div
                        style="
                          display: flex;
                          align-items: center;
                          justify-content: space-between;
                        "
                      >
                        <span
                          class="gf-text-primary"
                          style="font-size: 14px; font-weight: 600"
                          x-text="concernMeta[ck].label"
                        ></span>
                        <span
                          style="
                            display: inline-flex;
                            gap: 8px;
                            align-items: center;
                          "
                        >
                          <span
                            class="gf-text-secondary"
                            style="
                              font-size: 11px;
                              font-variant-numeric: tabular-nums;
                              letter-spacing: 0.2px;
                            "
                            x-text="concernBadge(agent.concerns[ck])"
                          ></span>
                          <span
                            style="
                              font-size: 13px;
                              font-weight: 700;
                              padding: 2px 10px;
                              border-radius: 4px;
                              letter-spacing: 0.4px;
                            "
                            :style="{
                              background: agent.concerns[ck].status === 'pass' ? 'var(--green-900, #14532d)' : 'var(--red-900, #7f1d1d)',
                              color: statusColor(agent.concerns[ck].status)
                            }"
                            x-text="agent.concerns[ck].status === 'pass' ? 'PASS' : 'FAIL'"
                          ></span>
                        </span>
                      </div>
                      <p
                        class="gf-text-muted"
                        style="font-size: 11px; margin-top: 2px"
                        x-text="concernMeta[ck].subtitle"
                      ></p>
                    </div>

                    <!-- Findings -->
                    <div
                      x-show="agent.concerns[ck].findings.length > 0"
                      style="margin-bottom: 10px"
                    >
                      <div
                        class="gf-text-muted"
                        style="
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          margin-bottom: 5px;
                          font-weight: 600;
                        "
                      >
                        Findings
                      </div>
                      <div
                        style="display: flex; flex-direction: column; gap: 2px"
                      >
                        <template
                          x-for="(finding, fi) in agent.concerns[ck].findings"
                          :key="agent.id + '-' + ck + '-hf-' + fi"
                        >
                          <div
                            style="
                              display: flex;
                              align-items: flex-start;
                              gap: 6px;
                              font-size: 12px;
                            "
                          >
                            <span
                              class="gf-text-muted"
                              style="flex-shrink: 0; line-height: 1.5"
                              >&#8226;</span
                            >
                            <span
                              class="gf-text-secondary"
                              style="line-height: 1.5"
                              x-text="finding"
                            ></span>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- Recommendations -->
                    <div x-show="agent.concerns[ck].recommendations.length > 0">
                      <div
                        class="gf-text-muted"
                        style="
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          margin-bottom: 5px;
                          font-weight: 600;
                        "
                      >
                        Recommendations
                      </div>
                      <div
                        style="display: flex; flex-direction: column; gap: 6px"
                      >
                        <template
                          x-for="(rec, ri) in agent.concerns[ck].recommendations"
                          :key="agent.id + '-' + ck + '-hr-' + ri"
                        >
                          <div>
                            <div
                              style="
                                display: flex;
                                align-items: flex-start;
                                gap: 6px;
                                font-size: 12px;
                              "
                            >
                              <span
                                style="
                                  color: var(--orange-400);
                                  flex-shrink: 0;
                                  font-weight: 600;
                                "
                                >&#8594;</span
                              >
                              <span
                                class="gf-text-primary"
                                style="font-weight: 500"
                                x-text="rec"
                              ></span>
                            </div>
                            <div
                              x-show="agent.concerns[ck].howToFix?.[ri]"
                              class="gf-bg-elevated"
                              style="
                                margin-top: 4px;
                                margin-left: 18px;
                                padding: 6px 10px;
                                border-radius: 4px;
                                font-size: 11px;
                              "
                            >
                              <span
                                class="gf-text-muted"
                                style="font-weight: 600"
                                >Fix:
                              </span>
                              <span
                                class="gf-text-secondary"
                                x-text="agent.concerns[ck].howToFix?.[ri]"
                              ></span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- All clear for this concern -->
                    <div
                      x-show="agent.concerns[ck].recommendations.length === 0"
                      style="font-size: 12px; padding: 6px 0"
                      class="gf-text-secondary"
                    >
                      All checks passing for this concern.
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </template>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 16px 0 8px"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
