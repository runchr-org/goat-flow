<!-- ═══ Home View ═══ -->
<div
  x-show="activeView === 'home'"
  x-cloak
  style="height: calc(100vh - 5rem); overflow-y: auto"
>
  <div style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px">
    <!-- Recommended actions -->
    <div
      x-show="report"
      x-cloak
      x-data="{
        hasSetupFail() { return report?.scopes?.setup?.status === 'fail'; },
        hasHarnessFail() { return (report?.agentScores || []).some(a => a.harness?.status === 'fail'); },
        hasQualityGaps() {
          const agents = report?.agentScores || [];
          if (agents.length === 0) return false;
          return agents.some(a => a.quality?.qualityScore !== null && a.quality?.qualityScore < 100);
        },
        qualityScore() { return report?.overall?.qualityScore ?? null; },
        priority() {
          if (this.hasSetupFail()) return 'setup';
          if (this.hasHarnessFail()) return 'harness';
          if (this.hasQualityGaps()) return 'quality';
          return 'healthy';
        },
        heading() {
          const h = { setup: 'Setup needs attention', harness: 'Agent harness needs fixing', quality: 'AI harness score needs improvement', healthy: 'Recommended actions' };
          return h[this.priority()] || 'Recommended actions';
        },
        subtext() {
          const s = {
            setup: 'Setup checks are failing - fix these before running quality prompts.',
            harness: 'Agent harness checks are failing - resolve these to unblock quality scoring.',
            quality: 'AI harness quality is below 100% - fix the recommendations to reach full score.',
            healthy: 'All checks passing at 100% - these are your highest-leverage next actions.'
          };
          return s[this.priority()] || '';
        },
        setupFixPrompt() {
          const failures = report?.scopes?.setup?.failures || [];
          if (failures.length === 0) return '/goat fix setup issues';
          let num = 1;
          const lines = failures.map(f => `${num++}. **${f.check}** - ${f.message}\n   Fix: ${f.howToFix || 'See setup step for this check.'}`).join('\n');
          return `Fix these ${failures.length} setup failures:\n\n` + lines + '\n\nTarget: all setup checks passing.';
        },
        harnessFixPrompt() {
          const sections = [];
          for (const a of (report?.agentScores || [])) {
            if (a.harness?.status !== 'fail') continue;
            const label = a.id === 'claude' ? 'Claude Code' : a.id === 'codex' ? 'Codex' : 'Gemini CLI';
            let num = 1;
            const fails = (a.harness.failures || []).map(f => `${num++}. **${f.check}** - ${f.message}\n   Fix: ${f.howToFix || 'See harness documentation for this check.'}`).join('\n');
            sections.push(`**${label}:**\n${fails}`);
          }
          return `Fix these agent setup check failures:\n\n` + sections.join('\n\n') + '\n\nTarget: all 10 agent setup checks passing for each agent.';
        },
        qualityFixPrompt() {
          const concernLabels = { context: 'Context', constraints: 'Constraints', verification: 'Verification', recovery: 'Recovery', feedback_loop: 'Feedback Loop' };
          const sections = [];
          for (const a of (report?.agentScores || [])) {
            if (!a.concerns || a.quality?.qualityScore === 100) continue;
            const label = a.id === 'claude' ? 'Claude Code' : a.id === 'codex' ? 'Codex' : 'Gemini CLI';
            const items = [];
            for (const [ck, cl] of Object.entries(concernLabels)) {
              const c = a.concerns[ck];
              if (!c || c.score >= 100) continue;
              const fixes = (c.howToFix || []).map(h => `   - ${h}`).join('\n');
              const recs = (c.recommendations || []).map(r => `   - ${r}`).join('\n');
              items.push(`  **${cl}** (${c.score}%):\n${fixes || recs}`);
            }
            if (items.length > 0) sections.push(`**${label}** (${a.quality?.qualityScore}%):\n${items.join('\n')}`);
          }
          return `Fix these AI harness quality gaps to reach 100%:\n\n` + sections.join('\n\n') + '\n\nTarget: all agents at 100% AI harness score.';
        }
      }"
      style="margin-bottom: 20px"
    >

        style="font-size: 20px; font-weight: 600; margin-bottom: 4px"

                />

        concernKeys: ['context', 'constraints', 'verification', 'recovery', 'feedback_loop'],
        scoreColor(s) { return s >= 80 ? 'var(--green-400)' : s >= 60 ? 'var(--orange-400)' : 'var(--red-400)' },

              <span
                class="gf-text-primary"
                style="font-size: 15px; font-weight: 600"
                x-text="agent.name"
              ></span>
              <div
                x-show="agent.quality?.grade"
                style="display: flex; align-items: baseline; gap: 4px"
              >
                <span
                  style="
                    font-size: 20px;
                    font-weight: 700;
                    letter-spacing: -1px;
                  "
                  :style="{ color: gradeColor(agent.quality?.grade) }"
                  x-text="agent.quality?.grade"
                ></span>
                <span
                  class="gf-text-muted"
                  style="font-size: 11px"
                  x-text="`${agent.quality?.qualityScore}%`"
                ></span>
              </div>
            </div>
            <!-- Recommendation summary -->
            <div
              class="gf-text-muted"
              style="font-size: 11px; margin-bottom: 10px"
              x-text="agent.concerns
                ? (() => { const recs = concernKeys.reduce((n, k) => n + (agent.concerns[k]?.recommendations?.length || 0), 0); return recs === 0 ? 'All quality checks passing' : recs + ' recommendation' + (recs !== 1 ? 's' : ''); })()
                : `${agent.harness.checks.filter(c => c.status === 'pass').length}/${agent.harness.checks.length} checks`"
            ></div>
            <!-- Concern mini-bars (purely visual - no individual click handlers) -->
            <template x-if="agent.concerns">
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-bar-' + ck"
                >
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      padding: 2px 0;
                    "
                  >
                    <span
                      class="gf-text-muted"
                      style="
                        font-size: 10px;
                        width: 62px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      x-text="concernMeta[ck].label"
                    ></span>
                    <div
                      style="
                        flex: 1;
                        height: 4px;
                        border-radius: 2px;
                        overflow: hidden;
                      "
                      :style="{ background: barBg(agent.concerns[ck].score) }"
                    >
                      <div
                        style="
                          height: 100%;
                          border-radius: 2px;
                          transition: width 0.3s ease;
                        "
                        :style="{
                          width: agent.concerns[ck].score + '%',
                          background: barFill(agent.concerns[ck].score)
                        }"
                      ></div>
                    </div>
                    <span
                      style="
                        font-size: 10px;
                        font-weight: 600;
                        width: 28px;
                        text-align: right;
                      "
                      :style="{ color: scoreColor(agent.concerns[ck].score) }"
                      x-text="`${agent.concerns[ck].score}%`"
                    ></span>
                  </div>
                </template>
              </div>
            </template>
          </button>
        </template>
      </div>

      <!-- Agent detail panel (shows ALL 5 concerns when card clicked) -->
      <template
        x-for="agent in (report?.agentScores || [])"
        :key="'home-detail-' + agent.id"
      >
        <template x-if="auditDetailAgent === agent.id">
          <div
            style="
              margin-top: 16px;
              border-top: 0.5px solid var(--border-subtle);
              padding-top: 16px;
            "
          >
            <!-- Agent header -->
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
              "
            >
              <div
                class="gf-text-primary"
                style="font-size: 18px; font-weight: 500"
                x-text="agent.name"
              ></div>
              <template x-if="lastAuditTime">
                <span
                  class="gf-text-muted"
                  style="font-size: 12px"
                  x-text="'Last audited ' + formatTimeAgo(lastAuditTime)"
                ></span>
              </template>
            </div>

            <!-- Agent setup checks -->
            <div
              class="gf-card"
              style="
                border-radius: 8px;
                padding: 16px 20px;
                margin-bottom: 16px;
              "
            >
              <h3
                class="gf-text-muted"
                style="
                  font-size: 11px;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  margin-bottom: 12px;
                "
              >
                Agent Setup Checks
                <span
                  class="gf-text-secondary"
                  style="margin-left: 4px"
                  x-text="`(${agent.harness.checks.filter(c => c.status === 'pass').length}/${agent.harness.checks.length} passed)`"
                ></span>
              </h3>
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="(check, idx) in agent.harness.checks"
                  :key="agent.id + '-home-check-' + idx"
                >
                  <div
                    :style="{
                      paddingBottom: check.failure ? '12px' : '4px',
                      borderBottom: check.failure ? '0.5px solid var(--border-subtle)' : 'none',
                      marginBottom: check.failure ? '4px' : '0'
                    }"
                  >
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        font-size: 13px;
                      "
                    >
                      <span
                        style="
                          flex-shrink: 0;
                          font-weight: 600;
                          width: 14px;
                          text-align: center;
                        "
                        :style="{ color: check.status === 'pass' ? 'var(--green-400)' : 'var(--red-400)' }"
                        x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                      ></span>
                      <span
                        class="gf-text-primary"
                        style="font-weight: 500"
                        x-text="check.name"
                      ></span>
                    </div>
                    <p
                      x-show="checkDescriptions[check.id]"
                      class="gf-text-muted"
                      style="
                        font-size: 11px;
                        margin: 2px 0 0 22px;
                        line-height: 1.4;
                      "
                      x-text="checkDescriptions[check.id]"
                    ></p>
                    <template x-if="check.failure">
                      <div style="margin-left: 22px">
                        <p
                          class="gf-text-muted"
                          style="font-size: 12px; margin-top: 2px"
                          x-text="check.failure.message"
                        ></p>
                        <div
                          x-show="check.failure.howToFix"
                          class="gf-bg-elevated"
                          style="
                            margin-top: 8px;
                            padding: 8px 12px;
                            border-radius: 6px;
                            font-size: 12px;
                          "
                        >
                          <div
                            class="gf-text-muted"
                            style="
                              font-size: 10px;
                              text-transform: uppercase;
                              letter-spacing: 0.5px;
                              margin-bottom: 4px;
                              font-weight: 600;
                            "
                          >
                            How to fix
                          </div>
                          <p
                            class="gf-text-secondary"
                            style="line-height: 1.5; margin: 0"
                            x-text="check.failure.howToFix"
                          ></p>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

            <!-- All 5 concern sections stacked -->
            <template x-if="agent.concerns">
              <div>
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-home-det-' + ck"
                >
                  <div
                    class="gf-card"
                    style="
                      border-radius: 8px;
                      padding: 16px 20px;
                      margin-bottom: 10px;
                    "
                  >
                    <div style="margin-bottom: 12px">
                      <div
                        style="
                          display: flex;
                          align-items: center;
                          justify-content: space-between;
                        "
                      >
                        <span
                          class="gf-text-primary"
                          style="font-size: 14px; font-weight: 600"
                          x-text="concernMeta[ck].label"
                        ></span>
                        <span
                          style="font-size: 14px; font-weight: 700"
                          :style="{ color: scoreColor(agent.concerns[ck].score) }"
                          x-text="`${agent.concerns[ck].score}%`"
                        ></span>
                      </div>
                      <p
                        class="gf-text-muted"
                        style="font-size: 11px; margin-top: 2px"
                        x-text="concernMeta[ck].subtitle"
                      ></p>
                    </div>

                    <!-- Findings -->
                    <div
                      x-show="agent.concerns[ck].findings.length > 0"
                      style="margin-bottom: 10px"
                    >
                      <div
                        class="gf-text-muted"
                        style="
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          margin-bottom: 5px;
                          font-weight: 600;
                        "
                      >
                        Findings
                      </div>
                      <div
                        style="display: flex; flex-direction: column; gap: 2px"
                      >
                        <template
                          x-for="(finding, fi) in agent.concerns[ck].findings"
                          :key="agent.id + '-' + ck + '-hf-' + fi"
                        >
                          <div
                            style="
                              display: flex;
                              align-items: flex-start;
                              gap: 6px;
                              font-size: 12px;
                            "
                          >
                            <span
                              class="gf-text-muted"
                              style="flex-shrink: 0; line-height: 1.5"
                              >&#8226;</span
                            >
                            <span
                              class="gf-text-secondary"
                              style="line-height: 1.5"
                              x-text="finding"
                            ></span>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- Recommendations -->
                    <div x-show="agent.concerns[ck].recommendations.length > 0">
                      <div
                        class="gf-text-muted"
                        style="
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          margin-bottom: 5px;
                          font-weight: 600;
                        "
                      >
                        Recommendations
                      </div>
                      <div
                        style="display: flex; flex-direction: column; gap: 6px"
                      >
                        <template
                          x-for="(rec, ri) in agent.concerns[ck].recommendations"
                          :key="agent.id + '-' + ck + '-hr-' + ri"
                        >
                          <div>
                            <div
                              style="
                                display: flex;
                                align-items: flex-start;
                                gap: 6px;
                                font-size: 12px;
                              "
                            >
                              <span
                                style="
                                  color: var(--orange-400);
                                  flex-shrink: 0;
                                  font-weight: 600;
                                "
                                >&#8594;</span
                              >
                              <span
                                class="gf-text-primary"
                                style="font-weight: 500"
                                x-text="rec"
                              ></span>
                            </div>
                            <div
                              x-show="agent.concerns[ck].howToFix?.[ri]"
                              class="gf-bg-elevated"
                              style="
                                margin-top: 4px;
                                margin-left: 18px;
                                padding: 6px 10px;
                                border-radius: 4px;
                                font-size: 11px;
                              "
                            >
                              <span
                                class="gf-text-muted"
                                style="font-weight: 600"
                                >Fix:
                              </span>
                              <span
                                class="gf-text-secondary"
                                x-text="agent.concerns[ck].howToFix?.[ri]"
                              ></span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- All clear for this concern -->
                    <div
                      x-show="agent.concerns[ck].recommendations.length === 0"
                      style="font-size: 12px; padding: 6px 0"
                      class="gf-text-secondary"
                    >
                      All checks passing for this concern.
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </template>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 16px 0 8px"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
