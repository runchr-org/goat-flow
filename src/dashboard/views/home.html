<!-- ═══ Home View ═══ -->
<div
  x-show="activeView === 'home'"
  x-cloak
  style="height: calc(100vh - 5rem); overflow-y: auto"
>
  <div style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px">
    <!-- Action buttons (issues found) -->
    <div
      x-show="report && report.status === 'fail'"
      x-cloak
      style="margin-bottom: 20px"
    >
      <div
        class="gf-text-primary"
        style="font-size: 20px; font-weight: 600; margin-bottom: 10px"
        x-text="(() => { const fc = Object.values(report?.scopes || {}).reduce((s, sc) => s + (sc.failures?.length || 0), 0); return fc + ' issue' + (fc === 1 ? '' : 's') + ' to fix'; })()"
      ></div>
      <div
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <button
          @click="activeView = 'wizard'; detectStack()"
          class="gf-action-btn"
          style="
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            border-color: #166534;
          "
        >
          <span
            class="gf-play-icon"
            style="color: #4ade80; border-color: #166534"
          >
            <svg
              width="12"
              height="12"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085"
              />
            </svg>
          </span>
          <div style="flex: 1; min-width: 0">
            <div class="gf-action-title" style="color: #4ade80">Fix issues</div>
            <div class="gf-action-desc">Open Setup Wizard</div>
          </div>
        </button>
        <button
          @click="activeView = 'audit'"
          class="gf-action-btn"
          style="
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
          "
        >
          <span class="gf-play-icon">
            <svg
              width="12"
              height="12"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
              />
            </svg>
          </span>
          <div style="flex: 1; min-width: 0">
            <div class="gf-action-title">View details</div>
            <div class="gf-action-desc">Audit breakdown</div>
          </div>
        </button>
        <button
          @click="activeView = 'workspace'"
          class="gf-action-btn"
          style="
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
          "
        >
          <span class="gf-play-icon">
            <svg
              width="12"
              height="12"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
              />
            </svg>
          </span>
          <div style="flex: 1; min-width: 0">
            <div class="gf-action-title">Workspace</div>
            <div class="gf-action-desc">Browse prompts</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Suggested prompts (all passing) -->
    <div
      x-show="report && report.status === 'pass'"
      x-cloak
      style="margin-bottom: 20px"
    >
      <div
        class="gf-text-primary"
        style="font-size: 20px; font-weight: 600; margin-bottom: 10px"
      >
        All clear - run a prompt
      </div>
      <div
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <template
          x-for="p in presets.filter(p => ['review', 'test', 'security'].includes(p.id))"
          :key="p.id"
        >
          <button
            @click="launchPreset(p.prompt, activeRunner); workspacePanel = 'terminal'"
            class="gf-action-btn"
            style="
              text-align: left;
              display: flex;
              align-items: center;
              gap: 10px;
            "
          >
            <span class="gf-play-icon">
              <svg
                width="12"
                height="12"
                fill="currentColor"
                viewBox="0 0 20 20"
              >
                <path
                  d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"
                />
              </svg>
            </span>
            <div style="flex: 1; min-width: 0">
              <div class="gf-action-title" x-text="p.name"></div>
              <div class="gf-action-desc" x-text="p.desc"></div>
            </div>
          </button>
        </template>
      </div>
    </div>

    <!-- Health banner -->
    <div
      x-show="report"
      class="gf-banner-row"
      :class="report?.status === 'pass' ? 'gf-banner-pass' : 'gf-banner-fail'"
    >
      <div
        class="gf-banner-icon"
        style="
          width: 30px;
          height: 30px;
          border-radius: 50%;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 14px;
          flex-shrink: 0;
        "
        x-html="report?.status === 'pass' ? '&#10003;' : '&#10005;'"
      ></div>
      <div style="flex: 1; min-width: 0">
        <div
          class="gf-banner-title"
          style="font-size: 16px; font-weight: 600"
          x-text="report?.status === 'pass' ? 'All checks passing' : 'Audit needs attention'"
        ></div>
        <div
          class="gf-banner-sub"
          style="font-size: 12px; margin-top: 1px"
          x-text="(() => { const tc = Object.values(report?.scopes || {}).reduce((s, sc) => s + (sc.checks?.length || 0), 0); const fc = Object.values(report?.scopes || {}).reduce((s, sc) => s + (sc.failures?.length || 0), 0); return (tc - fc) + '/' + tc + ' checks passing'; })()"
        ></div>
      </div>
      <div
        class="gf-banner-ts"
        style="
          font-size: 11px;
          opacity: 0.7;
          white-space: nowrap;
          flex-shrink: 0;
        "
        x-text="lastAuditTime ? 'Audited ' + formatTimeAgo(lastAuditTime) : ''"
      ></div>
    </div>

    <!-- No audit data -->
    <div
      x-show="!report"
      class="gf-surface"
      style="
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        margin-bottom: 20px;
      "
    >
      <p class="gf-text-muted" style="font-size: 13px; margin-bottom: 12px">
        No audit results yet
      </p>
      <button
        @click="runAudit()"
        :disabled="auditing"
        class="gf-btn gf-btn-md gf-btn-audit"
      >
        <span x-text="auditing ? 'Auditing...' : 'Run Audit'"></span>
      </button>
    </div>

    <!-- GOAT Flow Setup -->
    <div x-show="report" style="margin-bottom: 12px">
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 10px;
        "
      >
        <span class="gf-text-primary" style="font-size: 20px; font-weight: 600"
          >Audit</span
        >
        <button
          @click="runAudit()"
          :disabled="auditing"
          class="gf-btn gf-btn-md gf-btn-audit"
        >
          <span x-text="auditing ? 'Auditing...' : 'Re-audit'"></span>
        </button>
      </div>
      <button
        @click="activeView = 'audit'; auditDetailScope = 'setup'"
        class="gf-card gf-card-clickable"
        style="
          padding: 16px 24px;
          cursor: pointer;
          transition: border-color 0.15s ease;
          width: 100%;
          text-align: left;
        "
        @mouseenter="$el.style.borderColor = 'var(--accent-border)'"
        @mouseleave="$el.style.borderColor = ''"
      >
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
          "
        >
          <div>
            <span
              class="gf-text-primary"
              style="font-size: 16px; font-weight: 600"
              >GOAT Flow Setup</span
            >
            <span
              class="gf-text-secondary"
              style="font-size: 12px; margin-left: 12px"
              x-text="`${(report?.scopes?.setup?.checks || []).filter(c => c.status === 'pass').length}/${(report?.scopes?.setup?.checks || []).length} checks passed`"
            ></span>
          </div>
          <span
            style="
              font-size: 13px;
              font-weight: 600;
              padding: 2px 8px;
              border-radius: 4px;
            "
            :style="{
              background: report?.scopes?.setup?.status === 'pass' ? '#14532d' : '#7f1d1d',
              color: report?.scopes?.setup?.status === 'pass' ? '#4ade80' : '#f87171',
            }"
            x-text="report?.scopes?.setup?.status === 'pass' ? 'PASS' : 'FAIL'"
          ></span>
        </div>
      </button>
    </div>

    <!-- Per-agent AI Harness Score -->
    <div x-show="report?.agentScores?.length > 0" style="margin-bottom: 20px">
      <div
        class="gf-text-primary"
        style="font-size: 20px; font-weight: 600; margin-bottom: 10px"
      >
        AI Harness Score
      </div>
      <div
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <template
          x-for="agent in (report?.agentScores || [])"
          :key="'harness-' + agent.id"
        >
          <button
            @click="activeView = 'audit'; auditDetailAgent = agent.id; auditDetailScope = null"
            class="gf-card gf-card-clickable"
            style="
              padding: 20px 24px;
              cursor: pointer;
              transition: border-color 0.15s ease;
            "
            @mouseenter="$el.style.borderColor = 'var(--accent-border)'"
            @mouseleave="$el.style.borderColor = ''"
          >
            <div
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 8px;
              "
            >
              <span
                class="gf-text-primary"
                style="font-size: 16px; font-weight: 600"
                x-text="agent.name"
              ></span>
              <span
                style="font-size: 18px; font-weight: 700"
                :style="{
                  color: (agent.harness.score ?? 0) >= 80 ? '#4ade80' :
                         (agent.harness.score ?? 0) >= 60 ? '#fb923c' : '#f87171'
                }"
                x-text="`${agent.harness.score ?? 0}%`"
              ></span>
            </div>
            <div class="gf-text-muted" style="font-size: 12px">
              <span
                class="gf-text-secondary"
                x-text="`${agent.harness.checks.filter(c => c.status === 'pass').length}/${agent.harness.checks.length} checks`"
              ></span>
            </div>
          </button>
        </template>
      </div>
    </div>

    <!-- Agents table -->
    <div
      class="gf-card"
      style="border-radius: 8px; overflow: hidden; margin-bottom: 20px"
    >
      <div
        class="gf-card-header"
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 12px 16px;
        "
      >
        <span class="gf-text-primary" style="font-size: 20px; font-weight: 600"
          >Agents</span
        >
      </div>
      <table style="width: 100%; border-collapse: collapse">
        <thead>
          <tr>
            <template x-for="col in ['Agent', 'Version', 'Status', '']">
              <th class="gf-th" x-text="col"></th>
            </template>
          </tr>
        </thead>
        <tbody>
          <template
            x-for="agent in allAgents.map(a => ({ ...a, name: { claude: 'Claude Code', codex: 'Codex', gemini: 'Gemini CLI', copilot: 'Copilot' }[a.id] || a.id }))"
            :key="agent.id"
          >
            <tr class="gf-tr">
              <td class="gf-td">
                <div style="display: flex; align-items: center; gap: 8px">
                  <span
                    class="gf-dot"
                    :class="agent.installed ? 'gf-dot-on' : 'gf-dot-off'"
                  ></span>
                  <span
                    style="font-size: 13px; font-weight: 500"
                    :class="agent.installed ? 'gf-text-primary' : 'gf-text-disabled'"
                    x-text="agent.name"
                  ></span>
                </div>
              </td>
              <td class="gf-td">
                <span
                  :class="agent.installed ? 'gf-text-muted' : 'gf-text-disabled'"
                  :style="'font-size:11px;font-family:JetBrains Mono,Fira Code,monospace;' + (!agent.installed ? 'font-style:italic;' : '')"
                  x-text="agent.version || (agent.installed ? '' : 'not installed')"
                ></span>
              </td>
              <td class="gf-td">
                <span
                  style="font-size: 11px"
                  :class="agent.installed ? 'gf-text-secondary' : 'gf-text-disabled'"
                  x-text="agent.installed ? 'Installed' : 'Not found'"
                ></span>
              </td>
              <td class="gf-td" style="text-align: right">
                <button
                  x-show="agent.installed && terminalAvailable"
                  @click="activeRunner = agent.id; launchInTerminal('', agent.id)"
                  class="gf-btn gf-btn-sm gf-btn-audit"
                >
                  Terminal
                </button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 16px 0 8px"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
