    <!-- ═══ Home View ═══ -->
    <div x-show="activeView === 'home'" x-cloak style="height: calc(100vh - 5rem); overflow-y: auto;">
      <div style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px;">

        <!-- Project header (no card, just text) -->
        <div style="margin-bottom: 20px;">
          <div class="gf-text-primary" style="font-size: 18px; font-weight: 500;" x-text="projectName || 'GOAT Flow'"></div>
          <div class="gf-text-muted" style="font-size: 11px; font-family: 'JetBrains Mono', 'Fira Code', monospace; margin-top: 3px;" x-text="projectPath"></div>
          <div class="gf-tags" x-show="report">
            <template x-for="lang in (report?.stack?.languages || [])" :key="lang">
              <span class="gf-tag" x-text="lang"></span>
            </template>
          </div>
        </div>

        <!-- Health banner -->
        <div x-show="report" x-data="{ allPass: false }" x-effect="allPass = report?.agents?.every(a => a.score.grade === 'A')"
          class="gf-banner-row" :class="allPass ? 'gf-banner-pass' : 'gf-banner-fail'">
          <div class="gf-banner-icon" style="width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0" x-html="allPass ? '&#10003;' : '&#10005;'"></div>
          <div style="flex:1;min-width:0"><div class="gf-banner-title" style="font-size:14px;font-weight:500" x-text="allPass ? 'All checks passing' : (report?.agents?.filter(a => a.score.grade !== 'A').length + ' agent(s) need attention')"></div><div class="gf-banner-sub" style="font-size:12px;margin-top:1px" x-text="(() => { const tc = (report?.agents || []).reduce((s, a) => s + a.checks.filter(c => !c.hidden && c.status !== 'na').length, 0); const ap = (report?.agents || []).reduce((s, a) => s + a.antiPatterns.filter(p => p.triggered).length, 0); return tc + ' checks across ' + (report?.agents?.length || 0) + ' agents - ' + ap + ' anti-patterns - ' + presets.length + ' presets installed'; })()"></div></div>
          <div class="gf-banner-ts" style="font-size:11px;opacity:0.7;white-space:nowrap;flex-shrink:0" x-text="lastScanTime ? 'Scanned ' + formatTimeAgo(lastScanTime) : ''"></div>
        </div>

        <!-- No scan data -->
        <div x-show="!report" class="gf-surface" style="border-radius: 8px; padding: 24px; text-align: center; margin-bottom: 20px;">
          <p class="gf-text-muted" style="font-size: 13px; margin-bottom: 12px;">No scan results yet</p>
          <button @click="runScan()" :disabled="scanning" class="gf-btn-primary" style="padding: 6px 16px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500;">
            <span x-text="scanning ? 'Scanning...' : 'Run Scan'"></span>
          </button>
        </div>

        <!-- Metric strip -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;">
          <div class="gf-metric">
            <div class="gf-metric-value" x-text="report ? report.agents.length : '-'"></div>
            <div class="gf-metric-label">Agents</div>
          </div>
          <div class="gf-metric">
            <div class="gf-metric-value gf-grade-text" x-text="report ? (() => {
              const grades = report.agents.map(a => a.score.grade);
              const order = ['A','B','C','D','F'];
              const worst = grades.reduce((w, g) => order.indexOf(g) > order.indexOf(w) ? g : w, 'A');
              return worst;
            })() : '-'"></div>
            <div class="gf-metric-label">Avg grade</div>
          </div>
          <div class="gf-metric">
            <div class="gf-metric-value" x-text="presets.length"></div>
            <div class="gf-metric-label">Presets</div>
          </div>
          <div class="gf-metric">
            <div class="gf-metric-value">6</div>
            <div class="gf-metric-label">Skills</div>
          </div>
        </div>

        <!-- Agents table card -->
        <div class="gf-card" style="border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
          <div class="gf-card-header" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;">
            <span class="gf-text-primary" style="font-size: 14px; font-weight: 500;">Agents</span>
            <span class="gf-link" style="font-size: 12px; cursor: pointer;" @click="runScan()">Re-scan</span>
          </div>
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <template x-for="col in ['Agent', 'Version', 'Grade', 'Score']">
                  <th class="gf-th" x-text="col"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <!-- Installed agents with scan data -->
              <template x-for="agent in allAgents.map(a => ({ ...a, name: { claude: 'Claude Code', codex: 'Codex', gemini: 'Gemini CLI', copilot: 'Copilot' }[a.id] || a.id }))" :key="agent.id">
                <tr class="gf-tr"
                  :class="agent.installed ? 'gf-tr-clickable' : 'gf-tr-disabled'"
                  @click="agent.installed && report?.agents?.find(a => a.agent === agent.id) && (activeView = 'scan', scanDetailAgent = agent.id)">

                  <!-- Agent name -->
                  <td class="gf-td">
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span class="gf-dot" :class="agent.installed ? 'gf-dot-on' : 'gf-dot-off'"></span>
                      <span style="font-size: 13px; font-weight: 500;"
                        :class="agent.installed ? 'gf-text-primary' : 'gf-text-disabled'"
                        x-text="agent.name"></span>
                    </div>
                  </td>

                  <!-- Version -->
                  <td class="gf-td">
                    <span :class="agent.installed ? 'gf-text-muted' : 'gf-text-disabled'"
                      :style="'font-size:11px;font-family:JetBrains Mono,Fira Code,monospace;' + (!agent.installed ? 'font-style:italic;' : '')"
                      x-text="agent.version || (agent.installed ? '' : 'not installed')"></span>
                  </td>

                  <!-- Grade -->
                  <td class="gf-td">
                    <template x-if="report?.agents?.find(a => a.agent === agent.id)">
                      <span class="gf-grade"
                        :class="'gf-grade-' + (report.agents.find(a => a.agent === agent.id)?.score.grade || '').toLowerCase()"
                        x-text="report.agents.find(a => a.agent === agent.id)?.score.grade"></span>
                    </template>
                    <template x-if="!report?.agents?.find(a => a.agent === agent.id)">
                      <span class="gf-grade gf-grade-na">&mdash;</span>
                    </template>
                  </td>

                  <!-- Score -->
                  <td class="gf-td">
                    <span style="font-size: 12px;"
                      :class="report?.agents?.find(a => a.agent === agent.id) ? 'gf-text-secondary' : 'gf-text-disabled'"
                      x-text="report?.agents?.find(a => a.agent === agent.id) ? report.agents.find(a => a.agent === agent.id).score.percentage + '%' : '\u2014'"></span>
                  </td>

                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Quick actions -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
          <button @click="runScan()" class="gf-action-btn">
            <div class="gf-action-title">Run scan</div>
            <div class="gf-action-desc">Re-evaluate all agents</div>
          </button>
          <button @click="activeView = 'workspace'" class="gf-action-btn">
            <div class="gf-action-title">Launch workspace</div>
            <div class="gf-action-desc">Open prompt launcher</div>
          </button>
          <button @click="activeView = 'wizard'; detectStack()" class="gf-action-btn">
            <div class="gf-action-title">Setup wizard</div>
            <div class="gf-action-desc">Generate setup prompt</div>
          </button>
        </div>

        <!-- Footer -->
        <div class="gf-footer" style="text-align: center; font-size: 11px; padding: 8px 0;">
          Built by <a href="https://www.blundergoat.com" target="_blank" class="gf-footer-link">BlunderGOAT</a> · MIT License · <a href="https://github.com/blundergoat/goat-flow" target="_blank" class="gf-footer-link">GitHub</a>
        </div>
      </div>
    </div>
