<!-- ═══ Setup View ═══ -->
<div
  x-show="activeView === 'wizard'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <div style="max-width: 1100px; margin: 0 auto; padding: 20px 24px">
    <div
      class="gf-text-primary"
      style="font-size: 20px; font-weight: 500; margin-bottom: 16px"
    >
      Setup
    </div>

    <!-- Two columns -->
    <div style="display: flex; gap: 16px; height: calc(100vh - 10rem)">
      <!-- Left: Title + Agents + Detected configuration -->
      <div
        class="gf-card"
        style="
          width: 50%;
          flex-shrink: 0;
          padding: 16px 20px;
          align-self: flex-start;
        "
      >
        <!-- Title -->
        <div style="margin-bottom: 16px">
          <div
            class="gf-text-primary"
            style="font-size: 20px; font-weight: 500"
            x-text="
                !report ? 'Setup GOAT Flow' :
                report.status === 'fail' ? 'Fix Issues' :
                'GOAT Flow is up to date'
              "
          ></div>
          <div
            class="gf-text-muted"
            style="font-size: 12px; margin-top: 3px"
            x-text="
                !report ? 'Configure GOAT Flow for this project' :
                report.status === 'fail' ? 'Audit has failures - generate a fix prompt' :
                'All checks passing - generate maintenance prompt'
              "
          ></div>
        </div>

        <!-- Agent selector strip -->
        <div
          class="gf-agent-strip"
          style="padding: 0; border-top: none; margin-bottom: 16px"
        >
          <template
            x-for="agentId in ['claude', 'codex', 'gemini']"
            :key="agentId"
          >
            <div
              @click="wizardSelectedAgent = agentId"
              class="gf-agent-card"
              :class="wizardSelectedAgent === agentId && 'gf-agent-card-sel'"
            >
              <div
                class="gf-text-primary"
                style="font-size: 13px; font-weight: 500"
                x-text="agentId === 'claude' ? 'Claude Code' : agentId === 'codex' ? 'Codex' : 'Gemini CLI'"
              ></div>
              <div
                style="font-size: 11px; margin-top: 2px"
                x-text="report ? (report.status === 'pass' ? 'Passing' : 'Failing') : 'Not audited'"
                :style="{ color: report ? (report.status === 'pass' ? '#4ade80' : '#f87171') : '#52525b' }"
              ></div>
            </div>
          </template>
        </div>

        <!-- Loading state -->
        <div
          x-show="wizardDetecting"
          style="
            padding: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
          "
        >
          <svg
            class="animate-spin"
            style="width: 16px; height: 16px; color: #4ade80"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
          <span class="gf-text-muted" style="font-size: 12px"
            >Detecting project stack...</span
          >
        </div>

        <div x-show="!wizardDetecting">
          <div
            class="gf-text-secondary"
            style="font-size: 13px; font-weight: 500; margin-bottom: 12px"
          >
            Detected configuration
          </div>

          <div style="display: flex; flex-direction: column; gap: 4px">
            <!-- Languages -->
            <div class="gf-detect-row">
              <span class="gf-detect-label">Languages</span>
              <div class="gf-tags" style="margin-top: 0">
                <template x-for="lang in wizardData.languages" :key="lang">
                  <span class="gf-tag" x-text="lang"></span>
                </template>
                <span
                  x-show="(report?.stack?.languages || wizardData.languages).length === 0"
                  class="gf-detect-val gf-detect-missing"
                  >None detected</span
                >
              </div>
            </div>

            <!-- Frameworks -->
            <div class="gf-detect-row">
              <span class="gf-detect-label">Frameworks</span>
              <div class="gf-tags" style="margin-top: 0">
                <template x-for="fw in wizardData.frameworks" :key="fw">
                  <span class="gf-tag" x-text="fw"></span>
                </template>
                <span
                  x-show="wizardData.frameworks.length === 0"
                  class="gf-detect-val gf-detect-missing"
                  >None detected</span
                >
              </div>
            </div>

            <!-- Commands -->
            <template
              x-for="cmd in ['test', 'lint', 'build', 'format']"
              :key="cmd"
            >
              <div class="gf-detect-row">
                <span
                  class="gf-detect-label"
                  style="text-transform: capitalize"
                  x-text="cmd === 'format' ? 'Formatter' : cmd"
                ></span>
                <span
                  class="gf-detect-val"
                  :class="!wizardData.commands[cmd] && 'gf-detect-missing'"
                  x-text="wizardData.commands[cmd] || '(not detected)'"
                ></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Right: Prompt card -->
      <div
        style="flex: 1; min-width: 0; display: flex; flex-direction: column"
        x-effect="if (activeView === 'wizard' && wizardSelectedAgent && !wizardDetecting) { generateWizardSetup(); }"
      >
        <div class="gf-prompt-card">
          <!-- Header -->
          <div class="gf-prompt-hdr">
            <span
              class="gf-text-primary"
              style="font-size: 16px; font-weight: 600"
              >Setup prompt</span
            >
            <div style="display: flex; align-items: center; gap: 8px">
              <template
                x-if="!wizardGenerating && wizardSetupOutputs[wizardSelectedAgent]"
              >
                <div style="display: flex; gap: 8px">
                  <button
                    x-data="{ copied: false }"
                    @click="copyText(wizardSetupOutputs[wizardSelectedAgent]); copied = true; setTimeout(() => copied = false, 1500)"
                    class="gf-btn-copy"
                    :style="{ background: copied ? '#14532d' : '', color: copied ? '#4ade80' : '', borderColor: copied ? '#166534' : '' }"
                  >
                    <span x-text="copied ? 'Copied' : 'Copy'"></span>
                  </button>
                  <button
                    @click="generateWizardSetup()"
                    class="gf-btn gf-btn-md gf-btn-scan"
                  >
                    Regenerate
                  </button>
                </div>
              </template>
            </div>
          </div>

          <!-- Terminal CTA -->
          <template
            x-if="!wizardGenerating && wizardSetupOutputs[wizardSelectedAgent] && terminalAvailable"
          >
            <div
              class="gf-terminal-cta"
              style="padding: 16px; border-radius: 0"
            >
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  margin-bottom: 8px;
                "
              >
                <button
                  @click="launchPreset(wizardSetupOutputs[wizardSelectedAgent], activeRunner); activeView = 'workspace'"
                  :disabled="launching || (terminalSessionId && !terminalEnded)"
                  class="gf-btn-terminal-cta"
                >
                  <svg
                    style="width: 16px; height: 16px"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M8 5l8 7-8 7"
                    />
                  </svg>
                  Run Setup in Terminal
                </button>
              </div>
              <div
                class="gf-text-muted"
                style="font-size: 12px; line-height: 1.4"
              >
                Launches
                <span
                  x-text="activeRunner"
                  class="gf-text-secondary"
                  style="font-weight: 500"
                ></span>
                to install GOAT Flow into this project - creates instruction
                files, skills, and hooks.
              </div>
            </div>
          </template>

          <!-- Generating state -->
          <div
            class="gf-loader-overlay"
            :class="!wizardGenerating && 'gf-hidden'"
          >
            <svg
              class="animate-spin"
              style="width: 16px; height: 16px; color: #4ade80"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              />
            </svg>
            <span class="gf-text-muted" style="font-size: 12px"
              >Generating...</span
            >
          </div>

          <!-- Prompt content -->
          <template
            x-if="!wizardGenerating && wizardSetupOutputs[wizardSelectedAgent]"
          >
            <pre
              class="gf-prompt-body"
              x-text="wizardSetupOutputs[wizardSelectedAgent]"
            ></pre>
          </template>

          <!-- Empty state -->
          <p
            x-show="!wizardGenerating && !wizardSetupOutputs[wizardSelectedAgent]"
            class="gf-text-disabled"
            style="
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 12px;
            "
          >
            Select an agent to auto-generate the setup prompt.
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 12px 0"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
