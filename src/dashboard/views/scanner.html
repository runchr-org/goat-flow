    <!-- ═══ Scanner View ═══ -->
    <div x-show="activeView === 'scan'" style="height: calc(100vh - 3.5rem); overflow-y: auto;">

      <!-- No data empty state -->
      <div x-show="!report && !scanning" class="flex items-center justify-center" style="min-height: 60vh">
        <div class="text-center space-y-4 max-w-md">
          <p class="text-4xl">&#128016;</p>
          <h2 class="text-xl font-semibold gf-text-secondary">Scan a project to get started</h2>
          <p class="text-sm gf-text-muted">Set your project path in Config, then click Scan.</p>
          <button @click="runScan()" :disabled="scanning"
            class="gf-btn-scan" style="padding: 6px 20px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: 500;">
            Scan
          </button>
        </div>
      </div>

      <!-- Has report -->
      <div x-show="report" style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px;">

        <!-- Header -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
          <span class="gf-text-primary" style="font-size: 20px; font-weight: 500;">Scanner</span>
          <button @click="runScan()" :disabled="scanning"
            class="gf-btn-scan" style="font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-weight: 500;">
            <span x-text="scanning ? 'Scanning...' : 'Re-scan'"></span>
          </button>
        </div>

        <!-- Agent cards grid -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
          <template x-for="agent in (report?.agents || [])" :key="agent.agent">
            <button @click="scanDetailAgent = (scanDetailAgent === agent.agent ? null : agent.agent); selectedAgent = agent.agent"
              class="gf-card" style="padding: 20px 24px; cursor: pointer; transition: border-color 0.1s;"
              :style="{ borderColor: scanDetailAgent === agent.agent ? '#4ade80' : '' }">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                <span class="gf-text-primary" style="font-size: 14px; font-weight: 500;" x-text="agent.agentName"></span>
                <span style="font-size: 20px; font-weight: 500;" :style="{ color: gradeColor(agent.score.grade) }" x-text="agent.score.grade === 'insufficient-data' ? '?' : agent.score.grade"></span>
              </div>
              <div style="display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px;">
                <span style="font-size: 14px; font-weight: 500;" :style="{ color: gradeColor(agent.score.grade) }" x-text="`${agent.score.percentage}%`"></span>
                <span class="gf-text-secondary" style="font-size: 12px;" x-text="`${agent.checks.filter(c => !c.hidden && c.status !== 'na').length} checks`"></span>
              </div>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <template x-for="tier in ['foundation', 'standard', 'full']" :key="agent.agent + '-' + tier">
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <span class="gf-text-secondary" style="font-size: 12px; width: 70px;" x-text="tier"></span>
                    <div class="gf-bar-track" style="flex: 1; height: 4px; border-radius: 2px; overflow: hidden;">
                      <div :style="`width:${agent.score.tiers[tier].percentage}%;height:4px;border-radius:2px;background:${agent.score.tiers[tier].percentage > 80 ? '#4ade80' : agent.score.tiers[tier].percentage >= 50 ? '#fb923c' : '#f87171'}`"></div>
                    </div>
                    <span class="gf-text-muted" style="font-size: 12px; width: 32px; text-align: right;" x-text="`${agent.score.tiers[tier].percentage}%`"></span>
                  </div>
                </template>
              </div>
            </button>
          </template>
        </div>

        <!-- No agents detected -->
        <div x-show="report?.agents?.length === 0" style="padding: 64px 0; text-align: center;">
          <p class="gf-text-muted" style="font-size: 16px;">No agents detected</p>
          <p class="gf-text-disabled" style="font-size: 13px; margin-top: 4px;">Click <strong>Setup</strong> to generate setup instructions.</p>
        </div>

        <!-- Inline detail panel (appears below grid when an agent is selected) -->
        <template x-if="scanDetailAgent && currentAgent">
          <div style="margin-top: 20px; border-top: 0.5px solid #2a2a2e; padding-top: 20px;">

            <!-- Agent name + grade -->
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
              <div>
                <div class="gf-text-primary" style="font-size: 20px; font-weight: 500;" x-text="currentAgent.agentName"></div>
                <div class="gf-text-muted" style="font-size: 12px; margin-top: 4px;">
                  <span x-text="`${currentAgent.checks.filter(c => !c.hidden && c.status !== 'na').length} checks`"></span> -
                  <span x-text="`${currentAgent.antiPatterns.filter(a => a.triggered).length} anti-patterns`"></span>
                  <template x-if="lastScanTime">
                    <span x-text="' - Last scanned ' + formatTimeAgo(lastScanTime)"></span>
                  </template>
                </div>
              </div>
              <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                <span class="gf-grade" :class="'gf-grade-' + (currentAgent.score.grade || '').toLowerCase()" style="width: 48px; height: 48px; font-size: 36px;" x-text="currentAgent.score.grade === 'insufficient-data' ? '?' : currentAgent.score.grade"></span>
                <span class="gf-text-secondary" style="font-size: 14px;" x-text="`${currentAgent.score.percentage}%`"></span>
              </div>
            </div>

            <!-- Tier stat cards -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
              <template x-for="tier in ['foundation', 'standard', 'full']" :key="tier">
                <div class="gf-bg-elevated" style="border-radius: 8px; padding: 12px 16px;">
                  <div class="gf-text-muted" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;" x-text="tier"></div>
                  <div class="gf-text-primary" style="font-size: 16px; font-weight: 500; margin-top: 2px;" x-text="`${currentAgent.score.tiers[tier].earned} / ${currentAgent.score.tiers[tier].available}`"></div>
                  <div class="gf-bar-track" style="height: 4px; border-radius: 2px; margin-top: 8px; overflow: hidden;">
                    <div :style="`width:${currentAgent.score.tiers[tier].percentage}%;height:4px;border-radius:2px;background:${currentAgent.score.tiers[tier].percentage > 80 ? '#4ade80' : currentAgent.score.tiers[tier].percentage >= 50 ? '#fb923c' : '#f87171'}`"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- AP Deductions -->
            <div class="gf-card" style="border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;" x-show="triggeredAPs.length > 0">
              <h3 class="gf-text-muted" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Anti-Pattern Deductions <span style="color: #f87171; margin-left: 4px;" x-text="`(${currentAgent.score.deductions} pts)`"></span></h3>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <template x-for="ap in triggeredAPs" :key="ap.id">
                  <div style="display: flex; align-items: flex-start; gap: 10px; font-size: 13px;">
                    <span class="gf-badge-ap" style="flex-shrink: 0; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600;" x-text="ap.deduction"></span>
                    <div>
                      <span class="gf-text-primary" style="font-weight: 500;" x-text="`${ap.id}: ${ap.name}`"></span>
                      <p class="gf-text-muted" style="font-size: 12px; margin-top: 2px;" x-text="ap.message" x-show="ap.evidence"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Recommendations -->
            <div class="gf-card" style="border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;" x-show="currentAgent.recommendations.length > 0">
              <h3 class="gf-text-muted" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Recommendations <span style="color: #71717a; margin-left: 4px;" x-text="`(${currentAgent.recommendations.length})`"></span></h3>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <template x-for="rec in currentAgent.recommendations" :key="rec.key">
                  <div style="display: flex; align-items: flex-start; gap: 10px; font-size: 13px; padding-bottom: 8px; border-bottom: 0.5px solid #2a2a2e;">
                    <span style="flex-shrink: 0; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600;"
                      :class="'gf-badge-' + rec.priority"
                      x-text="rec.priority.toUpperCase()"></span>
                    <div style="flex: 1; min-width: 0;">
                      <span class="gf-text-primary" style="font-weight: 500;" x-text="`${rec.checkId}: ${rec.category}`"></span>
                      <p class="gf-text-muted" style="font-size: 12px; margin-top: 2px;" x-text="rec.action"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- All checks pass -->
            <div class="gf-card" style="border-radius: 8px; padding: 16px 20px;"
              x-show="currentAgent.recommendations.length === 0 && triggeredAPs.length === 0">
              <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 24px 0;">
                <div class="gf-check-pass" style="width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 16px;">&#10003;</div>
                <span style="font-size: 14px; font-weight: 500; color: #4ade80;">All checks pass. Nothing to fix.</span>
              </div>
            </div>

          </div>
        </template>

        <!-- Footer -->
        <div class="gf-footer" style="text-align: center; font-size: 11px; padding: 16px 0 8px;">
          Built by <a href="https://www.blundergoat.com" target="_blank" class="gf-footer-link">BlunderGOAT</a> · <span x-text="report ? `v${report.rubricVersion}` : ''"></span>
        </div>
      </div>

    </div><!-- /scan view -->
