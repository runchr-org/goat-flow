<!-- ═══ Skills View ═══ -->
<div
  x-show="activeView === 'skills'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <div style="max-width: 1280px; margin: 0 auto; padding: 20px 24px 24px">
    <div
      style="
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 14px;
      "
    >
      <div>
        <div
          class="gf-text-primary"
          style="font-size: 20px; font-weight: 600; margin-bottom: 4px"
        >
          Skills
        </div>
        <div class="gf-text-muted" style="font-size: 13px">
          Per-artifact deterministic structural metrics for skills and shared
          references. Subtype profiles adjust the applicable metrics for
          workflow, dispatcher, report, playbook, index, and meta artifacts.
        </div>
      </div>
      <button
        @click="openSkillAuthor()"
        class="gf-btn gf-btn-primary"
        style="padding: 6px 12px; font-size: 12px; font-weight: 600"
      >
        + Create new skill
      </button>
    </div>

    <div class="gf-card" style="padding: 16px 20px">
      <div
        class="gf-text-secondary"
        style="font-size: 13px; font-weight: 600; margin-bottom: 4px"
      >
        Skill Quality
      </div>
      <div class="gf-text-muted" style="font-size: 11px; margin-bottom: 12px">
        Deterministic structural metrics per artifact.
      </div>

      <div
        style="
          display: grid;
          grid-template-columns: 220px 1fr;
          gap: 16px;
          align-items: start;
        "
      >
        <!-- Artifact list -->
        <div
          style="
            border-right: 1px solid var(--border-subtle);
            padding-right: 12px;
            max-height: calc(100vh - 14rem);
            overflow-y: auto;
          "
        >
          <template x-if="skillQualityArtifacts.length === 0">
            <div
              class="gf-text-muted"
              style="padding: 8px 0; font-size: 11px; text-align: center"
            >
              No artifacts discovered.
            </div>
          </template>

          <!-- Skills group -->
          <template
            x-if="skillQualityArtifacts.filter(a => a.kind === 'skill').length > 0"
          >
            <div>
              <div
                class="gf-text-muted"
                style="
                  font-size: 9px;
                  font-weight: 600;
                  padding: 2px 0;
                  text-transform: uppercase;
                  letter-spacing: 0.05em;
                "
              >
                Skills
              </div>
              <template
                x-for="art in skillQualityArtifacts.filter(a => a.kind === 'skill')"
                :key="'sq-' + art.id"
              >
                <button
                  @click="loadSkillQualityReport(art.id)"
                  style="
                    display: block;
                    width: 100%;
                    text-align: left;
                    padding: 4px 8px;
                    border: none;
                    background: none;
                    cursor: pointer;
                    font-size: 12px;
                    font-family: inherit;
                    border-radius: 4px;
                  "
                  :style="skillQualitySelectedId === art.id ? { background: 'var(--accent-bg)', color: 'var(--accent)' } : { color: 'var(--text-primary)' }"
                >
                  <span x-text="art.name"></span>
                </button>
              </template>
            </div>
          </template>

          <!-- References group -->
          <template
            x-if="skillQualityArtifacts.filter(a => a.kind === 'shared-reference').length > 0"
          >
            <div style="margin-top: 6px">
              <div
                class="gf-text-muted"
                style="
                  font-size: 9px;
                  font-weight: 600;
                  padding: 2px 0;
                  text-transform: uppercase;
                  letter-spacing: 0.05em;
                "
              >
                References
              </div>
              <template
                x-for="art in skillQualityArtifacts.filter(a => a.kind === 'shared-reference')"
                :key="'sq-' + art.id"
              >
                <button
                  @click="loadSkillQualityReport(art.id)"
                  style="
                    display: block;
                    width: 100%;
                    text-align: left;
                    padding: 4px 8px;
                    border: none;
                    background: none;
                    cursor: pointer;
                    font-size: 12px;
                    font-family: inherit;
                    border-radius: 4px;
                  "
                  :style="skillQualitySelectedId === art.id ? { background: 'var(--accent-bg)', color: 'var(--accent)' } : { color: 'var(--text-primary)' }"
                >
                  <span x-text="art.name"></span>
                </button>
              </template>
            </div>
          </template>
        </div>

        <!-- Metric detail -->
        <div>
          <!-- Loading -->
          <template x-if="skillQualityLoading">
            <div
              style="
                padding: 16px;
                display: flex;
                align-items: center;
                gap: 8px;
              "
            >
              <svg
                class="animate-spin"
                style="width: 14px; height: 14px; color: var(--accent)"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                />
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                />
              </svg>
              <span class="gf-text-muted" style="font-size: 12px"
                >Scoring...</span
              >
            </div>
          </template>

          <!-- Empty state -->
          <template x-if="!skillQualityLoading && !skillQualityReport">
            <div
              class="gf-text-muted"
              style="padding: 20px 0; font-size: 12px; text-align: center"
            >
              Select an artifact to view its quality metrics.
            </div>
          </template>

          <!-- Report -->
          <template x-if="!skillQualityLoading && skillQualityReport">
            <div style="display: flex; flex-direction: column; gap: 8px">
              <!-- Score + recommendation -->
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                "
              >
                <div style="display: flex; align-items: center; gap: 8px">
                  <span
                    class="gf-text-primary"
                    style="font-size: 14px; font-weight: 600"
                    x-text="skillQualityReport.artifact.name"
                  ></span>
                  <span
                    class="gf-text-muted"
                    style="
                      font-size: 10px;
                      font-weight: 600;
                      padding: 1px 5px;
                      border-radius: 3px;
                      border: 1px solid var(--border-subtle);
                      text-transform: uppercase;
                      letter-spacing: 0.02em;
                    "
                    x-text="skillQualityReport.subtype"
                  ></span>
                  <span
                    style="
                      font-size: 11px;
                      font-weight: 600;
                      padding: 1px 6px;
                      border-radius: 3px;
                    "
                    :style="{
                      background: skillQualityReport.recommendation === 'keep-skill' ? 'rgba(34,197,94,0.15)' : skillQualityReport.recommendation === 'reference-playbook' ? 'rgba(59,130,246,0.15)' : skillQualityReport.recommendation === 'needs-human-review' ? 'rgba(251,191,36,0.15)' : 'rgba(239,68,68,0.15)',
                      color: skillQualityReport.recommendation === 'keep-skill' ? '#22c55e' : skillQualityReport.recommendation === 'reference-playbook' ? '#3b82f6' : skillQualityReport.recommendation === 'needs-human-review' ? '#fbbf24' : '#ef4444'
                    }"
                    x-text="skillQualityReport.recommendation"
                  ></span>
                </div>
                <span
                  style="font-size: 13px; font-weight: 700"
                  :style="{ color: skillQualityReport.totalScore / skillQualityReport.maxTotalScore >= 0.7 ? 'var(--status-pass)' : skillQualityReport.totalScore / skillQualityReport.maxTotalScore >= 0.5 ? 'var(--status-waiting)' : 'var(--status-danger)' }"
                  :title="'Subtype profile max: ' + skillQualityReport.profileMax"
                  x-text="skillQualityReport.totalScore + '/' + skillQualityReport.maxTotalScore"
                ></span>
              </div>

              <template x-if="skillQualityReport.composedFrom.length > 0">
                <div
                  class="gf-text-muted"
                  style="font-size: 10px"
                  x-text="'Composed from: ' + skillQualityReport.composedFrom.join(', ')"
                ></div>
              </template>

              <!-- Classification card: subtype confidence + alternatives -->
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  padding: 4px 8px;
                  background: rgba(255, 255, 255, 0.02);
                  border-radius: 4px;
                  font-size: 11px;
                "
              >
                <span class="gf-text-muted" style="font-weight: 600">
                  Classification:
                </span>
                <span
                  :style="{ color: skillQualityReport.classification.confidence >= 0.7 ? 'var(--status-pass)' : 'var(--status-waiting)' }"
                  x-text="Math.round(skillQualityReport.classification.confidence * 100) + '% ' + skillQualityReport.classification.detectedSubtype"
                ></span>
                <template
                  x-if="skillQualityReport.classification.alternatives.length > 0"
                >
                  <span class="gf-text-muted">
                    (also:
                    <span
                      x-text="skillQualityReport.classification.alternatives.map(a => a.subtype + '=' + a.score).join(', ')"
                    ></span>
                    )
                  </span>
                </template>
              </div>

              <template
                x-if="skillQualityReport.recommendation === 'consider-reclassifying'"
              >
                <div
                  style="
                    padding: 6px 10px;
                    background: rgba(251, 191, 36, 0.1);
                    border: 1px solid rgba(251, 191, 36, 0.3);
                    border-radius: 4px;
                    font-size: 11px;
                    color: #fbbf24;
                  "
                >
                  <strong>Consider reclassifying:</strong> structure quality is
                  high but subtype confidence is below <code>70%</code>. Review
                  whether
                  <code
                    x-text="skillQualityReport.classification.detectedSubtype"
                  ></code>
                  is the correct shape, or
                  <code
                    x-text="skillQualityReport.classification.alternatives[0]?.subtype"
                  ></code>
                  fits better.
                </div>
              </template>

              <template x-if="skillQualityReport.fitNotes.length > 0">
                <div style="display: flex; flex-direction: column; gap: 1px">
                  <template
                    x-for="note in skillQualityReport.fitNotes"
                    :key="note"
                  >
                    <div
                      class="gf-text-muted"
                      style="font-size: 11px"
                      x-text="note"
                    ></div>
                  </template>
                </div>
              </template>

              <!-- Metric bars -->
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  gap: 4px;
                  margin-top: 4px;
                "
              >
                <template
                  x-for="m in skillQualityReport.metrics"
                  :key="'sqm-' + m.metric"
                >
                  <div style="display: flex; align-items: center; gap: 6px">
                    <span
                      class="gf-text-muted"
                      style="
                        font-size: 10px;
                        width: 140px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      x-text="m.label"
                    ></span>
                    <div
                      style="
                        flex: 1;
                        height: 5px;
                        background: var(--surface-elevated, #27272a);
                        border-radius: 999px;
                        overflow: hidden;
                      "
                    >
                      <div
                        style="
                          height: 100%;
                          border-radius: 999px;
                          transition: width 0.3s;
                        "
                        :style="{
                          width: (m.maxScore > 0 ? m.score / m.maxScore * 100 : 0) + '%',
                          background: m.severity === 'ok' ? 'var(--status-pass)' : m.severity === 'warn' ? 'var(--status-waiting)' : m.severity === 'n/a' ? 'var(--text-muted)' : 'var(--status-danger)'
                        }"
                      ></div>
                    </div>
                    <span
                      style="
                        font-size: 10px;
                        font-weight: 600;
                        width: 36px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      :style="{ color: m.severity === 'ok' ? 'var(--status-pass)' : m.severity === 'warn' ? 'var(--status-waiting)' : m.severity === 'n/a' ? 'var(--text-muted)' : 'var(--status-danger)' }"
                      x-text="m.severity === 'n/a' ? 'n/a' : m.score + '/' + m.maxScore"
                    ></span>
                  </div>
                </template>
              </div>

              <!-- Warn/fail details -->
              <template
                x-if="skillQualityReport.metrics.filter(m => m.severity !== 'ok' && m.severity !== 'n/a').length > 0"
              >
                <div
                  style="
                    margin-top: 4px;
                    display: flex;
                    flex-direction: column;
                    gap: 2px;
                  "
                >
                  <template
                    x-for="m in skillQualityReport.metrics.filter(m => m.severity !== 'ok' && m.severity !== 'n/a')"
                    :key="'sqd-' + m.metric"
                  >
                    <div style="display: flex; gap: 4px; font-size: 11px">
                      <span
                        style="flex-shrink: 0"
                        :style="{ color: m.severity === 'warn' ? 'var(--status-waiting)' : 'var(--status-danger)' }"
                        x-text="m.severity === 'warn' ? '!' : 'x'"
                      ></span>
                      <span
                        class="gf-text-primary"
                        style="font-weight: 500"
                        x-text="m.label"
                      ></span>
                      <span class="gf-text-muted" x-text="m.detail"></span>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Action -->
              <template x-if="skillQualityReport.prompt && terminalAvailable">
                <div style="margin-top: 4px">
                  <button
                    @click="launchPreset(skillQualityReport.prompt, activeRunner, 'Skill Quality: ' + skillQualityReport.artifact.name, { cwdPath: projectPath }); activeView = 'workspace'"
                    :disabled="launching || serverSessions.length >= 10"
                    class="gf-btn gf-btn-md gf-btn-secondary"
                    style="font-size: 11px"
                  >
                    Review in Runner
                  </button>
                </div>
              </template>

              <div
                class="gf-text-muted"
                style="font-size: 10px"
                x-text="skillQualityReport.artifact.path"
              ></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 12px 0"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>

  <!-- ═══ Create new skill modal ═══ -->
  <template x-if="skillAuthorOpen">
    <div
      @keydown.escape.window="closeSkillAuthor()"
      class="gf-modal-overlay"
      @click.self="closeSkillAuthor()"
    >
    <div
      class="gf-card"
      style="
        width: 720px;
        max-width: calc(100vw - 32px);
        max-height: calc(100vh - 64px);
        overflow-y: auto;
        padding: 20px 24px;
        background: var(--bg-elevated);
      "
    >
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 12px;
        "
      >
        <div class="gf-text-primary" style="font-size: 16px; font-weight: 600">
          Create new skill
        </div>
        <button
          @click="closeSkillAuthor()"
          class="gf-text-muted"
          style="
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
          "
          aria-label="Close"
        >
          ×
        </button>
      </div>
      <div class="gf-text-muted" style="font-size: 12px; margin-bottom: 12px">
        Describe the skill you want to create or paste a draft. The candidacy
        check routes the input to the right artifact type before scaffolding.
      </div>

      <!-- Tab switcher -->
      <div
        style="
          display: flex;
          gap: 4px;
          border-bottom: 1px solid var(--border-subtle);
          margin-bottom: 12px;
        "
      >
        <button
          @click="skillAuthorTab = 'description'"
          :style="{
            padding: '6px 12px',
            border: 'none',
            background: 'none',
            cursor: 'pointer',
            color: skillAuthorTab === 'description' ? 'var(--accent)' : 'var(--text-muted)',
            borderBottom: skillAuthorTab === 'description' ? '2px solid var(--accent)' : '2px solid transparent',
            fontWeight: 600,
            fontSize: '12px',
          }"
        >
          From description
        </button>
        <button
          @click="skillAuthorTab = 'draft'"
          :style="{
            padding: '6px 12px',
            border: 'none',
            background: 'none',
            cursor: 'pointer',
            color: skillAuthorTab === 'draft' ? 'var(--accent)' : 'var(--text-muted)',
            borderBottom: skillAuthorTab === 'draft' ? '2px solid var(--accent)' : '2px solid transparent',
            fontWeight: 600,
            fontSize: '12px',
          }"
        >
          From draft
        </button>
      </div>

      <!-- Description tab -->
      <template x-if="skillAuthorTab === 'description'">
        <div style="display: flex; flex-direction: column; gap: 8px">
          <label
            class="gf-text-secondary"
            style="font-size: 11px; font-weight: 600"
          >
            What should this skill do?
          </label>
          <textarea
            x-model="skillAuthorDescription"
            placeholder="I want a workflow that …"
            rows="4"
            style="
              width: 100%;
              padding: 8px 10px;
              font-size: 12px;
              background: var(--bg-input);
              color: var(--text-primary);
              border: 1px solid var(--border-subtle);
              border-radius: 4px;
              font-family: inherit;
              resize: vertical;
            "
          ></textarea>
        </div>
      </template>

      <!-- Draft tab -->
      <template x-if="skillAuthorTab === 'draft'">
        <div style="display: flex; flex-direction: column; gap: 8px">
          <label
            class="gf-text-secondary"
            style="font-size: 11px; font-weight: 600"
          >
            Paste your markdown draft
          </label>
          <textarea
            x-model="skillAuthorDraft"
            placeholder="---&#10;name: my-skill&#10;…"
            rows="10"
            style="
              width: 100%;
              padding: 8px 10px;
              font-size: 11px;
              background: var(--bg-input);
              color: var(--text-primary);
              border: 1px solid var(--border-subtle);
              border-radius: 4px;
              font-family: ui-monospace, monospace;
              resize: vertical;
            "
          ></textarea>
        </div>
      </template>

      <div style="display: flex; gap: 12px; margin-top: 12px">
        <button
          @click="runSkillAuthorCandidacy()"
          :disabled="skillAuthorLoading"
          class="gf-btn gf-btn-primary"
          style="padding: 6px 14px; font-size: 12px; font-weight: 600"
        >
          <span x-show="!skillAuthorLoading">Run candidacy check</span>
          <span x-show="skillAuthorLoading">Checking…</span>
        </button>
      </div>

      <!-- Candidacy result -->
      <template x-if="skillAuthorResult">
        <div
          style="
            margin-top: 16px;
            padding: 12px;
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            gap: 8px;
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <span
              class="gf-text-primary"
              style="font-weight: 600; font-size: 13px"
              x-text="skillAuthorResultLabel"
            ></span>
            <span
              class="gf-text-muted"
              style="font-size: 11px"
              x-text="`(${Math.round(skillAuthorResult.confidence * 100)}% confidence)`"
            ></span>
          </div>
          <div class="gf-text-muted" style="font-size: 11px; line-height: 1.5">
            <strong>Reasoning:</strong>
            <ul style="margin: 4px 0; padding-left: 18px">
              <template x-for="r in skillAuthorResult.reasoning" :key="r">
                <li x-text="r"></li>
              </template>
            </ul>
          </div>
          <div class="gf-text-muted" style="font-size: 11px; line-height: 1.5">
            <strong>Next steps:</strong>
            <ul style="margin: 4px 0; padding-left: 18px">
              <template
                x-for="s in skillAuthorResult.nextSteps"
                :key="s.action"
              >
                <li x-text="s.action"></li>
              </template>
            </ul>
          </div>

          <!-- Scaffold action (only for skill / playbook recommendations) -->
          <template x-if="skillAuthorScaffoldable">
            <div
              style="
                display: flex;
                gap: 8px;
                align-items: center;
                margin-top: 4px;
              "
            >
              <input
                x-model="skillAuthorName"
                placeholder="kebab-case-name"
                style="
                  flex: 1;
                  padding: 6px 8px;
                  font-size: 12px;
                  background: var(--bg-input);
                  color: var(--text-primary);
                  border: 1px solid var(--border-subtle);
                  border-radius: 4px;
                  font-family: ui-monospace, monospace;
                "
              />
              <button
                @click="scaffoldFromCandidacy()"
                :disabled="skillAuthorLoading || !skillAuthorName"
                class="gf-btn gf-btn-primary"
                style="padding: 6px 14px; font-size: 12px; font-weight: 600"
              >
                Scaffold and write
              </button>
            </div>
          </template>
        </div>
      </template>

      <!-- Scaffold confirmation -->
      <template x-if="skillAuthorScaffoldOutput">
        <div
          style="
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 4px;
            font-size: 11px;
            color: #22c55e;
          "
        >
          <strong>Wrote:</strong>
          <code x-text="skillAuthorScaffoldOutput.path"></code>
          <template x-if="skillAuthorScaffoldOutput.score">
            <span
              x-text="` (initial score ${skillAuthorScaffoldOutput.score.totalScore}/${skillAuthorScaffoldOutput.score.profileMax})`"
            ></span>
          </template>
        </div>
      </template>

      <!-- Error display -->
      <template x-if="skillAuthorError">
        <div
          style="
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 4px;
            font-size: 11px;
            color: #ef4444;
          "
          x-text="skillAuthorError"
        ></div>
      </template>
      </div>
    </div>
  </template>
</div>
