<!doctype html>
<html lang="en" x-data="app()" x-init="init()">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOAT Flow Dashboard</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="/assets/styles.css" />
    <!-- Prevent FOUC: apply dark mode before paint -->
    <script>
      if (
        localStorage.getItem("gf-dark") === "true" ||
        (!localStorage.getItem("gf-dark") &&
          matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body
    class="h-screen overflow-hidden"
    style="background: #1a1a1e; color: #e4e4e7"
    :style="darkMode ? 'background:#1a1a1e;color:#e4e4e7;' : 'background:#fafafa;color:#18181b;'"
  >
    <!-- Screen reader live region -->
    <div
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
      x-text="srAnnouncement"
    ></div>

    <!-- Floating toast notification -->
    <div
      x-show="toast"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 translate-y-2"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 bg-red-600 text-white"
    >
      <svg
        class="w-4 h-4 shrink-0"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
        />
      </svg>
      <span x-text="toast"></span>
      <button
        @click="toast = ''"
        class="ml-1 text-white/70 hover:text-white text-xs"
      >
        &times;
      </button>
    </div>

    <div class="flex flex-col min-h-screen">
      <!-- ═══ Header ═══ -->
      <header class="no-print gf-header shrink-0 z-30">
        <button @click="activeView = 'home'" class="gf-logo">
          🐐 GOAT Flow
        </button>
        <span class="gf-header-proj" x-text="projectName"></span>
        <div style="flex: 1"></div>
        <div class="gf-nav-wrap">
          <div class="gf-nav">
            <button
              @click="activeView = 'home'"
              class="gf-nb"
              :class="activeView === 'home' && 'gf-nb-active'"
            >
              Home
            </button>
            <button
              @click="activeView = 'scan'; scanDetailAgent = scanDetailAgent || report?.agents?.[0]?.agent || null; selectedAgent = scanDetailAgent"
              class="gf-nb"
              :class="activeView === 'scan' && 'gf-nb-active'"
            >
              Scanner
            </button>
            <button
              @click="activeView = 'workspace'"
              class="gf-nb"
              :class="activeView === 'workspace' && 'gf-nb-active'"
              style="position: relative"
            >
              Workspace
              <span
                x-show="terminalSessionId && !terminalEnded && terminalSessionCount === 0"
                style="
                  position: absolute;
                  top: -2px;
                  right: -2px;
                  width: 6px;
                  height: 6px;
                  border-radius: 50%;
                  background: #4ade80;
                "
              ></span>
              <span
                x-show="terminalSessionCount > 0"
                x-cloak
                class="ml-1 px-1.5 py-0.5 rounded-full text-xs font-mono"
                :class="{
            'bg-green-100 text-green-800': terminalSessionCount === 1,
            'bg-yellow-100 text-yellow-800': terminalSessionCount === 2,
            'bg-red-100 text-red-800': terminalSessionCount >= 3,
          }"
                x-text="terminalSessionCount + '/3'"
              ></span>
            </button>
            <button
              @click="activeView = 'projects'"
              class="gf-nb"
              :class="activeView === 'projects' && 'gf-nb-active'"
            >
              Projects
            </button>
            <button
              @click="activeView = 'rubrics'; loadRubrics()"
              class="gf-nb"
              :class="activeView === 'rubrics' && 'gf-nb-active'"
            >
              Rubrics
            </button>
            <button
              @click="activeView = 'wizard'; detectStack()"
              class="gf-nb"
              :class="activeView === 'wizard' && 'gf-nb-active'"
            >
              Setup
            </button>
          </div>
        </div>
        <span class="gf-text-muted" style="font-size: 11px; margin-right: 4px"
          >Terminal:</span
        >
        <div class="gf-asel">
          <template x-for="agent in installedAgents" :key="agent.id">
            <button
              @click="activeRunner = agent.id"
              class="gf-ab"
              :class="activeRunner === agent.id && 'gf-ab-active'"
              :disabled="terminalSessionId && !terminalEnded"
              x-text="agent.id"
            ></button>
          </template>
          <span
            x-show="installedAgents.length === 0"
            class="gf-ab"
            style="cursor: default; font-style: italic"
            >no agents</span
          >
        </div>
        <button
          @click="activeView = 'help'"
          class="gf-ib"
          :class="activeView === 'help' && 'gf-nb-active'"
          title="Getting Started"
          style="width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid currentColor; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; padding: 0;"
        >?</button>
        <button
          @click="darkMode = !darkMode"
          class="gf-ib"
          :title="darkMode ? 'Light mode' : 'Dark mode'"
          style="width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; padding: 0; transition: transform 0.3s ease;"
          :style="darkMode ? '' : 'transform: rotate(40deg)'"
        >
          <svg
            x-show="darkMode"
            x-cloak
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 rotate-[-90deg] scale-0"
            x-transition:enter-end="opacity-100 rotate-0 scale-100"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="currentColor"
            style="filter: drop-shadow(0 0 2px rgba(250, 204, 21, 0.4));"
          >
            <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" />
          </svg>
          <svg
            x-show="!darkMode"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 rotate-90 scale-0"
            x-transition:enter-end="opacity-100 rotate-0 scale-100"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" />
          </svg>
        </button>
      </header>

      <!-- Main Content -->
      <main class="flex-1 overflow-hidden">
        <!-- Loading Spinner -->
        <div
          x-show="scanning"
          x-cloak
          class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/20 dark:bg-black/40"
        >
          <div
            class="bg-white dark:bg-gray-800 rounded-xl shadow-lg px-6 py-4 flex items-center gap-3"
          >
            <svg
              class="animate-spin h-5 w-5 text-blue-600"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              />
            </svg>
            <span class="text-sm font-medium">Scanning...</span>
          </div>
        </div>

        <!-- View fragments (assembled server-side) -->
        <!-- include: views/scanner.html -->
        <!-- include: views/workspace.html -->
        <!-- include: views/wizard.html -->
        <!-- include: views/home.html -->
        <!-- include: views/projects.html -->
        <!-- include: views/rubrics.html -->
        <!-- include: views/help.html -->
      </main>
    </div>

    <!-- Preset data (separate file for easy editing) -->
    <script src="/assets/presets.js"></script>

    <script src="/assets/app.js"></script>
  </body>
</html>
