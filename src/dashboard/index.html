<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOAT Flow Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <style>
    [x-cloak] { display: none !important; }
    /* Pointer cursor for all interactive elements */
    button, select, summary, label, [role="button"] { cursor: pointer; }
    /* xterm.js container */
    .terminal-container { width: 100%; height: 100%; }
    .terminal-container .xterm { height: 100%; }
    .terminal-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 10; border-radius: 0.75rem; }
    /* Dark mode fallback — neutral zinc palette (no blue tint) */
    .dark { background-color: #1a1a1e !important; color: #e4e4e7; }
    .dark .bg-white { background-color: #111114 !important; }
    .dark .bg-gray-50, .dark .bg-gray-100 { background-color: #1a1a1e !important; }
    .dark .bg-gray-800 { background-color: #111114 !important; }
    .dark .bg-gray-700 { background-color: #27272a !important; }
    .dark .bg-gray-900 { background-color: #1a1a1e !important; }
    .dark .border-gray-200, .dark .border-gray-100 { border-color: #2a2a2e !important; }
    .dark .border-gray-300 { border-color: #3f3f46 !important; }
    .dark .border-gray-600 { border-color: #3f3f46 !important; }
    .dark .border-gray-700 { border-color: #2a2a2e !important; }
    .dark .text-gray-900 { color: #e4e4e7 !important; }
    .dark .text-gray-700 { color: #d4d4d8 !important; }
    .dark .text-gray-600 { color: #a1a1aa !important; }
    .dark .text-gray-500 { color: #a1a1aa !important; }
    .dark .text-gray-400 { color: #71717a !important; }
    .dark .text-gray-300 { color: #a1a1aa !important; }
    .dark input, .dark textarea { background-color: #1a1a1e !important; color: #e4e4e7 !important; border-color: #3f3f46 !important; }
    .dark pre { color: #d4d4d8 !important; }
    .dark .stroke-gray-700, .dark path[stroke="#e5e7eb"] { stroke: #2a2a2e !important; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
      .shadow { box-shadow: none !important; border: 1px solid #e5e7eb; }
      main { padding: 0 !important; }
      * { break-inside: avoid; }
      svg path { stroke-width: 4 !important; }
      [role="tabpanel"] { page-break-before: auto; }
      h3 { page-break-after: avoid; }
      .rounded-full { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      span[class*="bg-"] { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    :focus-visible { outline: 2px solid #60a5fa; outline-offset: 3px; border-radius: 4px; box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.3); }

    /* ═══ GOAT Flow Design Tokens ═══ */
    /* Dark theme text/bg helpers */
    .gf-text-primary { color: #e4e4e7; }
    .gf-text-secondary { color: #a1a1aa; }
    .gf-text-muted { color: #71717a; }
    .gf-text-disabled { color: #52525b; }
    .gf-tags { display: flex !important; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .gf-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #27272a; color: #a1a1aa; border: none; }
    .gf-banner-row { display: flex !important; flex-direction: row !important; align-items: center !important; gap: 12px; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
    .gf-surface { background: #111114; border: 0.5px solid #2a2a2e; }

    /* Health banner */
    .gf-banner-pass { background: #14532d; border: 0.5px solid #166534; }
    .gf-banner-pass .gf-banner-icon { background: #166534; color: #4ade80; }
    .gf-banner-pass .gf-banner-title { color: #86efac; }
    .gf-banner-pass .gf-banner-sub { color: #bbf7d0; }
    .gf-banner-pass .gf-banner-ts { color: #4ade80; }
    .gf-banner-fail { background: #450a0a; border: 0.5px solid #7f1d1d; }
    .gf-banner-fail .gf-banner-icon { background: #7f1d1d; color: #f87171; }
    .gf-banner-fail .gf-banner-title { color: #fca5a5; }
    .gf-banner-fail .gf-banner-sub { color: #fecaca; }
    .gf-banner-fail .gf-banner-ts { color: #f87171; }

    /* Metric cards */
    .gf-metric { border-radius: 8px; padding: 14px 12px; text-align: center; background: #27272a; border: none; }
    .gf-metric-value { font-size: 22px; font-weight: 500; color: #e4e4e7; }
    .gf-metric-label { font-size: 11px; margin-top: 2px; color: #71717a; }
    .gf-grade-text { color: #4ade80 !important; }

    /* Agents table card */
    .gf-card { background: #111114; border: 0.5px solid #2a2a2e; border-radius: 8px; padding: 16px 20px; text-align: left; }
    .gf-card-header { border-bottom: 0.5px solid #2a2a2e; }
    .gf-link { color: #4ade80; }
    .gf-link:hover { opacity: 0.8; }
    .gf-th { text-align: left; font-size: 11px; font-weight: 400; padding: 6px 16px; text-transform: uppercase; letter-spacing: 0.5px; color: #71717a; border-bottom: 0.5px solid #2a2a2e; }
    .gf-td { padding: 10px 16px; }
    .gf-tr td { border-bottom: 0.5px solid #1e1e22; }
    .gf-tr:last-child td { border-bottom: none; }
    .gf-tr-clickable { cursor: pointer; }
    .gf-tr-clickable:hover td { background: #1a1a1e; }
    .gf-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .gf-dot-on { background: #4ade80; }
    .gf-dot-off { background: #3f3f46; }

    /* Grade badge */
    .gf-grade { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 5px; font-size: 14px; font-weight: 500; }
    .gf-grade-a { background: rgba(74,222,128,0.12); color: #4ade80; }
    .gf-grade-b { background: rgba(250,204,21,0.12); color: #facc15; }
    .gf-grade-c, .gf-grade-d, .gf-grade-f { background: rgba(248,113,113,0.12); color: #f87171; }
    .gf-grade-na { background: #27272a; color: #52525b; font-size: 12px; }

    /* Tier bars */
    .gf-tier-label { font-size: 9px; width: 8px; color: #71717a; }
    .gf-tier-bar { height: 3px; border-radius: 2px; background: #4ade80; }

    /* Quick actions */
    .gf-action-btn { border-radius: 8px; padding: 12px; text-align: center; background: #111114; border: 0.5px solid #2a2a2e; cursor: pointer; }
    .gf-action-btn:hover { border-color: #3f3f46; }
    .gf-action-title { font-size: 13px; font-weight: 500; color: #e4e4e7; }
    .gf-action-desc { font-size: 11px; margin-top: 2px; color: #71717a; }

    /* Footer */
    .gf-footer { color: #52525b; }
    .gf-footer-link { color: #4ade80; text-decoration: none; }
    .gf-footer-link:hover { text-decoration: underline; }

    /* Setup page */
    .gf-setup-wrap { display: flex !important; gap: 16px; padding: 20px 24px; height: calc(100% - 40px); }
    .gf-setup-left { width: 45%; display: flex; flex-direction: column; overflow-y: auto; }
    .gf-setup-right { width: 55%; display: flex; flex-direction: column; overflow: hidden; }
    .gf-agent-strip { padding: 12px 20px; display: flex !important; gap: 8px; border-top: 0.5px solid #2a2a2e; }
    .gf-agent-card { flex: 1; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; background: #1a1a1e; border: 0.5px solid #2a2a2e; transition: border-color 0.1s; }
    .gf-agent-card:hover { border-color: #3f3f46; }
    .gf-agent-card-sel { border-color: #4ade80 !important; background: rgba(20, 83, 45, 0.12); }
    .gf-detect { padding: 16px 20px; border-top: 0.5px solid #2a2a2e; }
    .gf-detect-row { display: flex !important; align-items: center; gap: 12px; padding: 4px 0; }
    .gf-detect-label { font-size: 12px; font-weight: 500; width: 90px; flex-shrink: 0; color: #71717a; }
    .gf-detect-val { font-size: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; color: #d4d4d8; }
    .gf-detect-missing { font-style: italic; font-family: system-ui, sans-serif; color: #52525b !important; }
    .gf-prompt-card { border-radius: 8px; display: flex; flex-direction: column; flex: 1; overflow: hidden; background: #111114; border: 0.5px solid #2a2a2e; }
    .gf-prompt-hdr { display: flex !important; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid #2a2a2e; }
    .gf-prompt-body { flex: 1; overflow-y: auto; padding: 16px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.7; white-space: pre-wrap; background: #0d0d10; color: #a1a1aa; margin: 0; }
    .gf-btn-copy { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; background: #27272a; color: #a1a1aa; border: 0.5px solid #3f3f46; }
    .gf-btn-terminal { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; background: #166534; color: #4ade80; font-weight: 500; border: none; }
    .gf-btn-regen { font-size: 11px; cursor: pointer; color: #4ade80; background: none; border: none; }

    /* Setup light overrides */
    :root:not(.dark) .gf-agent-strip { border-top-color: #e4e4e7; }
    :root:not(.dark) .gf-agent-card { background: #fafafa; border-color: #e4e4e7; }
    :root:not(.dark) .gf-agent-card:hover { border-color: #d4d4d8; }
    :root:not(.dark) .gf-agent-card-sel { border-color: #16a34a !important; background: rgba(220, 252, 231, 0.06); }
    :root:not(.dark) .gf-detect { border-top-color: #e4e4e7; }
    :root:not(.dark) .gf-detect-label { color: #a1a1aa; }
    :root:not(.dark) .gf-detect-val { color: #3f3f46; }
    :root:not(.dark) .gf-detect-missing { color: #d4d4d8 !important; }
    :root:not(.dark) .gf-prompt-card { background: #fff; border-color: #e4e4e7; }
    :root:not(.dark) .gf-prompt-hdr { border-bottom-color: #e4e4e7; }
    :root:not(.dark) .gf-prompt-body { background: #f9fafb; color: #4b5563; }
    :root:not(.dark) .gf-btn-copy { background: #f4f4f5; color: #71717a; border-color: #e4e4e7; }
    :root:not(.dark) .gf-btn-terminal { background: #16a34a; color: #fff; }
    :root:not(.dark) .gf-btn-regen { color: #16a34a; }

    /* Primary button */
    .gf-btn-primary { background: #4ade80; color: #111114; }
    .gf-btn-primary:hover { background: #86efac; }
    .gf-btn-primary:disabled { opacity: 0.5; }

    /* Header redesign */
    .gf-header { display: flex; align-items: center; padding: 0 16px; height: 44px; gap: 8px; position: relative; background: #111114; border-bottom: 0.5px solid #2a2a2e; }
    .gf-logo { font-weight: 500; font-size: 15px; color: #e4e4e7; cursor: pointer; border: none; background: none; padding: 0; }
    .gf-header-ver { font-size: 11px; margin-left: 2px; color: #52525b; }
    .gf-header-proj { font-size: 13px; font-weight: 500; margin-left: 6px; color: #4ade80; }
    .gf-nav-wrap { position: absolute; left: 50%; transform: translateX(-50%); }
    .gf-nav { display: flex; border-radius: 6px; padding: 2px; gap: 2px; }
    .gf-nb { font-size: 13px; padding: 4px 10px; border-radius: 5px; cursor: pointer; white-space: nowrap; font-weight: 500; color: #71717a; background: none; border: none; }
    .gf-nb:hover { color: #e4e4e7; }
    .gf-nb-active { color: #e4e4e7; font-weight: 600; }
    .gf-asel { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #3f3f46; }
    .gf-ab { font-size: 11px; padding: 5px 12px; cursor: pointer; color: #71717a; border: none; border-right: 1px solid #3f3f46; background: none; }
    .gf-ab:last-child { border-right: none; }
    .gf-ab:hover { color: #a1a1aa; background: #27272a; }
    .gf-ab-active { background: #166534 !important; color: #4ade80 !important; font-weight: 500; border-right-color: #166534 !important; }
    .gf-ib { padding: 4px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; color: #71717a; background: none; border: none; margin-left: 4px; }
    .gf-ib:hover { background: #27272a; color: #a1a1aa; }

    /* ═══ Light mode overrides ═══ */
    :root:not(.dark) .gf-text-primary { color: #18181b; }
    :root:not(.dark) .gf-text-secondary { color: #71717a; }
    :root:not(.dark) .gf-text-muted { color: #a1a1aa; }
    :root:not(.dark) .gf-text-disabled { color: #d4d4d8; }
    :root:not(.dark) .gf-tag { background: #f4f4f5; color: #71717a; border: none; }
    :root:not(.dark) .gf-surface { background: #fff; border-color: #e4e4e7; }
    :root:not(.dark) .gf-banner-pass { background: #dcfce7; border-color: #bbf7d0; }
    :root:not(.dark) .gf-banner-pass .gf-banner-icon { background: #bbf7d0; color: #15803d; }
    :root:not(.dark) .gf-banner-pass .gf-banner-title { color: #15803d; }
    :root:not(.dark) .gf-banner-pass .gf-banner-sub { color: #166534; }
    :root:not(.dark) .gf-banner-pass .gf-banner-ts { color: #16a34a; }
    :root:not(.dark) .gf-banner-fail { background: #fee2e2; border-color: #fecaca; }
    :root:not(.dark) .gf-banner-fail .gf-banner-icon { background: #fecaca; color: #dc2626; }
    :root:not(.dark) .gf-banner-fail .gf-banner-title { color: #991b1b; }
    :root:not(.dark) .gf-banner-fail .gf-banner-sub { color: #7f1d1d; }
    :root:not(.dark) .gf-banner-fail .gf-banner-ts { color: #dc2626; }
    :root:not(.dark) .gf-metric { background: #f4f4f5; }
    :root:not(.dark) .gf-metric-value { color: #18181b; }
    :root:not(.dark) .gf-metric-label { color: #a1a1aa; }
    :root:not(.dark) .gf-grade-text { color: #16a34a !important; }
    :root:not(.dark) .gf-card { background: #fff; border-color: #e4e4e7; }
    :root:not(.dark) .gf-card-header { border-bottom-color: #e4e4e7; }
    :root:not(.dark) .gf-link { color: #16a34a; }
    :root:not(.dark) .gf-th { color: #a1a1aa; border-bottom-color: #e4e4e7; }
    :root:not(.dark) .gf-tr td { border-bottom-color: #f4f4f5; }
    :root:not(.dark) .gf-tr-clickable:hover td { background: #fafafa; }
    :root:not(.dark) .gf-dot-on { background: #16a34a; }
    :root:not(.dark) .gf-dot-off { background: #d4d4d8; }
    :root:not(.dark) .gf-grade-a { background: #dcfce7; color: #15803d; }
    :root:not(.dark) .gf-grade-b { background: #fef9c3; color: #d97706; }
    :root:not(.dark) .gf-grade-c, :root:not(.dark) .gf-grade-d, :root:not(.dark) .gf-grade-f { background: #fee2e2; color: #dc2626; }
    :root:not(.dark) .gf-grade-na { background: #f4f4f5; color: #d4d4d8; }
    :root:not(.dark) .gf-tier-label { color: #a1a1aa; }
    :root:not(.dark) .gf-tier-bar { background: #16a34a; }
    :root:not(.dark) .gf-action-btn { background: #fff; border-color: #e4e4e7; }
    :root:not(.dark) .gf-action-btn:hover { border-color: #d4d4d8; }
    :root:not(.dark) .gf-action-title { color: #18181b; }
    :root:not(.dark) .gf-action-desc { color: #a1a1aa; }
    :root:not(.dark) .gf-footer { color: #d4d4d8; }
    :root:not(.dark) .gf-footer-link { color: #16a34a; }
    :root:not(.dark) .gf-btn-primary { background: #16a34a; color: #fff; }
    :root:not(.dark) .gf-header { background: #fff; border-bottom-color: #e4e4e7; }
    :root:not(.dark) .gf-logo { color: #18181b; }
    :root:not(.dark) .gf-header-ver { color: #a1a1aa; }
    :root:not(.dark) .gf-header-proj { color: #16a34a; }
    :root:not(.dark) .gf-nb { color: #a1a1aa; }
    :root:not(.dark) .gf-nb:hover { color: #18181b; }
    :root:not(.dark) .gf-nb-active { color: #18181b; }
    :root:not(.dark) .gf-asel { border-color: #e4e4e7; }
    :root:not(.dark) .gf-ab { color: #a1a1aa; border-right-color: #e4e4e7; }
    :root:not(.dark) .gf-ab:hover { color: #71717a; background: #f4f4f5; }
    :root:not(.dark) .gf-ab-active { background: #dcfce7 !important; color: #15803d !important; border-right-color: #dcfce7 !important; }
    :root:not(.dark) .gf-ib { color: #a1a1aa; }
    :root:not(.dark) .gf-ib:hover { background: #f4f4f5; color: #71717a; }
  </style>
  <!-- Prevent FOUC: apply dark mode before paint -->
  <script>
    if (localStorage.getItem('gf-dark') === 'true' || (!localStorage.getItem('gf-dark') && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="h-screen overflow-hidden" style="background: #1a1a1e; color: #e4e4e7;" :style="darkMode ? 'background:#1a1a1e;color:#e4e4e7;' : 'background:#fafafa;color:#18181b;'">
<!-- Screen reader live region -->
<div aria-live="polite" aria-atomic="true" class="sr-only" x-text="srAnnouncement"></div>

<!-- Floating toast notification -->
<div x-show="toast" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-2"
  class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 bg-red-600 text-white">
  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
  <span x-text="toast"></span>
  <button @click="toast = ''" class="ml-1 text-white/70 hover:text-white text-xs">&times;</button>
</div>

<div class="flex flex-col min-h-screen">

  <!-- ═══ Header ═══ -->
  <header class="no-print gf-header shrink-0 z-30">
    <button @click="activeView = 'home'" class="gf-logo">🐐 GOAT Flow</button>
    <span class="gf-header-ver" x-text="report ? `v${report.rubricVersion}` : 'v0.10.0'"></span>
    <span class="gf-header-proj" x-text="projectName"></span>
    <div style="flex: 1;"></div>
    <div class="gf-nav-wrap"><div class="gf-nav">
      <button @click="activeView = 'home'" class="gf-nb" :class="activeView === 'home' && 'gf-nb-active'">Home</button>
      <button @click="activeView = 'scan'; scanDetailAgent = scanDetailAgent || report?.agents?.[0]?.agent || null; selectedAgent = scanDetailAgent" class="gf-nb" :class="activeView === 'scan' && 'gf-nb-active'">Scanner</button>
      <button @click="activeView = 'workspace'" class="gf-nb" :class="activeView === 'workspace' && 'gf-nb-active'" style="position: relative;">Workspace
        <span x-show="terminalSessionId && !terminalEnded && activeView !== 'workspace'" style="position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: #4ade80;"></span>
      </button>
      <button @click="activeView = 'wizard'; detectStack()" class="gf-nb" :class="activeView === 'wizard' && 'gf-nb-active'">Setup</button>
      <button @click="activeView = 'settings'; loadConfig()" class="gf-nb" :class="activeView === 'settings' && 'gf-nb-active'">Config</button>
    </div></div>
    <span class="gf-text-muted" style="font-size: 11px; margin-right: 4px;">Terminal Agent:</span>
    <div class="gf-asel">
      <template x-for="agent in installedAgents" :key="agent.id">
        <button @click="activeRunner = agent.id" class="gf-ab" :class="activeRunner === agent.id && 'gf-ab-active'"
          :disabled="terminalSessionId && !terminalEnded" x-text="agent.id"></button>
      </template>
      <span x-show="installedAgents.length === 0" class="gf-ab" style="cursor: default; font-style: italic;">no agents</span>
    </div>
    <button @click="darkMode = !darkMode" class="gf-ib" :title="darkMode ? 'Light mode' : 'Dark mode'">
      <svg x-show="darkMode" x-cloak width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      <svg x-show="!darkMode" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>

        <svg class="animate-spin h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>

<!-- Preset data (separate file for easy editing) -->
<script src="/assets/presets.js"></script>

<!-- ═══════════════════════════════════════════════════════════════════
     App: State + Init
     ═══════════════════════════════════════════════════════════════════ -->
<script>
const STATUS_ORDER = { fail: 0, partial: 1, pass: 2, na: 3 };

function app() {
  return {
    // --- Core state ---
    report: window.__GOAT_FLOW_REPORT__ || null,
    selectedAgent: window.__GOAT_FLOW_REPORT__?.agents?.[0]?.agent || null,
    projectPath: window.__GOAT_FLOW_DEFAULT_PATH__ || '.',
    darkMode: localStorage.getItem('gf-dark') === 'true' || (!localStorage.getItem('gf-dark') && window.matchMedia('(prefers-color-scheme: dark)').matches),
    scanning: false, toast: '', toastError: false, copyLabel: 'Copy', srAnnouncement: '',
    activeView: 'home',
    installedAgents: [],
    activeRunner: 'claude',
    workspacePanel: 'prompts',
    scanDetailAgent: null,
    get projectName() { return this.projectPath.split('/').filter(Boolean).pop() || this.projectPath; },
    get projectColor() {
      const name = this.projectName;
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 60%, 50%)`;
    },
    showBrowser: false, browserCurrent: '', browserParent: '', browserDirs: [],

    lastScanTime: null,

    // --- Scanner state ---
    selectedFixes: [],
    fixCopyLabel: 'Copy fixes',

    // --- Terminal state ---
    terminalAvailable: false,
    terminalSessionId: null,
    terminalConnected: false,
    terminalEnded: false,
    launching: false,
    availableRunners: [],
    _terminalWs: null,
    _terminalXterm: null,
    _xtermLoaded: false,

    // --- Config/Settings state ---
    configYaml: '',
    localConfigYaml: '',
    configDirty: false,
    configNote: '',
    _localConfigPlaceholder: '# Local overrides - this file is gitignored.\n# Values here merge on top of config.yaml.\n# Uncomment and edit as needed.\n\n# userRole: developer\n# agents:\n#   - claude\n',

    // --- Wizard state ---
    wizardDetecting: false,
    wizardSelectedAgent: 'claude',
    wizardData: {
      languages: [],
      frameworks: [],
      commands: { test: '', lint: '', build: '', format: '' },
      agents: { claude: true, codex: false, gemini: false, copilot: false },
      existing: { skills: false, instructions: false, evals: false, lessons: false, footguns: false, config: false },
      nonGoatFlow: [],
    },
    wizardGenerating: false,
    wizardSetupOutputs: {},

    // --- Launcher state ---
    presets: PRESETS,
    presetFilter: 'all',
    presetSearch: '',
    presetFavorites: JSON.parse(localStorage.getItem('goat-flow-preset-favorites') || '[]'),
    toggleFavorite(id) {
      const idx = this.presetFavorites.indexOf(id);
      if (idx === -1) this.presetFavorites.push(id);
      else this.presetFavorites.splice(idx, 1);
      localStorage.setItem('goat-flow-preset-favorites', JSON.stringify(this.presetFavorites));
      this._saveFavoritesToConfig();
    },
    async _saveFavoritesToConfig() {
      try {
        const res = await fetch(`/api/config?path=${encodeURIComponent(this.projectPath)}`);
        const data = await res.json();
        let yaml = data.localConfig || '';
        // Remove existing favorites line(s)
        yaml = yaml.replace(/^\s*favorites:.*$\n?/m, '');
        yaml = yaml.replace(/^\s*- [a-z-]+\n?/gm, (match, offset) => {
          // Only remove list items that follow a favorites: key
          const before = yaml.substring(0, offset);
          return before.match(/favorites:\s*\n\s*$/m) ? '' : match;
        });
        // Append favorites
        yaml = yaml.trimEnd() + '\nfavorites:\n' + this.presetFavorites.map(f => `  - ${f}`).join('\n') + '\n';
        await fetch(`/api/config/local?path=${encodeURIComponent(this.projectPath)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: yaml }),
        });
      } catch { /* silent — localStorage is the fallback */ }
    },
    async _loadFavoritesFromConfig() {
      try {
        const res = await fetch(`/api/config?path=${encodeURIComponent(this.projectPath)}`);
        const data = await res.json();
        if (data.localConfig) {
          const match = data.localConfig.match(/favorites:\s*\n((?:\s+-\s+\S+\n?)*)/);
          if (match) {
            const ids = match[1].match(/- (\S+)/g)?.map(m => m.replace('- ', '')) || [];
            if (ids.length > 0) {
              this.presetFavorites = ids;
              localStorage.setItem('goat-flow-preset-favorites', JSON.stringify(ids));
            }
          }
        }
      } catch { /* fall back to localStorage */ }
    },
    isFavorite(id) { return this.presetFavorites.includes(id); },
    get presetCats() {
      const cats = new Map();
      for (const p of this.presets) if (!cats.has(p.cat)) cats.set(p.cat, p.cat.charAt(0).toUpperCase() + p.cat.slice(1));
      return [{ id: 'all', label: 'All' }, { id: 'favorites', label: '\u2605 Favorites' }, ...Array.from(cats, ([id, label]) => ({ id, label }))];
    },
    get filteredPresets() {
      let list;
      if (this.presetFilter === 'favorites') {
        list = this.presets.filter(p => this.presetFavorites.includes(p.id));
      } else {
        list = this.presetFilter === 'all' ? this.presets : this.presets.filter(p => p.cat === this.presetFilter);
      }
      if (this.presetSearch.trim()) {
        const q = this.presetSearch.toLowerCase();
        list = list.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q));
      } else if (this.presetFilter !== 'favorites') {
        const favSet = new Set(this.presetFavorites);
        list = [...list.filter(p => favSet.has(p.id)), ...list.filter(p => !favSet.has(p.id))];
      }
      return list;
    },
    /** Adapt /goat prefix for the active runner (Codex uses $goat) */
    adaptPrompt(prompt) {
      if (this.activeRunner === 'codex') return prompt.replace(/^\/goat\b/, '$goat');
      return prompt;
    },
    copyPreset(prompt) { this.copyText(this.adaptPrompt(prompt)); },
    sendToTerminal(text) {
      if (!this._terminalWs || this._terminalWs.readyState !== WebSocket.OPEN) {
        this.showToast('No active terminal session', true);
        return;
      }
      // Use bracketed paste mode so the terminal receives the entire text as a single paste,
      // not as individual keystrokes that trigger line-by-line execution.
      // \x1b[200~ = start bracketed paste, \x1b[201~ = end bracketed paste
      const adapted = this.adaptPrompt(text);
      const escaped = adapted.replace(/\r?\n/g, ' ');
      this._terminalWs.send(JSON.stringify({ type: 'input', data: escaped + '\r' }));
    },

    // --- Init ---
    init() {
      this.$watch('darkMode', v => {
        localStorage.setItem('gf-dark', v);
        document.documentElement.classList.toggle('dark', v);
      });
      // Re-fit terminal when switching back to workspace view.
      // The terminal container must have real dimensions before fitting.
      // Use requestAnimationFrame to wait for the browser to actually paint.
      this.$watch('activeView', v => {
        if (v === 'workspace' && this._terminalXterm?._addonFit) {
          const refit = () => {
            const container = this.$refs.terminalContainer;
            if (!container || container.offsetWidth === 0) return false;
            this._terminalXterm._addonFit.fit();
            if (this._terminalWs?.readyState === WebSocket.OPEN) {
              this._terminalWs.send(JSON.stringify({ type: 'resize', cols: this._terminalXterm.cols, rows: this._terminalXterm.rows }));
            }
            return true;
          };
          // Poll until the container has real dimensions (x-show transition complete)
          const poll = (attempts = 0) => {
            if (attempts > 20) return; // give up after ~1s
            requestAnimationFrame(() => {
              if (!refit()) setTimeout(() => poll(attempts + 1), 50);
            });
          };
          this.$nextTick(() => poll());
        }
      });
      // Also re-fit when switching to the terminal sub-panel on mobile
      this.$watch('workspacePanel', v => {
        if (v === 'terminal' && this._terminalXterm?._addonFit) {
          requestAnimationFrame(() => {
            this._terminalXterm._addonFit.fit();
            if (this._terminalWs?.readyState === WebSocket.OPEN) {
              this._terminalWs.send(JSON.stringify({ type: 'resize', cols: this._terminalXterm.cols, rows: this._terminalXterm.rows }));
            }
          });
        }
      });
      // Dynamic browser tab title
      const updateTitle = () => { document.title = `${this.projectName} | GOAT Flow`; };
      this.$watch('projectPath', updateTitle);
      updateTitle();
      // Sync initial state (anti-FOUC script may have added 'dark' before Alpine)
      document.documentElement.classList.toggle('dark', this.darkMode);
      if (location.protocol === 'http:' || location.protocol === 'https:') {
        this.runScan();
        this.checkTerminalAvailable();
        this._loadFavoritesFromConfig();
        // Detect installed agents
        fetch('/api/agents/installed').then(r => r.json()).then(data => {
          this.installedAgents = data.agents.filter(a => a.installed);
          if (this.installedAgents.length > 0 && !this.installedAgents.find(a => a.id === this.activeRunner)) {
            this.activeRunner = this.installedAgents[0].id;
          }
        }).catch(() => {});
      }
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { this.showBrowser = false; }
        // Ctrl+Shift+D exits terminal view
        if (e.key === 'D' && e.ctrlKey && e.shiftKey && this.activeView === 'workspace' && this.terminalSessionId) { e.preventDefault(); this.exitTerminal(); return; }
        // "/" focuses search (when not in an input/textarea)
        if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) {
          e.preventDefault();
          const searchInput = this.$refs.presetSearchInput;
          if (searchInput) { this.activeView = 'workspace'; this.$nextTick(() => searchInput.focus()); }
        }
      });
    },

    // -- API Calls --
    async runScan() {
      this.scanning = true; this.toast = '';
      try {
        const res = await fetch(`/api/scan?path=${encodeURIComponent(this.projectPath)}`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        this.report = data;
        this.selectedAgent = data.agents?.[0]?.agent || null;
        this.lastScanTime = new Date();
        if (!this.scanDetailAgent) { this.scanDetailAgent = data.agents?.[0]?.agent || null; }
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);
        this.showToast(msg.includes('Failed to fetch') ? 'Server not running. Start with: goat-flow dashboard .' : msg, true);
      }
      this.scanning = false;
    },
    // -- Folder Browser --
    async openBrowser() { this.showBrowser = !this.showBrowser; if (this.showBrowser) await this.browseTo(this.projectPath); },
    async browseTo(path) {
      try {
        const res = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (data.error) { this.showToast(data.error, true); return; }
        this.browserCurrent = data.current; this.browserParent = data.parent; this.browserDirs = data.dirs;
      } catch { this.showToast('Browse failed', true); }
    },
    selectDir(dir) {
      if (dir.isProject) { this.projectPath = dir.path; this.showBrowser = false; this.runScan(); }
      else this.browseTo(dir.path);
    },

    // -- Config/Settings --
    async loadConfig() {
      try {
        const res = await fetch(`/api/config?path=${encodeURIComponent(this.projectPath)}`);
        const data = await res.json();
        if (data.error) { this.showToast(data.error, true); return; }
        if (data.note) {
          this.configNote = data.note;
          this.configYaml = '';
          this.localConfigYaml = this._localConfigPlaceholder;
        } else {
          this.configNote = '';
          this.configYaml = data.config || '';
          this.localConfigYaml = data.localConfig || this._localConfigPlaceholder;
        }
        this.configDirty = false;
      } catch { this.showToast('Failed to load config', true); }
    },
    async saveLocalConfig() {
      try {
        const res = await fetch(`/api/config/local?path=${encodeURIComponent(this.projectPath)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: this.localConfigYaml }),
        });
        const data = await res.json();
        if (data.error) { this.showToast(data.error, true); return; }
        this.configDirty = false;
        // saved successfully — no toast needed
      } catch { this.showToast('Failed to save config', true); }
    },
    async resetLocalConfig() {
      try {
        const res = await fetch(`/api/config/local?path=${encodeURIComponent(this.projectPath)}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.error) { this.showToast(data.error, true); return; }
        this.localConfigYaml = this._localConfigPlaceholder;
        this.configDirty = false;
        // reset successfully — no toast needed
      } catch { this.showToast('Failed to reset config', true); }
    },

    // -- Wizard --
    async detectStack() {
      this.wizardDetecting = true;
      try {
        const res = await fetch(`/api/setup/detect?path=${encodeURIComponent(this.projectPath)}`);
        const data = await res.json();
        if (data.error) { this.showToast(data.error, true); this.wizardDetecting = false; return; }
        this.wizardData.languages = data.languages || [];
        this.wizardData.frameworks = data.frameworks || [];
        this.wizardData.commands = data.commands || { test: '', lint: '', build: '', format: '' };
        this.wizardData.agents = data.agents || { claude: true, codex: false, gemini: false, copilot: false };
        if (!Object.values(this.wizardData.agents).some(v => v)) this.wizardData.agents.claude = true;
        this.wizardData.existing = data.existing || { skills: false, instructions: false, evals: false, lessons: false, footguns: false, config: false };
        this.wizardData.nonGoatFlow = data.nonGoatFlow || [];
      } catch (err) {
        this.showToast(err.message || 'Detection failed', true);
      }
      this.wizardDetecting = false;
    },
    async generateWizardSetup() {
      this.wizardGenerating = true;
      this.wizardSetupOutputs = {};
      const agent = this.wizardSelectedAgent;
      try {
        const res = await fetch(`/api/setup?path=${encodeURIComponent(this.projectPath)}&agent=${agent}`);
        const data = await res.json();
        if (data.error) { this.showToast(`${agent}: ${data.error}`, true); }
        else { this.wizardSetupOutputs[agent] = data.output || 'No output generated.'; }
      } catch (err) {
        this.showToast(err.message || 'Generation failed', true);
      }
      this.wizardGenerating = false;
    },

    // -- Clipboard + Toast --
    copyText(text) {
      const el = document.createElement('textarea'); el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
      document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
      this.copyLabel = 'Copied!'; setTimeout(() => this.copyLabel = 'Copy', 2000);
    },
    showToast(msg, isError) { this.toast = msg; this.toastError = isError; setTimeout(() => this.toast = '', 4000); },

    // -- Fix prompts --
    buildFixPrompt(rec) {
      return `Fix ${rec.checkId} (${rec.category}): ${rec.action}\n\nVerify: goat-flow scan ${this.projectPath} --agent ${this.selectedAgent}`;
    },
    copyFixPrompt(rec) {
      this.copyText(this.buildFixPrompt(rec));
      // copied — button gives inline feedback
    },

    // -- Terminal --
    async checkTerminalAvailable() {
      try {
        const res = await fetch('/api/health');
        if (res.ok) {
          const data = await res.json();
          this.availableRunners = data.availableRunners || [];
          this.terminalAvailable = data.nodePtyAvailable && this.availableRunners.length > 0;
          if (this.availableRunners.length > 0) this.activeRunner = this.availableRunners[0];
        }
      } catch { this.terminalAvailable = false; }
    },
    async loadXterm() {
      if (this._xtermLoaded) return;
      await new Promise((resolve, reject) => {
        const link = document.createElement('link'); link.rel = 'stylesheet';
        link.href = 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css';
        document.head.appendChild(link);
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js';
        script.onerror = reject;
        const timer = setTimeout(() => reject(new Error('xterm.js load timeout')), 5000);
        script.onload = () => { clearTimeout(timer); resolve(); };
        document.head.appendChild(script);
      });
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js';
        const timer = setTimeout(() => reject(new Error('fit addon load timeout')), 5000);
        script.onload = () => { clearTimeout(timer); resolve(); };
        script.onerror = reject;
        document.head.appendChild(script);
      });
      this._xtermLoaded = true;
    },
    async launchPreset(prompt, runner) {
      if (this.launching) return;
      await this.launchInTerminal(this.adaptPrompt(prompt), runner || 'claude');
    },
    async launchInTerminal(prompt, runner = 'claude') {
      if (this.terminalSessionId && !this.terminalEnded) {
        this.showToast('A session is already running. Exit it first.', true);
        return;
      }
      this.launching = true;
      try {
        // launching — button shows "Starting..." state
        await this.loadXterm();
        const res = await fetch('/api/terminal/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, projectPath: this.projectPath, runner }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        this.terminalSessionId = data.id;
        this.terminalEnded = false;
        this.activeView = 'workspace';
        this.workspacePanel = 'terminal';
        await this.$nextTick();
        this.connectTerminal(data.wsUrl);
      } catch (err) {
        this.showToast(err.message || 'Failed to launch', true);
      }
      this.launching = false;
    },
    connectTerminal(wsUrl) {
      const container = this.$refs.terminalContainer;
      if (!container) return;
      container.innerHTML = '';
      const term = new window.Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        theme: this.darkMode
          ? { background: '#111827', foreground: '#f3f4f6', cursor: '#f3f4f6' }
          : { background: '#000000', foreground: '#f3f4f6', cursor: '#f3f4f6' },
      });
      const fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      term._addonFit = fitAddon;
      this._terminalXterm = term;
      const doFit = () => {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      };
      setTimeout(doFit, 50);
      setTimeout(doFit, 200);
      setTimeout(doFit, 500);
      const ro = new ResizeObserver(() => { doFit(); });
      ro.observe(container);
      const resizeHandler = () => { doFit(); };
      window.addEventListener('resize', resizeHandler);
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}${wsUrl}`);
      this._terminalWs = ws;
      ws.onopen = () => {
        this.terminalConnected = true;
        setTimeout(doFit, 50);
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'output') term.write(msg.data);
          else if (msg.type === 'exit') { this.terminalEnded = true; this.terminalConnected = false; }
          else if (msg.type === 'error') { term.write(`\r\n\x1b[31m${msg.message}\x1b[0m\r\n`); }
          else if (msg.type === 'shutdown') { this.terminalEnded = true; this.terminalConnected = false; }
        } catch { /* ignore malformed messages */ }
      };
      ws.onclose = () => { this.terminalConnected = false; if (!this.terminalEnded) this.terminalEnded = true; };
      ws.onerror = () => { this.terminalConnected = false; };
      term.attachCustomKeyEventHandler(e => {
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'v') {
          navigator.clipboard.readText().then(text => {
            if (text && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data: text }));
          }).catch(() => {});
          return false;
        }
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'c' && term.hasSelection()) {
          navigator.clipboard.writeText(term.getSelection()).catch(() => {});
          return false;
        }
        return true;
      });
      term.onData(data => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data }));
      });
      term.onResize(({ cols, rows }) => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      });
      this._terminalCleanup = () => {
        ro.disconnect();
        window.removeEventListener('resize', resizeHandler);
        try { ws.close(); } catch {}
        try { term.dispose(); } catch {}
        this._terminalWs = null;
        this._terminalXterm = null;
      };
      term.focus();
    },
    exitTerminal() {
      if (this.terminalSessionId && !this.terminalEnded) {
        fetch(`/api/terminal/${this.terminalSessionId}`, { method: 'DELETE' }).catch(() => {});
      }
      if (this._terminalCleanup) { this._terminalCleanup(); this._terminalCleanup = null; }
      this.terminalSessionId = null;
      this.terminalConnected = false;
      this.terminalEnded = false;
    },

    // -- Computed Properties --
    get currentAgent() { return this.report?.agents?.find(a => a.agent === (this.scanDetailAgent || this.selectedAgent)) || null; },
    get triggeredAPs() { return this.currentAgent?.antiPatterns?.filter(ap => ap.triggered) || []; },

    // -- Helpers --
    gradeColor(grade) { return { A: '#4ade80', B: '#facc15', C: '#fb923c', D: '#f87171', F: '#f87171', 'insufficient-data': '#71717a' }[grade] || '#71717a'; },
    formatTimeAgo(date) {
      if (!date) return '';
      const s = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    },
  };
}
</script>
