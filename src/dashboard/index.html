<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOAT Flow Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <link rel="stylesheet" href="/assets/styles.css">
  <!-- Prevent FOUC: apply dark mode before paint -->
  <script>
    if (localStorage.getItem('gf-dark') === 'true' || (!localStorage.getItem('gf-dark') && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="h-screen overflow-hidden" style="background: #1a1a1e; color: #e4e4e7;" :style="darkMode ? 'background:#1a1a1e;color:#e4e4e7;' : 'background:#fafafa;color:#18181b;'">
<!-- Screen reader live region -->
<div aria-live="polite" aria-atomic="true" class="sr-only" x-text="srAnnouncement"></div>

<!-- Floating toast notification -->
<div x-show="toast" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-2"
  class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 bg-red-600 text-white">
  <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
  <span x-text="toast"></span>
  <button @click="toast = ''" class="ml-1 text-white/70 hover:text-white text-xs">&times;</button>
</div>

<div class="flex flex-col min-h-screen">

  <!-- ═══ Header ═══ -->
  <header class="no-print gf-header shrink-0 z-30">
    <button @click="activeView = 'home'" class="gf-logo">🐐 GOAT Flow</button>
    <span class="gf-header-proj" x-text="projectName"></span>
    <div style="flex: 1;"></div>
    <div class="gf-nav-wrap"><div class="gf-nav">
      <button @click="activeView = 'home'" class="gf-nb" :class="activeView === 'home' && 'gf-nb-active'">Home</button>
      <button @click="activeView = 'scan'; scanDetailAgent = scanDetailAgent || report?.agents?.[0]?.agent || null; selectedAgent = scanDetailAgent" class="gf-nb" :class="activeView === 'scan' && 'gf-nb-active'">Scanner</button>
      <button @click="activeView = 'workspace'" class="gf-nb" :class="activeView === 'workspace' && 'gf-nb-active'" style="position: relative;">Workspace
        <span x-show="terminalSessionId && !terminalEnded" style="position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: #4ade80;"></span>
      </button>
      <button @click="activeView = 'wizard'; detectStack()" class="gf-nb" :class="activeView === 'wizard' && 'gf-nb-active'">Setup</button>
      <button @click="activeView = 'settings'; loadConfig()" class="gf-nb" :class="activeView === 'settings' && 'gf-nb-active'">Config</button>
    </div></div>
    <span class="gf-text-muted" style="font-size: 11px; margin-right: 4px;">Terminal:</span>
    <div class="gf-asel">
      <template x-for="agent in installedAgents" :key="agent.id">
        <button @click="activeRunner = agent.id" class="gf-ab" :class="activeRunner === agent.id && 'gf-ab-active'"
          :disabled="terminalSessionId && !terminalEnded" x-text="agent.id"></button>
      </template>
      <span x-show="installedAgents.length === 0" class="gf-ab" style="cursor: default; font-style: italic;">no agents</span>
    </div>
    <button @click="darkMode = !darkMode" class="gf-ib" :title="darkMode ? 'Light mode' : 'Dark mode'">
      <svg x-show="darkMode" x-cloak width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      <svg x-show="!darkMode" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex-1 overflow-hidden">

    <!-- Loading Spinner -->
    <div x-show="scanning" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/20 dark:bg-black/40">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg px-6 py-4 flex items-center gap-3">
        <svg class="animate-spin h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        <span class="text-sm font-medium">Scanning...</span>
      </div>
    </div>

    <!-- View fragments (assembled server-side) -->
    <!-- include: views/scanner.html -->
    <!-- include: views/workspace.html -->
    <!-- include: views/wizard.html -->
    <!-- include: views/home.html -->
    <!-- include: views/settings.html -->

  </main>
</div>

<!-- Preset data (separate file for easy editing) -->
<script src="/assets/presets.js"></script>

<script src="/assets/app.js"></script>
</body>
</html>
