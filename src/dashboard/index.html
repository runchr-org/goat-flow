<!doctype html>
<html lang="en" x-data="app()" x-init="init()">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOAT Flow Dashboard</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="/assets/styles.css" />
    <!-- Prevent FOUC: apply dark mode before paint -->
    <script>
      if (
        localStorage.getItem("gf-dark") === "true" ||
        (!localStorage.getItem("gf-dark") &&
          matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body
    class="h-screen overflow-hidden"
    style="background: #1a1a1e; color: #e4e4e7"
    :style="darkMode ? 'background:#1a1a1e;color:#e4e4e7;' : 'background:#fafafa;color:#18181b;'"
  >
    <!-- Screen reader live region -->
    <div
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
      x-text="srAnnouncement"
    ></div>

    <!-- Floating toast notification -->
    <div
      x-show="toast"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 translate-y-2"
      class="fixed bottom-14 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 bg-red-600 text-white"
    >
      <svg
        class="w-4 h-4 shrink-0"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
        />
      </svg>
      <span x-text="toast"></span>
      <button
        @click="toast = ''"
        class="ml-1 text-white/70 hover:text-white text-xs"
      >
        &times;
      </button>
    </div>

    <!-- ═══ Max Sessions Modal (global overlay; triggered from any view) ═══ -->
    <div
      x-show="showMaxSessionsModal"
      x-cloak
      @click.self="showMaxSessionsModal = false"
      @keydown.escape.window="showMaxSessionsModal = false"
      style="
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
      "
    >
      <div
        class="gf-card"
        style="
          padding: 24px 28px;
          max-width: 380px;
          text-align: center;
          border-radius: 12px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        "
      >
        <div style="font-size: 28px; margin-bottom: 12px">&#9888;</div>
        <h3
          class="gf-text-primary"
          style="font-size: 16px; font-weight: 600; margin: 0 0 6px"
        >
          Session Limit Reached
        </h3>
        <p
          class="gf-text-muted"
          style="font-size: 13px; line-height: 1.5; margin: 0 0 16px"
        >
          Maximum of 7 terminal sessions. End an existing session from the
          <button
            @click="showMaxSessionsModal = false; activeView = 'workspace'"
            style="
              background: none;
              border: none;
              padding: 0;
              color: var(--accent);
              cursor: pointer;
              font-weight: 500;
              text-decoration: underline;
              font-size: inherit;
            "
          >
            Workspace
          </button>
          sessions panel to start a new one.
        </p>
        <button
          @click="showMaxSessionsModal = false"
          class="gf-btn gf-btn-md gf-btn-primary"
          style="min-width: 100px"
        >
          OK
        </button>
      </div>
    </div>

    <!-- ═══ Project Browser Overlay ═══ -->
    <div
      x-show="showBrowser"
      x-cloak
      @click.self="showBrowser = false"
      class="fixed inset-0 z-50 flex items-start justify-center"
      style="background: rgba(0, 0, 0, 0.5); padding-top: 80px"
    >
      <div
        class="gf-card"
        style="width: 420px; max-height: 60vh; overflow-y: auto; padding: 16px"
      >
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
          "
        >
          <span
            class="gf-text-primary"
            style="font-size: 14px; font-weight: 600"
            x-text="browserCurrent"
          ></span>
          <button
            @click="showBrowser = false"
            class="gf-text-muted"
            style="
              font-size: 18px;
              cursor: pointer;
              background: none;
              border: none;
            "
          >
            &times;
          </button>
        </div>
        <button
          x-show="browserParent"
          @click="browseTo(browserParent)"
          class="gf-text-muted"
          style="
            font-size: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 0;
          "
        >
          &#8592; ..
        </button>
        <div style="display: flex; flex-direction: column; gap: 2px">
          <template x-for="dir in browserDirs" :key="dir.path">
            <button
              @click="selectDir(dir)"
              class="gf-text-primary"
              style="
                text-align: left;
                padding: 6px 8px;
                border-radius: 4px;
                font-size: 13px;
                cursor: pointer;
                background: none;
                border: none;
              "
              :style="dir.isProject ? 'font-weight: 600' : ''"
            >
              <span x-text="dir.name"></span>
              <span
                x-show="dir.isProject"
                class="gf-text-muted"
                style="font-size: 10px; margin-left: 4px"
                >(project)</span
              >
            </button>
          </template>
        </div>
      </div>
    </div>

    <div class="flex flex-col min-h-screen">
      <!-- ═══ Header ═══ -->
      <header class="no-print gf-header shrink-0 z-30">
        <button @click="activeView = 'home'" class="gf-logo">
          🐐 GOAT Flow
        </button>
        <span
          class="gf-header-proj"
          @click="openBrowser()"
          x-text="projectName"
          style="cursor: pointer"
          title="Switch project"
        ></span>
        <div class="gf-nav-wrap">
          <div class="gf-nav">
            <button
              @click="activeView = 'home'"
              class="gf-nb"
              :class="activeView === 'home' && 'gf-nb-active'"
            >
              Home
            </button>
            <button
              @click="activeView = 'quality'"
              class="gf-nb"
              :class="activeView === 'quality' && 'gf-nb-active'"
            >
              Quality
            </button>
            <button
              @click="activeView = 'wizard'; detectStack()"
              class="gf-nb"
              :class="activeView === 'wizard' && 'gf-nb-active'"
            >
              Setup
            </button>
            <button
              @click="activeView = 'projects'"
              class="gf-nb"
              :class="activeView === 'projects' && 'gf-nb-active'"
            >
              Projects
            </button>
            <button
              @click="activeView = 'prompts'"
              class="gf-nb"
              :class="activeView === 'prompts' && 'gf-nb-active'"
            >
              Prompts
            </button>
            <button
              @click="activeView = 'workspace'"
              class="gf-nb"
              :class="activeView === 'workspace' && 'gf-nb-active'"
              style="position: relative"
            >
              Workspace
              <span
                x-show="(terminalSessionId && !terminalEnded) || terminalSessionCount > 0"
                title="Terminal session active"
                style="
                  position: absolute;
                  top: 2px;
                  right: 4px;
                  width: 6px;
                  height: 6px;
                  border-radius: 50%;
                  background: #4ade80;
                "
              ></span>
            </button>
          </div>
        </div>
        <span
          class="gf-text-muted"
          style="font-size: 11px; margin-right: 6px; white-space: nowrap"
          >Terminal:</span
        >
        <div class="gf-asel">
          <template x-for="agent in installedAgents" :key="agent.id">
            <button
              @click="activeRunner = agent.id"
              class="gf-ab"
              :class="activeRunner === agent.id && 'gf-ab-active'"
              :disabled="terminalSessionId && !terminalEnded"
              x-text="agent.id"
            ></button>
          </template>
          <span
            x-show="installedAgents.length === 0"
            class="gf-ab"
            style="cursor: default; font-style: italic"
            >no agents</span
          >
        </div>
        <button
          @click="activeView = 'settings'"
          class="gf-ib"
          :class="activeView === 'settings' && 'gf-nb-active'"
          title="Settings"
          aria-label="Settings"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            />
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
        <button
          class="gf-ib"
          :class="activeView === 'help' && 'gf-nb-active'"
          @click="activeView = 'help'"
          title="Help"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </button>
        <button
          @click="darkMode = !darkMode"
          class="gf-ib"
          :title="darkMode ? 'Light mode' : 'Dark mode'"
          :aria-label="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <svg
            x-show="darkMode"
            x-cloak
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 rotate-[-90deg] scale-0"
            x-transition:enter-end="opacity-100 rotate-0 scale-100"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
            />
          </svg>
          <svg
            x-show="!darkMode"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 rotate-90 scale-0"
            x-transition:enter-end="opacity-100 rotate-0 scale-100"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 3a6 6 0 009 9 9 9 0 11-9-9z" />
          </svg>
        </button>
      </header>

      <!-- Main Content -->
      <main class="flex-1 overflow-hidden">
        <!-- Loading Spinner -->
        <div
          x-show="auditing"
          x-cloak
          class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/20 dark:bg-black/40"
        >
          <div
            class="bg-white dark:bg-gray-800 rounded-xl shadow-lg px-6 py-4 flex items-center gap-3"
          >
            <svg
              class="animate-spin h-5 w-5 text-blue-600"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              />
            </svg>
            <span class="text-sm font-medium">Auditing...</span>
          </div>
        </div>

        <!-- View fragments (assembled server-side) -->
        <!-- include: views/workspace.html -->

        <!-- include: views/prompts.html -->
        <!-- include: views/quality.html -->
        <!-- include: views/wizard.html -->
        <!-- include: views/home.html -->
        <!-- include: views/projects.html -->
        <!-- include: views/settings.html -->
        <!-- include: views/help.html -->
      </main>
    </div>

    <!-- Preset data (separate file for easy editing) -->
    <script src="/assets/preset-prompts.js"></script>

    <script src="/assets/app.js"></script>
  </body>
</html>
