# .goat-flow/config.yaml - project configuration
# Docs: https://github.com/blundergoat/goat-flow

version: "1.1.0"

# ── Project Setup ───────────────────────────────
agents:
  - claude
  - codex
  - gemini

skills:
  install:
    - goat
    - goat-debug
    - goat-plan
    - goat-review
    - goat-sbao
    - goat-security
    - goat-test

# ── Telemetry ─────────────────────────────────
# Opt-in: logs skill invocations to .goat-flow/logs/skill-usage.jsonl
# Requires the skill-telemetry.sh hook (see workflow/hooks/)
telemetry: false

# ── Scanner Thresholds ──────────────────────────
# Adjust for project complexity:
#   Small CLI: target 80, limit 120
#   Standard:  target 120, limit 150 (default)
#   Large:     target 150, limit 200
line-limits:
  target: 120
  limit: 150

# ── Toolchain ─────────────────────────────────
toolchain:
  test:
    - npm test
  lint:
    - bash scripts/preflight-checks.sh
    - bash scripts/validate-goat-flow-setup.sh
    - shellcheck workflow/hooks/*.sh scripts/*.sh
  build:
    - npm run build
    - npx tsc --noEmit
  package:
    - npm pack
  format:
    - npm run format

# ── Ask First Boundaries ──────────────────────
ask_first:
  - path: .goat-flow/architecture.md
    reason: Canonical architecture source; changes can alter repo-wide guidance.
  - path: CLAUDE.md
    reason: Shared Claude runtime instructions affect every Claude session.
  - path: workflow/setup/**
    reason: Setup templates change generated output across consumer projects.
  - path: workflow/skills/**
    reason: Skill templates are source of truth for installed copies.
  - path: .github/workflows/**
    reason: CI workflow changes can alter validation and release behavior.
  - path: .claude/**
    reason: Claude-specific runtime files are user-facing and should only change intentionally.

# ── Committed Paths (.goat-flow/) ─────────────────
lessons:
  path: .goat-flow/lessons/

decisions:
  path: .goat-flow/decisions/

footguns:
  path: .goat-flow/footguns/

# ── Ephemeral Paths (.goat-flow/) ───────────────
# Milestones, plans, and workspace-local task artifacts live here.
# Do NOT recreate todo.md or handoff.md.
tasks:
  path: .goat-flow/tasks/

logs:
  path: .goat-flow/logs/
