# .goat-flow/config.yaml — project configuration
# Docs: https://github.com/blundergoat/goat-flow

version: "0.10.0"

# ── Project Setup ───────────────────────────────
agents:
  - claude
  - codex
  - gemini

skills:
  install:
    - goat
    - goat-debug
    - goat-plan
    - goat-review
    - goat-security
    - goat-test

# ── Persona ────────────────────────────────────
# developer (default): full access — investigate, plan, AND implement
# investigator: read-only — investigate, plan, review only. No code changes.
# Override locally in .goat-flow/config.local.yaml (gitignored).
persona: developer

# ── Telemetry ─────────────────────────────────
# Opt-in: logs skill invocations to .goat-flow/logs/skill-usage.jsonl
# Requires the skill-telemetry.sh hook (see workflow/runtime/enforcement.md)
telemetry: false

# ── Scanner Thresholds ──────────────────────────
# Adjust for project complexity:
#   Small CLI: target 80, limit 120
#   Standard:  target 120, limit 150 (default)
#   Large:     target 150, limit 200
line-limits:
  target: 120
  limit: 150

# ── Committed Paths (ai-docs/) ─────────────────
lessons:
  committed: ai-docs/lessons/
  local: .goat-flow/lessons/

decisions:
  path: ai-docs/decisions/

evals:
  path: ai-docs/evals/

coding-standards:
  path: ai-docs/coding-standards/

# ── Committed Paths (ai-docs/) cont. ────────────
footguns:
  committed: ai-docs/footguns/
  local: .goat-flow/footguns/

# ── Local Paths (.goat-flow/) ───────────────────
tasks:
  path: .goat-flow/tasks/

logs:
  path: .goat-flow/logs/
