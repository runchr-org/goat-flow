# .goat-flow/config.yaml - project configuration
# Docs: https://github.com/blundergoat/goat-flow

version: "1.4.0"

# ── Project Setup ───────────────────────────────
agents:
  - claude
  - codex
  - gemini
  - copilot

skills:
  install:
    - goat
    - goat-debug
    - goat-plan
    - goat-review
    - goat-critique
    - goat-security
    - goat-qa
  # Optional: local PR reviews use this base before remote default-branch discovery.
  # goat-review:
  #   local_pr_base: deploy

# ── Telemetry ─────────────────────────────────
# Opt-in: logs skill invocations to .goat-flow/logs/skill-usage.jsonl
telemetry: false

# ── Line Limits ──────────────────────────────────
# Adjust for project complexity:
#   Small CLI: target 80, limit 120
#   Standard:  target 120, limit 150 (default)
#   Large:     target 150, limit 200
line-limits:
  target: 120
  limit: 150

# ── Terminal ──────────────────────────────────
# Dashboard embedded terminal settings.
# idle-timeout: minutes before idle sessions are killed. 0 = never. Default: 480 (8 hours).
# terminal:
#   idle-timeout: 480
