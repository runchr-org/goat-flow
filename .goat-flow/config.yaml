# .goat-flow/config.yaml - project configuration
# Docs: https://github.com/blundergoat/goat-flow

version: "1.10.1"

# ── Project Setup ───────────────────────────────
skills:
  install:
    - goat
    - goat-debug
    - goat-plan
    - goat-review
    - goat-critique
    - goat-security
    - goat-qa
  # Optional: local PR reviews use this base before remote default-branch discovery.
  # goat-review:
  #   local_pr_base: deploy

# ── Telemetry ─────────────────────────────────
# Opt-in: logs skill invocations to .goat-flow/logs/skill-usage.jsonl
telemetry: false

# ── Learning Loop Auto-Capture ──────────────────
# Opt-in only: future automatic writes to durable lessons/footguns/patterns/decisions.
learning-loop:
  auto-capture:
    enabled: false
    targets: []

# ── Hook Toggles ───────────────────────────────
# Project-wide toggles for goat-flow-shipped hooks.
# Edit here, use dashboard /hooks, or run `goat-flow hooks enable <id>`.
# Togglable goat-flow hook state. Missing entries use registry defaults.
# Manage with the dashboard Hooks page or `goat-flow hooks <enable|disable|sync>`.
hooks:
  gruff-code-quality:
    enabled: true
  deny-dangerous:
    enabled: true
line-limits:
  target: 125
  limit: 150

# ── Terminal ──────────────────────────────────
# Dashboard embedded terminal settings.
# idle-timeout: minutes before idle sessions are killed. 0 = never. Default: 480 (8 hours).
# terminal:
#   idle-timeout: 480
