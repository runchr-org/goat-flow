# .goat-flow/config.yaml - project configuration
# Docs: https://github.com/blundergoat/goat-flow

version: "1.12.0"

# ── Project Setup ───────────────────────────────
skills:
  install:
    - goat
    - goat-debug
    - goat-plan
    - goat-review
    - goat-critique
    - goat-security
    - goat-qa
  # Optional: local PR reviews use this base before remote default-branch discovery.
  # goat-review:
  #   local_pr_base: deploy

# ── Project Validation Commands ─────────────────
# Project-specific commands for explicit verification gates and setup prompts.
# The default post-turn safety hook does not run these commands.
toolchain:
  lint:
    - >-
      shellcheck scripts/*.sh scripts/maintenance/*.sh scripts/installers/*.sh
      workflow/hooks/*.sh workflow/hooks/deny-dangerous/*.sh .goat-flow/hooks/*.sh
      .goat-flow/hooks/deny-dangerous/*.sh
    - >-
      bash -n scripts/*.sh scripts/maintenance/*.sh scripts/installers/*.sh
      workflow/hooks/*.sh workflow/hooks/deny-dangerous/*.sh .goat-flow/hooks/*.sh
      .goat-flow/hooks/deny-dangerous/*.sh
  build:
    - npm run typecheck
  test:
    - npm run test:fast

# ── Telemetry ─────────────────────────────────
# Opt-in: logs skill invocations to .goat-flow/logs/skill-usage.jsonl
telemetry: false

# ── Learning Loop Auto-Capture ──────────────────
# Opt-in only: future automatic writes to durable lessons/footguns/patterns/decisions.
learning-loop:
  auto-capture:
    enabled: false
    targets: []

# ── Hook Toggles ───────────────────────────────
# Project-wide toggles for goat-flow-shipped hooks.
# Edit here, use dashboard /hooks, or run `goat-flow hooks enable <id>`.
# Togglable goat-flow hook state. Missing entries use registry defaults.
# Manage with the dashboard Hooks page or `goat-flow hooks <enable|disable|sync>`.
hooks:
  deny-dangerous:
    enabled: true
  gruff-code-quality:
    enabled: true
  post-turn-safety:
    enabled: true
  plan-checkbox-guard:
    enabled: true

# ── Plan Checkbox Guard ────────────────────────
# Workflow reminder only: tracks active plan checkbox drift after agent turns.
plan-guard:
  enabled: true
  search-paths:
    - .goat-flow/plans
  max-depth: 3
  staleness-days: 14
line-limits:
  target: 125
  limit: 150

# ── Terminal ──────────────────────────────────
# Dashboard embedded terminal settings.
# idle-timeout: minutes before idle sessions are killed. 0 = never. Default: 480 (8 hours).
# terminal:
#   idle-timeout: 480
