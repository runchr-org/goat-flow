# .goat-flow/config.yaml — project configuration
# Docs: https://github.com/blundergoat/goat-flow

# Version of goat-flow this config was created with
version: "0.9.4"

# Which agents are set up (omit to auto-detect)
agents:
  - claude
  - codex
  - gemini

# Skill selection (default: all 6 canonical)
# Use a list to install only specific skills: [goat-debug, goat-review, goat-test]
skills:
  install: all

# Learning loop paths
# "committed" = version-controlled (team knowledge, survives git clone)
# "local" = gitignored (agent-specific observations, high-frequency)
footguns:
  committed: docs/footguns/
  local: .goat-flow/footguns/

lessons:
  committed: ai/lessons/
  local: .goat-flow/lessons/

# Architecture decisions — always committed (ai/)
decisions:
  path: ai/decisions/

# Agent working memory — gitignored (.goat-flow/)
tasks:
  path: .goat-flow/tasks/

# Telemetry and session logs — gitignored (.goat-flow/)
logs:
  path: .goat-flow/logs/

# Agent evals — always committed (ai/)
evals:
  path: ai/evals/

# Coding standards — always committed (ai/)
coding-standards:
  path: ai/coding-standards/
